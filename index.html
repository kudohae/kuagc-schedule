<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 시간표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  /* ── 라이트 모드 (기본) ── */
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--border:#dddde0;
  --accent:#5c9e00;--accent2:#0077cc;--danger:#d93025;--warn:#c8760a;
  --text:#111111;--text2:#555555;--text3:#999999;--radius:6px;
  --hh:48px;
  --header-bg:rgba(244,244,245,.97);
  --blk-text:#ffffff;
}
body.dark{
  /* ── 다크 모드 ── */
  --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2e;--border:#333338;
  --accent:#e8ff47;--accent2:#47c5ff;--danger:#ff4747;--warn:#ffaa47;
  --text:#f0f0f0;--text2:#888888;--text3:#505055;--radius:6px;
  --header-bg:rgba(18,18,18,.97);
  --blk-text:#000000;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* HEADER */
header{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(8px);z-index:100;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;text-decoration:none;}
.nav{display:flex;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-right:4px;}
.nav-btn{padding:5px 13px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all .12s;white-space:nowrap;}
.nav-btn.active{background:var(--surface);color:var(--text);font-weight:700;}
.nav-btn:hover:not(.active){color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.season-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--accent2);}
.week-nav{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;}
.week-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:1px 3px;line-height:1;transition:color .12s;}
.week-nav button:hover{color:var(--accent);}
.week-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);white-space:nowrap;min-width:70px;text-align:center;}
.hdr-search{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;width:130px;}
.hdr-search:focus{border-color:var(--accent);}
.hdr-contacts-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap;}
.hdr-contacts-btn:hover{color:var(--text);border-color:var(--accent2);}
.hdr-ensemble-btn{background:rgba(92,158,0,.1);border:1px solid rgba(92,158,0,.35);border-radius:4px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;white-space:nowrap;transition:all .12s;}
body.dark .hdr-ensemble-btn{background:rgba(232,255,71,.08);border-color:rgba(232,255,71,.25);}
.hdr-ensemble-btn:hover{opacity:.8;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:14px;cursor:pointer;line-height:1;transition:all .12s;}
.theme-btn:hover{border-color:var(--text2);}
.week-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);white-space:nowrap;min-width:70px;text-align:center;}

/* LAYOUT */
.page{display:none;height:calc(100vh - var(--hh));}
.page.active{display:flex;overflow:hidden;}

/* SCHEDULE PAGE — 2-col */
#pgSchedule{flex-direction:row;}
.panel-left{width:190px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
.panel-main{flex:1;min-width:0;min-height:0;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}

/* TEAM LIST sidebar */
.tg-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;padding:6px 6px 3px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.tg-label:hover{color:var(--text2);}
.tg-arrow{font-size:11px;transition:transform .15s;}
.tg-arrow.open{transform:rotate(90deg);}
.t-item{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:4px;}
.t-item:hover{background:var(--surface2);}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.t-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.t-info{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* NOTICE BAR */
.notice-bar{background:rgba(0,119,204,.06);border:1px solid rgba(0,119,204,.2);border-radius:var(--radius);padding:8px 13px;display:flex;align-items:center;gap:8px;font-size:13px;}
body.dark .notice-bar{background:rgba(71,197,255,.06);border-color:rgba(71,197,255,.2);}
.notice-bar-icon{font-size:14px;flex-shrink:0;}
.notice-bar-text{flex:1;color:var(--text2);}

/* STATS ROW */
.stats-row{display:flex;gap:6px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;flex:1;display:flex;align-items:center;gap:7px;}
.stat-ico{font-size:15px;line-height:1;}
.stat-txt{display:flex;flex-direction:column;gap:0px;}
.stat-lbl{font-size:11px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}
.stat-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;line-height:1.1;}

/* SCHEDULE GRID */
.sch-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.sch-title-row{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sch-title{font-size:13px;font-weight:700;}
.sch-season{font-size:11px;color:var(--text2);}
.sch-hdr{display:grid;grid-template-columns:46px repeat(7,1fr);border-bottom:1px solid var(--border);}
.sch-day{padding:6px 2px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);}
.sch-day:last-child{border-right:none;}
.sch-day.today{color:var(--accent);}
.sch-body{display:flex;}
.sch-times{width:46px;flex-shrink:0;border-right:1px solid var(--border);}
.sch-time{height:62px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);line-height:1.3;}
.sch-time:last-child{border-bottom:none;}
.sch-time-next{font-size:9px;color:var(--text3);}
.sch-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.sch-col{border-right:1px solid var(--border);position:relative;}
.sch-col:last-child{border-right:none;}
.sch-col.today{background:rgba(92,158,0,.04);}
body.dark .sch-col.today{background:rgba(232,255,71,.02);}
.sch-slot{height:62px;border-bottom:1px solid var(--border);position:relative;}
.sch-slot:last-child{border-bottom:none;}
.sch-slot:hover{background:rgba(0,0,0,.03);}
body.dark .sch-slot:hover{background:rgba(255,255,255,.02);}
.blk{position:absolute;inset:2px;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;cursor:pointer;transition:opacity .12s,transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
body.dark .blk{box-shadow:0 1px 3px rgba(0,0,0,.35);}
.blk:hover{opacity:.88;transform:scale(.97);}
.blk-top{flex:1;display:flex;align-items:center;padding:0 5px;gap:3px;}
.blk-div{height:1px;background:rgba(0,0,0,.15);margin:0 3px;}
.blk-bot{flex:1;display:flex;align-items:center;padding:0 5px;}
.blk-name{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px;color:#fff;}
.blk-info{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9;color:#fff;}
.blk-tag{font-size:9px;font-weight:700;background:rgba(0,0,0,.2);padding:1px 3px;border-radius:2px;flex-shrink:0;margin-left:auto;color:#fff;}
.blk.absent{box-shadow:none;}
.blk.extra{box-shadow:0 0 0 1.5px var(--accent2);}
.blk.pending{opacity:.5;box-shadow:none;}
.blk-empty{position:absolute;inset:2px;border-radius:4px;border:1px dashed rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);cursor:pointer;transition:all .12s;}
body.dark .blk-empty{border-color:rgba(255,255,255,.12);color:var(--text3);}
.blk-empty:hover{border-color:var(--accent);color:var(--accent);background:rgba(92,158,0,.05);}
body.dark .blk-empty:hover{background:rgba(232,255,71,.04);}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:10;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-1px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--danger);}

/* APPLY PAGE */
#pgApply{flex-direction:column;overflow-y:auto;padding:16px 20px;gap:12px;}
.apply-status{border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.apply-status.open{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);}
.apply-status.closed{background:var(--surface);border:1px solid var(--border);}
.apply-status.finished{background:rgba(71,197,255,.06);border:1px solid rgba(71,197,255,.2);}
.apply-status-icon{font-size:20px;}
.apply-status-texts{display:flex;flex-direction:column;gap:2px;}
.apply-status-title{font-size:14px;font-weight:700;}
.apply-status-sub{font-size:11px;color:var(--text2);}
.apply-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.apply-card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
/* 지망 선택 현황 표시 */
.pref-status{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.pref-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);}
.pref-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;min-width:36px;text-align:center;}
.pref-badge.p1{background:rgba(232,255,71,.2);color:var(--accent);}
.pref-badge.p2{background:rgba(71,197,255,.2);color:var(--accent2);}
.pref-badge.p3{background:rgba(255,170,71,.2);color:var(--warn);}
.pref-val{font-size:12px;flex:1;}
.pref-val.empty{color:var(--text3);}
.pref-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;}
.pref-clear:hover{color:var(--danger);}
/* 신청용 시간표 그리드 — 슬롯 클릭 가능 */
.apply-sch-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.apply-sch-hdr{display:grid;grid-template-columns:42px repeat(7,1fr);border-bottom:1px solid var(--border);}
.apply-sch-day{padding:5px 2px;text-align:center;font-size:10px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);}
.apply-sch-day:last-child{border-right:none;}
.apply-sch-body{display:flex;}
.apply-sch-times{width:42px;flex-shrink:0;border-right:1px solid var(--border);}
.apply-sch-time{height:36px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);border-bottom:1px solid var(--border);}
.apply-sch-time:last-child{border-bottom:none;}
.apply-sch-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.apply-sch-col{border-right:1px solid var(--border);}
.apply-sch-col:last-child{border-right:none;}
.apply-cell{height:36px;border-bottom:1px solid var(--border);position:relative;cursor:pointer;transition:background .1s;}
.apply-cell:last-child{border-bottom:none;}
.apply-cell:hover{background:rgba(255,255,255,.04);}
.apply-cell.occupied{background:rgba(255,255,255,.02);cursor:not-allowed;}
.apply-cell.pref1{background:rgba(232,255,71,.18);cursor:pointer;}
.apply-cell.pref2{background:rgba(71,197,255,.18);cursor:pointer;}
.apply-cell.pref3{background:rgba(255,170,71,.18);cursor:pointer;}
.apply-cell-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;pointer-events:none;}
.apply-cell-label.p1{color:var(--accent);}
.apply-cell-label.p2{color:var(--accent2);}
.apply-cell-label.p3{color:var(--warn);}
.apply-cell-occ{position:absolute;inset:1px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text3);pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;}
/* 신청 현황 테이블 */
.apply-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.apply-tbl th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
.apply-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.apply-tbl tr:last-child td{border-bottom:none;}
.apply-tbl tr:hover td{background:rgba(255,255,255,.02);}
.pbadge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;}
.pbadge.p1{background:rgba(232,255,71,.15);color:var(--accent);}
.pbadge.p2{background:rgba(71,197,255,.15);color:var(--accent2);}
.pbadge.p3{background:rgba(255,170,71,.15);color:var(--warn);}
.pbadge.none{background:rgba(255,71,71,.1);color:var(--danger);}

/* MODAL */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);animation:fi .15s;}
body.dark .modal-bd{background:rgba(0,0,0,.7);}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:420px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column;animation:su .15s;box-shadow:0 8px 32px rgba(0,0,0,.12);}
body.dark .modal{box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:14px 17px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;}
.modal-x:hover{color:var(--text);}
.modal-body{padding:14px 17px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.modal-foot{padding:11px 17px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;}
.fl{font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .12s;}
.fi:focus,.fs:focus{border-color:var(--accent);}
.fs option{background:var(--surface);}
.btn{padding:7px 15px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:var(--accent);color:#000;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-d{background:var(--danger);color:#fff;}
.btn-xs{padding:4px 9px;font-size:12px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.irow:last-child{border-bottom:none;}
.ik{color:var(--text2);}

/* LOADING */
.ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-txt{font-family:'Space Mono',monospace;font-size:12px;color:var(--text2);}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;animation:fi .2s;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.err{border-color:var(--danger);color:var(--danger);}

/* HELP */
/* STATUS POPUP */
.status-bd{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);animation:fi .2s;}
.status-popup{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:340px;max-width:92vw;display:flex;flex-direction:column;overflow:hidden;animation:su .2s;}
.status-popup-main{padding:28px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.status-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.status-label.empty{color:var(--accent);}
.status-label.busy{color:var(--danger);}
.status-team{font-size:22px;font-weight:700;line-height:1.2;}
.status-sub{font-size:12px;color:var(--text2);}
.status-popup-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.status-popup-foot .btn{flex:1;padding:9px;font-size:13px;}

/* MOBILE TAB BAR */
.tab-bar{display:none;}
@media(max-width:700px){
  :root{--hh:44px;--tab-h:52px;}
  .hdr-search,.season-chip,.desktop-only{display:none;}
  #pgSchedule{flex-direction:column;}
  .panel-left{display:none;}
  .panel-main{padding:8px;gap:6px;overflow-x:hidden;}
  /* 모바일: 시간표 가로 스크롤 허용 */
  .sch-wrap{overflow-x:auto;}
  .sch-hdr{display:grid;grid-template-columns:40px repeat(7,minmax(52px,1fr));min-width:450px;}
  .sch-body{min-width:450px;}
  .sch-times{width:40px;min-width:40px;}
  .sch-grid{grid-template-columns:repeat(7,minmax(52px,1fr));}
  .sch-day{font-size:11px;padding:5px 2px;}
  .sch-time{height:56px;font-size:10px;}
  .sch-slot{height:56px;}
  .blk-name{font-size:11px;}
  .blk-info{font-size:9px;}
  .blk-tag{font-size:8px;}
  .tab-bar{background:var(--header-bg);border-top:1px solid var(--border);}
  /* 모바일 팀 목록 패널 */
  #mobileTeamPanel{display:none;flex-direction:column;overflow-y:auto;padding:10px;gap:6px;padding-bottom:calc(var(--tab-h)+10px);}
  #mobileTeamPanel.active{display:flex;}
  #pgApply{padding:10px;padding-bottom:calc(var(--tab-h)+10px);}
  .modal-bd{align-items:flex-end;}
  .modal{border-radius:12px 12px 0 0;width:100%;max-width:100%;max-height:85vh;}
  .modal::before{content:'';display:block;width:32px;height:3px;background:var(--border);border-radius:2px;margin:8px auto 0;}
  .fi,.fs{font-size:16px;}
  .toast{bottom:calc(var(--tab-h)+8px);}
  .tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(14,14,15,.97);border-top:1px solid var(--border);z-index:100;backdrop-filter:blur(8px);}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;}
  .tab-btn.active{color:var(--accent);}
  .tab-btn svg{width:18px;height:18px;}
  .page.active{flex-direction:column;}
  .panel-main{padding-bottom:calc(var(--tab-h)+8px);}
  .nav{display:none;}
  .week-lbl{min-width:56px;font-size:9px;}
}
@media(min-width:701px){
  .tab-bar{display:none !important;}
  #mobileTeamPanel{display:none !important;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="spin"></div><div class="ld-txt">Loading...</div></div>

<header>
  <a class="logo" href="https://kuagc.com" target="_blank" style="text-decoration:none">BAND</a>
  <div class="nav">
    <button class="nav-btn active" id="nb-schedule" onclick="showPage('schedule')">시간표</button>
    <button class="nav-btn" id="nb-apply" onclick="showPage('apply')">시간 신청</button>
  </div>
  <div style="width:1px;height:18px;background:var(--border);flex-shrink:0;"></div>
  <a class="hdr-ensemble-btn" href="ensemble.html">🎸 합주신청</a>
  <div class="hdr-right">
    <input class="hdr-search desktop-only" id="searchInput" placeholder="팀 검색..." oninput="onSearch(this.value)"/>
    <div class="season-chip desktop-only" id="seasonChip">—</div>
    <button class="hdr-contacts-btn desktop-only" onclick="openContactsModal()">📞 연락처</button>

  </div>
  <div class="panel-main">

    <div class="stats-row" id="statsEl"></div>
    <div class="sch-wrap">
      <div class="sch-title-row">

      <div class="sch-body">
        <div class="sch-times" id="schTimes"></div>
        <div class="sch-grid" id="schGrid"></div>
      </div>

</div>

<!-- APPLY PAGE -->

  <div id="mobileTeamListEl"></div>
</div>

<!-- MOBILE TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tb-schedule" onclick="showPage('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    시간표
  </button>
  <button class="tab-btn" id="tb-teams" onclick="showPage('teams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
    팀 목록
  </button>
  <button class="tab-btn" id="tb-apply" onclick="showPage('apply')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

<!-- MODAL -->
<div class="modal-bd" id="modalBd" style="display:none" onclick="onMBd(event)">

    <div class="modal-body" id="modalBody"></div>

<!-- STATUS POPUP -->
<div class="status-bd" id="statusBd" style="display:none">
  <div class="status-popup">
    <div class="status-popup-main" id="statusMain"></div>
    <div class="status-popup-foot">
      <button class="btn btn-s" onclick="closeStatus()">닫기</button>
      <button class="btn btn-p" onclick="closeStatus()">시간표 보기</button>
    </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { isAdmin } from './js/auth.js';
import {
  getConfig, fetchTeams, fetchBaseSlots, fetchExceptions, mergeSchedule,
  fetchRequests, createRequest, approveRequest, rejectRequest,
  createException, deleteException, fetchNotices,
  fetchActiveRound, fetchApplications, submitApplication,
  fetchContacts
} from './js/schedule.js';

// ── CONFIG ────────────────────────────────────────────────────────────
const DAYS  = ['월','화','수','목','금','토','일'];
const HOURS = Array.from({length:18},(_,i)=>i+8);
const GRAY  = '#888888';
const korSort = (a,k) => [...a].sort((x,y)=>x[k].localeCompare(y[k],'ko-KR',{numeric:true}));
const teamClr = t => t.type==='합주'?GRAY:(t.color||GRAY);
const timeStr = h => h<24?h+':00':'0'+(h-24)+':00';
const fmtTime = ts => { if(!ts) return ''; const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const errMsg = e => {
  const m = e?.message||'';
  if(m.includes('unique')||m.includes('duplicate')) return '이미 해당 시간에 신청이 존재합니다';
  if(m.includes('foreign key')) return '참조 데이터가 존재하지 않습니다';
  if(m.includes('network')||m.includes('fetch')) return '네트워크 오류가 발생했습니다. 다시 시도해주세요';
  if(m.includes('JWT')||m.includes('auth')) return '인증 오류가 발생했습니다. 새로고침 후 시도해주세요';
  return m || '오류가 발생했습니다';
};
function weekLabel(off){
  const now=new Date(),m=new Date(now);
  m.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  const mo=m.getMonth()+1;
  const wn=Math.ceil((m.getDate()+(new Date(m.getFullYear(),m.getMonth(),1).getDay()+6)%7)/7);
  return `${mo}월 ${wn}주차`;
}

// ── STATE ─────────────────────────────────────────────────────────────
let weekOff=0, season='1학기';
let teams=[], baseSlots=[], exceptions=[], requests=[], notices=[], contacts=[];
let merged=[], round=null, applications=[];
let searchQ='', collapsed=new Set();

// ── THEME ─────────────────────────────────────────────────────────────
function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark') document.body.classList.add('dark');
  updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
}
window.toggleTheme=function(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  updateThemeBtn();
};

async function init(){
  initTheme();
  season = await getConfig('current_season').catch(()=>'1학기');
  await loadAll();
  showStatus();
  setInterval(()=>{ if(weekOff===0) updateNowLine(); },60000);
}

async function loadAll(){
  const ldEl = document.getElementById('ld');
  ldEl.style.display='flex';
  try{
    [teams,baseSlots,exceptions,requests,notices,contacts] = await Promise.all([
      fetchTeams(), fetchBaseSlots(season), fetchExceptions(weekOff),
      fetchRequests(weekOff), fetchNotices(), fetchContacts()
    ]);
    teams=korSort(teams,'name');
    merged=mergeSchedule(baseSlots,exceptions);
    round=await fetchActiveRound(season);
    if(round) applications=await fetchApplications(round.id);
    ldEl.style.display='none';
    render();
    // realtime
    import('./js/supabase.js').then(({supabase})=>{
      supabase.channel('rt')
        .on('postgres_changes',{event:'*',schema:'public',table:'base_slots'},async()=>{
          baseSlots=await fetchBaseSlots(season); merged=mergeSchedule(baseSlots,exceptions); renderSchedule();
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'slot_exceptions'},async()=>{
          exceptions=await fetchExceptions(weekOff); merged=mergeSchedule(baseSlots,exceptions); renderSchedule();
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'requests'},async()=>{
          requests=await fetchRequests(weekOff); renderStats();
        })
        .subscribe();
    });
  } catch(e){
    ldEl.innerHTML=`
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">
        <div style="font-size:14px;color:var(--danger)">데이터를 불러오지 못했습니다</div>
        <div style="font-size:12px;color:var(--text2)">${e.message||'네트워크 오류'}</div>
        <button class="btn btn-p" onclick="loadAll()">다시 시도</button>
      </div>`;
  }
}

// ── PAGE SWITCH ───────────────────────────────────────────────────────
window.showPage=function(pg){
  ['schedule','apply'].forEach(p=>{
    document.getElementById('pg'+p.charAt(0).toUpperCase()+p.slice(1))?.classList.toggle('active',p===pg);
    document.getElementById('nb-'+p)?.classList.toggle('active',p===pg);
  });
  ['schedule','teams','apply'].forEach(p=>{
    document.getElementById('tb-'+p)?.classList.toggle('active',p===pg);
  });
  document.getElementById('weekNavEl').style.display = pg==='schedule'?'':'none';
  // 모바일 팀 패널
  const teamPanel=document.getElementById('mobileTeamPanel');
  if(pg==='teams'){ teamPanel.classList.add('active'); renderMobileTeams(); }
  else teamPanel.classList.remove('active');
  // 시간표/신청 페이지 active
  document.getElementById('pgSchedule')?.classList.toggle('active',pg==='schedule');
  document.getElementById('pgApply')?.classList.toggle('active',pg==='apply');
  if(pg==='apply') renderApply();
};

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const wl=weekLabel(weekOff);
  document.getElementById('weekLbl').textContent=wl;
  document.getElementById('seasonChip').textContent=season;
  document.getElementById('schTitle').textContent=`${wl} 동아리방 사용 시간표`;
  document.getElementById('schSeason').textContent=season;
  renderTeams();
  renderNotice();
  renderStats();
  renderSchedule();
}

function teamListHTML(q=''){
  const groups=[{k:'합주'},{k:'스쿨'},{k:'이외'}];
  return groups.map(g=>{
    let list=korSort(teams.filter(t=>t.type===g.k),'name');
    if(q) list=list.filter(t=>t.name.includes(q)||(t.info&&t.info.includes(q)));
    if(!list.length) return '';
    const open=!collapsed.has(g.k);
    return `<div>
      <div class="tg-label" onclick="toggleGroup('${g.k}')">
        <span>${g.k} <span style="color:var(--text3);font-weight:400">(${list.length})</span></span>
        <span class="tg-arrow ${open?'open':''}">›</span>
      </div>
      <div style="display:${open?'flex':'none'};flex-direction:column;gap:0">
        ${list.map(t=>`<div class="t-item">
          <div class="t-dot" style="background:${teamClr(t)}"></div>
          <div style="flex:1;min-width:0">
            <div class="t-name">${t.name}</div>
            ${t.info?`<div class="t-info">${t.info}</div>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderTeams(){
  const q=searchQ.toLowerCase();
  const html=teamListHTML(q);
  document.getElementById('teamListEl').innerHTML=html;
}

function renderMobileTeams(){
  document.getElementById('mobileTeamListEl').innerHTML=teamListHTML();
}

window.toggleGroup=function(k){
  collapsed.has(k)?collapsed.delete(k):collapsed.add(k);
  renderTeams();
};
window.onSearch=function(v){ searchQ=v; renderTeams(); };

function renderNotice(){
  const el=document.getElementById('noticeBarEl');
  if(!notices.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="notice-bar">
    <span class="notice-bar-icon">📢</span>
    <div class="notice-bar-text">${notices.map(n=>n.content).join(' &nbsp;·&nbsp; ')}</div>
  </div>`;
}

function renderStats(){
  const absent=merged.filter(s=>s.status==='absent').length;
  const extra=exceptions.filter(e=>e.exception_type==='extra').length;
  const pend=requests.filter(r=>r.status==='pending').length;
  document.getElementById('statsEl').innerHTML=`
    <div class="stat"><div class="stat-ico">📋</div><div class="stat-txt"><div class="stat-lbl">기본 배정</div><div class="stat-val">${baseSlots.length}</div></div></div>
    <div class="stat"><div class="stat-ico">🔕</div><div class="stat-txt"><div class="stat-lbl">이번 주 미사용</div><div class="stat-val" style="color:var(--danger)">${absent}</div></div></div>
    <div class="stat"><div class="stat-ico">➕</div><div class="stat-txt"><div class="stat-lbl">이번 주 추가</div><div class="stat-val" style="color:var(--accent2)">${extra}</div></div></div>
    <div class="stat"><div class="stat-ico">🕐</div><div class="stat-txt"><div class="stat-lbl">대기 신청</div><div class="stat-val" style="color:var(--warn)">${pend}</div></div></div>`;
}

function renderSchedule(){
  const todayDow=(new Date().getDay()+6)%7;
  const nowH=new Date().getHours(), nowM=new Date().getMinutes();
  const isNow=weekOff===0;
  document.getElementById('schHdr').innerHTML='<div class="sch-day"></div>'+
    DAYS.map((d,i)=>`<div class="sch-day${isNow&&i===todayDow?' today':''}">${d}</div>`).join('');
  document.getElementById('schTimes').innerHTML=HOURS.map(h=>
    `<div class="sch-time"><span>${timeStr(h)}</span>${h>=24?`<span class="sch-time-next">익일</span>`:''}</div>`).join('');
  const grid=document.getElementById('schGrid');
  grid.innerHTML='';
  const mm=new Map(merged.map(s=>[`${s.day}-${s.hour}`,s]));
  const pm=new Map(requests.filter(r=>r.type==='extra'&&r.status==='pending').map(r=>[`${r.day}-${r.hour}`,r]));
  for(let d=0;d<7;d++){
    const col=document.createElement('div');
    col.className='sch-col'+(isNow&&d===todayDow?' today':'');
    if(isNow&&d===todayDow&&nowH>=HOURS[0]&&nowH<=HOURS[HOURS.length-1]){
      const line=document.createElement('div'); line.className='now-line';
      line.style.top=((nowH-HOURS[0])*62+(nowM/60)*62)+'px';
      col.appendChild(line);
    }
    for(const h of HOURS){
      const cell=document.createElement('div'); cell.className='sch-slot';
      const s=mm.get(`${d}-${h}`), pe=pm.get(`${d}-${h}`);
      if(s){
        const t=s.teams, absent=s.status==='absent', isExtra=s.source==='extra';
        const c=teamClr(t);
        const blk=document.createElement('div');
        blk.className=`blk${absent?' absent':''}${isExtra?' extra':''}`;
        if(absent){
          blk.style.cssText=`background:repeating-linear-gradient(45deg,${c}18,${c}18 3px,transparent 3px,transparent 9px);border:1.5px dashed ${c}55;`;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}88">${t.name}</span><span class="blk-tag" style="color:${c}88">미사용</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}66">${t.info||''}</span></div>`;
        } else {
          blk.style.background=c;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:#000">${t.name}</span><span class="blk-tag" style="color:#000">${isExtra?'추가':t.type}</span></div><div class="blk-div"></div><div class="blk-bot"><span class="blk-info" style="color:#000">${t.info||''}</span></div>`;
        }
        blk.onclick=()=>openSlotModal(s);
        cell.appendChild(blk);
      } else if(pe){
        const t=pe.teams, c=teamClr(t);
        const blk=document.createElement('div');
        blk.className='blk pending';
        blk.style.cssText=`background:${c}20;border:1.5px dashed ${c}77;`;
        blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}">${t.name}</span><span class="blk-tag" style="color:${c}">대기</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}99">${t.info||''}</span></div>`;
        blk.onclick=()=>openReqDetail(pe);
        cell.appendChild(blk);
      } else {
        const ind=document.createElement('div'); ind.className='blk-empty';
        ind.textContent='신청';
        ind.onclick=()=>openClaimModal(d,h);
        cell.appendChild(ind);
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// 현재 시각 라인만 갱신 (전체 재렌더 없이)
function updateNowLine(){
  const todayDow=(new Date().getDay()+6)%7;
  const nowH=new Date().getHours(), nowM=new Date().getMinutes();
  const line=document.querySelector('.now-line');
  if(line) line.style.top=((nowH-HOURS[0])*62+(nowM/60)*62)+'px';
}

// ── WEEK NAV ─────────────────────────────────────────────────────────
window.changeWeek=async function(delta){
  weekOff+=delta;
  [exceptions,requests]=await Promise.all([fetchExceptions(weekOff),fetchRequests(weekOff)]);
  merged=mergeSchedule(baseSlots,exceptions); render();
};

// ── SLOT MODAL ───────────────────────────────────────────────────────
function openSlotModal(s){
  const t=s.teams, absent=s.status==='absent', isExtra=s.source==='extra', c=teamClr(t);
  showModal(`${t.name} · ${DAYS[s.day]} ${s.hour}:00`,
    `<div class="irow"><span class="ik">팀</span><span style="color:${c};font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[s.day]} ${s.hour}:00</span></div>
     <div class="irow"><span class="ik">종류</span><span>${isExtra?'추가 사용 (이번 주)':'기본 시간표'}</span></div>
     <div class="irow"><span class="ik">상태</span><span>${absent?'⛔ 이번 주 미사용':'✅ 정상'}</span></div>
     ${t.info?`<div class="irow"><span class="ik">${t.type==='스쿨'?'선생님':'정보'}</span><span>${t.info}</span></div>`:''}`,
    !absent&&s.source==='base'
      ? `<button class="btn btn-s" onclick="closeModal()">닫기</button>
         <button class="btn btn-d" onclick="openAbsenceModal(${s.id},${s.day},${s.hour},${s.team_id})">미사용 신고</button>`
      : `<button class="btn btn-s" onclick="closeModal()">닫기</button>`
  );
}

function openAbsenceModal(slotId,day,hour,teamId){
  const t=teams.find(t=>t.id===teamId);
  // 이미 대기 중인 신청이 있는지 확인
  const existing=requests.find(r=>r.status==='pending'&&r.type==='absent'&&r.team_id===teamId&&r.day===day&&r.hour===hour&&r.week_offset===weekOff);
  if(existing){
    showModal('미사용 신고',
      `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
       <div class="irow"><span class="ik">상태</span><span style="color:var(--warn)">승인 대기 중</span></div>
       <div class="irow"><span class="ik">사유</span><span>${existing.reason}</span></div>`,
      `<button class="btn btn-s" onclick="closeModal()">닫기</button>
       <button class="btn btn-d" id="cancelBtn" onclick="cancelRequest(${existing.id})">신고 취소</button>`
    );
    return;
  }
  showModal('미사용 신고',
    `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[day]} ${hour}:00</span></div>
     <div><div class="fl">신청자 이름</div><input class="fi" id="absName" placeholder="이름 (선택)" maxlength="20"/></div>
     <div><div class="fl">사유 *</div><input class="fi" id="absReason" placeholder="예: 팀원 시험 기간" maxlength="100"/></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-d" id="absBtn" onclick="submitAbsence(${teamId},${day},${hour})">신고 제출</button>`
  );
}
window.submitAbsence=async function(teamId,day,hour){
  const reason=document.getElementById('absReason').value.trim();
  if(!reason){toast('사유를 입력해주세요','err');return;}
  const btn=document.getElementById('absBtn'); btn.disabled=true; btn.textContent='제출 중...';
  try{
    await createRequest({type:'absent',team_id:teamId,day,hour,week_offset:weekOff,reason,requester_name:document.getElementById('absName').value.trim()});
    closeModal(); toast('미사용 신고가 제출됐습니다');
    requests=await fetchRequests(weekOff); renderStats();
  }catch(e){toast(errMsg(e),'err');btn.disabled=false;btn.textContent='신고 제출';}
};

function openClaimModal(day,hour){
  const opts=korSort(teams,'name').map(t=>`<option value="${t.id}">${t.name} (${t.type})</option>`).join('');
  showModal(`추가 사용 신청 · ${DAYS[day]} ${hour}:00`,
    `<div><div class="fl">팀 선택 *</div><select class="fs" id="clTeam">${opts}</select></div>
     <div><div class="fl">신청자 이름</div><input class="fi" id="clName" placeholder="이름 (선택)" maxlength="20"/></div>
     <div><div class="fl">사유 *</div><input class="fi" id="clReason" placeholder="예: 공연 준비 합주" maxlength="100"/></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-p" id="clBtn" onclick="submitClaim(${day},${hour})">신청 제출</button>`
  );
}

window.cancelRequest=async function(reqId){
  const btn=document.getElementById('cancelBtn'); btn.disabled=true; btn.textContent='취소 중...';
  try{
    const {supabase}=await import('./js/supabase.js');
    await supabase.from('requests').delete().eq('id',reqId);
    requests=requests.filter(r=>r.id!==reqId);
    closeModal(); toast('신청이 취소됐습니다'); renderStats(); renderSchedule();
  }catch(e){toast(errMsg(e),'err');btn.disabled=false;btn.textContent='신고 취소';}
};
window.submitClaim=async function(day,hour){
  const reason=document.getElementById('clReason').value.trim();
  if(!reason){toast('사유를 입력해주세요','err');return;}
  const btn=document.getElementById('clBtn'); btn.disabled=true; btn.textContent='제출 중...';
  try{
    await createRequest({type:'extra',team_id:parseInt(document.getElementById('clTeam').value),day,hour,week_offset:weekOff,reason,requester_name:document.getElementById('clName').value.trim()});
    closeModal(); toast('추가 사용 신청이 제출됐습니다');
    requests=await fetchRequests(weekOff); renderStats();
  }catch(e){toast(errMsg(e),'err');btn.disabled=false;btn.textContent='신청 제출';}
};

function openReqDetail(req){
  const t=req.teams;
  showModal('추가 사용 신청 대기 중',
    `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[req.day]} ${req.hour}:00</span></div>
     <div class="irow"><span class="ik">사유</span><span>${req.reason}</span></div>
     <div class="irow"><span class="ik">신청자</span><span>${req.requester_name||'미기입'}</span></div>
     <div class="irow"><span class="ik">제출 시각</span><span style="color:var(--text2)">${fmtTime(req.created_at)}</span></div>
     <div class="irow"><span class="ik">상태</span><span style="color:var(--warn)">관리자 승인 대기 중</span></div>`,
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>
     <button class="btn btn-d" id="cancelBtn" onclick="cancelRequest(${req.id})">신청 취소</button>`
  );
}

// ── APPLY PAGE ────────────────────────────────────────────────────────
// 지망 상태: {1: {day,hour}, 2: {day,hour}, 3: {day,hour}}
let applyPrefs = {};
let applyTeamId = null;

function renderApply(){
  const isOpen=round&&round.status==='open';
  const isFin=round&&(round.status==='finished'||round.draft_approved);
  const teamOpts=korSort(teams,'name').map(t=>`<option value="${t.id}">${t.name}</option>`).join('');

  let html=`
    <div class="apply-status ${isOpen?'open':isFin?'finished':'closed'}">
      <div class="apply-status-icon">${isOpen?'🟢':isFin?'🔵':'⭕'}</div>
      <div class="apply-status-texts">
        <div class="apply-status-title">${isOpen?'신청 진행 중':isFin?'신청 마감 — 배정 완료':'신청 기간이 아닙니다'}</div>
        <div class="apply-status-sub">${isOpen&&round.close_at?'마감: '+new Date(round.close_at).toLocaleString('ko-KR'):!isOpen&&!isFin?'관리자가 신청을 열면 여기서 신청할 수 있습니다.':''}</div>
      </div>
    </div>`;

  if(isOpen){
    const p1=applyPrefs[1], p2=applyPrefs[2], p3=applyPrefs[3];
    const prefLabel=(p)=>p?`${DAYS[p.day]} ${p.hour}:00`:null;
    html+=`
    <div class="apply-card">
      <div class="apply-card-title">시간 신청 — 팀 선택 후 시간표에서 클릭</div>
      <div style="margin-bottom:12px">
        <div class="fl">팀 선택</div>
        <select class="fs" id="apTeam" onchange="onApplyTeamChange(this.value)">${teamOpts}</select>
      </div>
      <div class="pref-status">
        <div class="pref-row">
          <span class="pref-badge p1">1지망</span>
          <span class="pref-val ${p1?'':'empty'}">${prefLabel(p1)||'시간표에서 클릭해서 선택'}</span>
          ${p1?`<button class="pref-clear" onclick="clearPref(1)">×</button>`:''}
        </div>
        <div class="pref-row">
          <span class="pref-badge p2">2지망</span>
          <span class="pref-val ${p2?'':'empty'}">${prefLabel(p2)||'시간표에서 클릭해서 선택 (선택사항)'}</span>
          ${p2?`<button class="pref-clear" onclick="clearPref(2)">×</button>`:''}
        </div>
        <div class="pref-row">
          <span class="pref-badge p3">3지망</span>
          <span class="pref-val ${p3?'':'empty'}">${prefLabel(p3)||'시간표에서 클릭해서 선택 (선택사항)'}</span>
          ${p3?`<button class="pref-clear" onclick="clearPref(3)">×</button>`:''}
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">아래 시간표에서 원하는 시간을 클릭하면 순서대로 1→2→3지망이 선택됩니다. 이미 배정된 시간은 신청할 수 없습니다.</div>
      ${renderApplyGrid()}
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-p" onclick="submitApply()">신청 제출</button>
      </div>
    </div>`;
  }

  if(round&&applications.length){
    const pc=p=>p===1?'p1':p===2?'p2':p===3?'p3':'none';
    const pl=p=>p?p+'지망':'미배정';
    html+=`
    <div class="apply-card">
      <div class="apply-card-title">${isFin?'배정 결과':'신청 현황'} (${applications.length}팀)</div>
      <table class="apply-tbl">
        <thead><tr><th>팀</th><th>1지망</th><th>2지망</th><th>3지망</th>${isFin?'<th>결과</th>':''}<th>제출 시각</th></tr></thead>
        <tbody>
          ${applications.map(a=>`<tr>
            <td style="font-weight:600">${a.teams.name}</td>
            <td>${DAYS[a.pref1_day]} ${a.pref1_hour}:00</td>
            <td>${a.pref2_day!=null?DAYS[a.pref2_day]+' '+a.pref2_hour+':00':'—'}</td>
            <td>${a.pref3_day!=null?DAYS[a.pref3_day]+' '+a.pref3_hour+':00':'—'}</td>
            ${isFin?`<td>${a.assigned_day!=null?`<span class="pbadge ${pc(a.assigned_pref)}">${pl(a.assigned_pref)}</span> ${DAYS[a.assigned_day]} ${a.assigned_hour}:00`:`<span class="pbadge none">미배정</span>`}</td>`:''}
            <td style="font-size:11px;color:var(--text3)">${fmtTime(a.submitted_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  document.getElementById('applyContent').innerHTML=html;
  // 팀 select 값 복원
  const sel=document.getElementById('apTeam');
  if(sel&&applyTeamId) sel.value=applyTeamId;
}

function renderApplyGrid(){
  const p1=applyPrefs[1], p2=applyPrefs[2], p3=applyPrefs[3];
  const prefMap={};
  if(p1) prefMap[`${p1.day}-${p1.hour}`]=1;
  if(p2) prefMap[`${p2.day}-${p2.hour}`]=2;
  if(p3) prefMap[`${p3.day}-${p3.hour}`]=3;
  const occMap=new Map(merged.filter(s=>s.status!=='absent').map(s=>[`${s.day}-${s.hour}`,s.teams.name]));

  let html=`<div class="apply-sch-wrap">
    <div class="apply-sch-hdr"><div class="apply-sch-day"></div>${DAYS.map(d=>`<div class="apply-sch-day">${d}</div>`).join('')}</div>
    <div class="apply-sch-body">
      <div class="apply-sch-times">${HOURS.map(h=>`<div class="apply-sch-time">${h}</div>`).join('')}</div>
      <div class="apply-sch-grid">`;
  for(let d=0;d<7;d++){
    html+=`<div class="apply-sch-col">`;
    for(const h of HOURS){
      const key=`${d}-${h}`;
      const pn=prefMap[key];
      const occ=occMap.get(key);
      html+=`<div class="apply-cell${pn?' pref'+pn:occ?' occupied':''}"${!pn&&occ?'':` onclick="toggleApplyCell(${d},${h})"`}>`;
      if(pn) html+=`<div class="apply-cell-label p${pn}">${pn}지망</div>`;
      else if(occ) html+=`<div class="apply-cell-occ">${occ}</div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div></div>`;
  return html;
}

window.onApplyTeamChange=function(val){
  applyTeamId=parseInt(val);
};

window.toggleApplyCell=function(day,hour){
  if(!round||round.status!=='open') return;
  const key=`${day}-${hour}`;
  // 이미 선택된 지망인지 확인
  for(let n=1;n<=3;n++){
    const p=applyPrefs[n];
    if(p&&p.day===day&&p.hour===hour){ delete applyPrefs[n]; renderApplyInplace(); return; }
  }
  // 다음 빈 지망 번호 찾기
  const next=[1,2,3].find(n=>!applyPrefs[n]);
  if(!next){ toast('이미 3지망까지 모두 선택됐습니다. 취소하려면 선택된 칸을 다시 클릭하세요'); return; }
  applyPrefs[next]={day,hour};
  renderApplyInplace();
};

window.clearPref=function(n){
  delete applyPrefs[n];
  // 빈 자리 채우기 (2 삭제 시 3→2로 당기기)
  if(n===1&&applyPrefs[2]){ applyPrefs[1]=applyPrefs[2]; delete applyPrefs[2]; }
  if((n===1||n===2)&&applyPrefs[3]){ applyPrefs[2]=applyPrefs[3]; delete applyPrefs[3]; }
  renderApplyInplace();
};

function renderApplyInplace(){
  // 그리드와 지망 현황만 업데이트
  const p1=applyPrefs[1], p2=applyPrefs[2], p3=applyPrefs[3];
  const prefLabel=(p)=>p?`${DAYS[p.day]} ${p.hour}:00`:null;
  // pref-status 업데이트
  const rows=document.querySelectorAll('.pref-row');
  [[1,p1,'p1'],[2,p2,'p2'],[3,p3,'p3']].forEach(([n,p,cls],i)=>{
    if(!rows[i]) return;
    rows[i].innerHTML=`
      <span class="pref-badge ${cls}">${n}지망</span>
      <span class="pref-val ${p?'':'empty'}">${prefLabel(p)||(n===1?'시간표에서 클릭해서 선택':'시간표에서 클릭해서 선택 (선택사항)')}</span>
      ${p?`<button class="pref-clear" onclick="clearPref(${n})">×</button>`:''}`;
  });
  // 그리드 업데이트
  const gridWrap=document.querySelector('.apply-sch-wrap');
  if(gridWrap) gridWrap.outerHTML=renderApplyGrid();
}

window.submitApply=async function(){
  if(!round||round.status!=='open'){toast('현재 신청 기간이 아닙니다','err');return;}
  const selEl=document.getElementById('apTeam');
  const team_id=applyTeamId||parseInt(selEl?.value);
  if(!team_id||isNaN(team_id)){toast('팀을 선택해주세요','err');return;}
  if(!applyPrefs[1]){toast('1지망을 선택해주세요','err');return;}
  const p1=applyPrefs[1], p2=applyPrefs[2], p3=applyPrefs[3];
  try{
    await submitApplication({round_id:round.id,team_id,
      pref1_day:p1.day,pref1_hour:p1.hour,
      pref2_day:p2?p2.day:null,pref2_hour:p2?p2.hour:null,
      pref3_day:p3?p3.day:null,pref3_hour:p3?p3.hour:null});
    applications=await fetchApplications(round.id);
    applyPrefs={}; applyTeamId=null;
    toast('신청이 제출됐습니다','ok'); renderApply();
  }catch(e){toast(errMsg(e),'err');}
};

// ── CONTACTS MODAL ────────────────────────────────────────────────────
window.openContactsModal=async function(){
  let ct=contacts;
  if(!ct.length){
    showModal('회장단 연락처','<div style="color:var(--text2);font-size:13px;padding:8px 0">등록된 연락처가 없습니다.</div>','<button class="btn btn-s" onclick="closeModal()">닫기</button>');
    return;
  }
  showModal('📞 그루터기 회장단 연락처',
    ct.map(c=>`
      <div class="irow">
        <span class="ik">${c.role}</span>
        <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span style="font-weight:600">${c.name}</span>
          ${c.phone?`<span style="font-size:11px;color:var(--text2)">${c.phone}</span>`:''}
        </span>
      </div>`).join(''),
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>`
  );
};

// ── MODAL ─────────────────────────────────────────────────────────────
function showModal(title,body,foot){
  document.getElementById('modalTtl').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFoot').innerHTML=foot;
  document.getElementById('modalBd').style.display='flex';
  document.body.style.overflow='hidden';
}
window.closeModal=()=>{
  document.getElementById('modalBd').style.display='none';
  document.body.style.overflow='';
};
window.onMBd=e=>{ if(e.target===document.getElementById('modalBd')) closeModal(); };

// ── STATUS POPUP ──────────────────────────────────────────────────────
function showStatus(){
  const now = new Date();
  const dow = (now.getDay()+6)%7; // 0=월
  const h   = now.getHours();
  // 현재 시간에 해당하는 슬롯 찾기 (정각 기준, 1시간 블록)
  const slot = merged.find(s => s.day===dow && s.hour===h && s.status!=='absent');
  const el = document.getElementById('statusMain');
  const bd = document.getElementById('statusBd');
  if(!el||!bd) return;
  if(slot){
    const t = slot.teams;
    const c = teamClr(t);
    el.innerHTML=`
      <div style="width:52px;height:52px;border-radius:50%;background:${c}22;border:2px solid ${c};display:flex;align-items:center;justify-content:center;font-size:22px">🎸</div>
      <div>
        <div class="status-label busy">현재 동아리방 사용 중</div>
        <div class="status-team" style="color:${c}">${t.name}</div>
        ${t.info?`<div class="status-sub">${t.info}</div>`:''}
        <div class="status-sub" style="margin-top:4px">${['월','화','수','목','금','토','일'][dow]} ${h}:00 — ${h+1}:00</div>
      </div>`;
  } else {
    el.innerHTML=`
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(232,255,71,.1);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px">✅</div>
      <div>
        <div class="status-label empty">현재 동아리방 비어 있음</div>
        <div class="status-team">사용 가능</div>
        <div class="status-sub" style="margin-top:4px">${['월','화','수','목','금','토','일'][dow]} ${h}:00 기준</div>
      </div>`;
  }
  bd.style.display='flex';
  document.body.style.overflow='hidden';
}
window.closeStatus=function(){
  document.getElementById('statusBd').style.display='none';
  document.body.style.overflow='';
};

// ── TOAST ─────────────────────────────────────────────────────────────
let toastT;
function toast(msg,type=''){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.className='toast'+(type?' '+type:''); el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display='none',2800);
}

init();
</script>
