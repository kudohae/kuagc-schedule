<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 시간표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:#0e0e0f; --surface:#18181b; --surface2:#222226; --border:#2e2e34;
    --accent:#e8ff47; --accent2:#47c5ff; --danger:#ff4747; --warn:#ffaa47;
    --text:#f0f0f0; --text2:#888; --text3:#555; --radius:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* ── HEADER ── */
  header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:rgba(14,14,15,.95);backdrop-filter:blur(8px);z-index:100;}
  .logo{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--accent);}
  .logo span{color:var(--text2);font-weight:400;margin-left:6px;font-size:12px;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .week-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;}
  .week-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;transition:color .15s;}
  .week-nav button:hover{color:var(--accent);}
  .week-label{font-family:'Space Mono',monospace;font-size:12px;color:var(--text);white-space:nowrap;min-width:130px;text-align:center;}
  .mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .mode-btn{padding:6px 14px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:all .15s;}
  .mode-btn.active{background:var(--accent);color:#000;font-weight:700;}

  /* ── LAYOUT ── */
  .container{display:flex;height:calc(100vh - 56px);}

  /* ── SIDEBAR ── */
  .sidebar{width:240px;min-width:240px;border-right:1px solid var(--border);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:16px;}
  .sidebar-section-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 4px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .team-list{display:flex;flex-direction:column;gap:2px;}
  .team-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .12s;}
  .team-item:hover{background:var(--surface2);}
  .team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .team-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .team-type{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
  .pending-list{display:flex;flex-direction:column;gap:6px;}
  .pending-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
  .pending-card.absent{border-left:3px solid var(--danger);}
  .pending-card.extra{border-left:3px solid var(--accent2);}
  .pending-title{font-size:12px;font-weight:700;}
  .pending-detail{font-size:11px;color:var(--text2);}
  .pending-actions{display:flex;gap:6px;}
  .btn-approve,.btn-reject{flex:1;padding:5px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;}
  .btn-approve{background:var(--accent);color:#000;}
  .btn-reject{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
  .btn-approve:hover,.btn-reject:hover{opacity:.8;}
  .no-pending{font-size:12px;color:var(--text3);padding:8px 4px;}
  .badge-pending{background:var(--warn);color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:900;}

  /* ── MAIN ── */
  .main{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
  .admin-bar{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
  .admin-bar-text{font-size:12px;color:var(--accent);font-weight:500;}
  .stats-bar{display:flex;gap:12px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;flex:1;}
  .stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .stat-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
  .empty-slots-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;}
  .empty-slots-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  .empty-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .empty-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .empty-chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  .schedule-title{padding:14px 18px 12px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);color:var(--text);}
  /* ── SCHEDULE GRID ── */
  .schedule-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .schedule-header{display:grid;grid-template-columns:60px repeat(7,1fr);border-bottom:1px solid var(--border);}
  .day-header{padding:10px 6px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text2);border-right:1px solid var(--border);}
  .day-header:last-child{border-right:none;}
  .schedule-body{display:flex;}
  .time-col{width:60px;min-width:60px;border-right:1px solid var(--border);}
  .time-cell{height:48px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);}
  .time-cell:last-child{border-bottom:none;}
  .days-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
  .day-col{border-right:1px solid var(--border);position:relative;}
  .day-col:last-child{border-right:none;}
  .slot{height:48px;border-bottom:1px solid var(--border);position:relative;cursor:pointer;transition:background .1s;}
  .slot:last-child{border-bottom:none;}
  .slot:hover{background:var(--surface2);}
  .slot-block{position:absolute;inset:2px;border-radius:5px;display:flex;align-items:center;padding:0 8px;gap:6px;overflow:hidden;cursor:pointer;transition:opacity .15s,transform .1s;}
  .slot-block:hover{opacity:.85;transform:scale(.98);}
  .slot-block-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#000;}
  .slot-block-tag{font-size:9px;font-weight:700;background:rgba(0,0,0,.2);color:#000;padding:1px 4px;border-radius:3px;flex-shrink:0;}
  .slot-block.absent{opacity:.35;}
  .slot-block.extra{outline:2px solid var(--accent2);}
  .slot-block.pending-block{opacity:.6;}
  .slot-empty{position:absolute;inset:2px;border-radius:5px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s;}
  .slot-empty:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.04);}

  /* ── MODAL ── */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .15s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:400px;max-width:95vw;animation:slideUp .18s;overflow:hidden;}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:15px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow-y:auto;}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .field-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;}
  .field-input,.field-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .field-input:focus,.field-select:focus{border-color:var(--accent);}
  .field-select option{background:var(--surface);}
  .btn{padding:8px 18px;border-radius:6px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:.8;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .btn-danger{background:var(--danger);color:#fff;}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .info-row:last-child{border-bottom:none;}
  .info-key{color:var(--text2);}
  .tag-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;}

  /* ── LOADING ── */
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:'Space Mono',monospace;font-size:12px;color:var(--text2);}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;z-index:999;animation:fadeIn .2s;white-space:nowrap;}
  .toast.success{border-color:var(--accent);color:var(--accent);}
  .toast.error{border-color:var(--danger);color:var(--danger);}

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading...</div>
</div>

<header>
  <div class="logo">BAND<span>동아리방 시간표</span></div>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="weekLabel">—</div>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnUser" onclick="setMode('user')">이용자</button>
      <button class="mode-btn" id="btnAdmin" onclick="handleAdminClick()">관리자</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div>
      <div class="sidebar-section-title">팀 목록</div>
      <div class="team-list" id="teamList"><div class="no-pending">불러오는 중...</div></div>
    </div>
    <div>
      <div class="sidebar-section-title" id="pendingTitle">대기 중 신청</div>
      <div class="pending-list" id="pendingList"><div class="no-pending">불러오는 중...</div></div>
    </div>
  </div>

  <div class="main">
    <div class="admin-bar" id="adminBar" style="display:none">
      <div class="admin-bar-text">🔧 관리자 모드 — 슬롯 클릭으로 수정, 빈 칸 클릭으로 추가</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="font-size:12px" onclick="openTeamManagerModal()">팀 관리</button>
        <button class="btn btn-primary" style="font-size:12px" onclick="openAddSlotModal()">+ 슬롯 추가</button>
      </div>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="empty-slots-bar" id="emptySlotsBar"></div>
    <div class="schedule-wrapper">
      <div class="schedule-title" id="scheduleTitle"></div>
      <div class="schedule-header" id="scheduleHeader"></div>
      <div class="schedule-body">
        <div class="time-col" id="timeCol"></div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" style="display:none" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase.js';
import { isAdmin, loginAdmin, logoutAdmin } from './js/auth.js';
import {
  fetchTeams, createTeam, updateTeam, deleteTeam,
  fetchSlots, createSlot, updateSlot, deleteSlot,
  fetchRequests, createRequest, approveRequest, rejectRequest,
  subscribeChanges
} from './js/schedule.js';

// ── CONSTANTS ────────────────────────────────────────────────────────
const DAYS  = ['월','화','수','목','금','토','일'];
const HOURS = Array.from({length:18},(_,i)=>i+8); // 08~25(익일01)

// ── STATE ─────────────────────────────────────────────────────────────
let weekOffset = 0;
let mode = 'user';
let teams = [], slots = [], requests = [];

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  if (isAdmin()) { mode = 'admin'; syncModeUI(); }
  await loadAll();
  document.getElementById('loadingOverlay').style.display = 'none';

  // 실시간 구독
  subscribeChanges(
    () => { fetchSlots(weekOffset).then(d=>{slots=d;render();}); },
    () => { fetchRequests(weekOffset).then(d=>{requests=d;renderPending();renderStats();}); }
  );
}

async function loadAll() {
  [teams, slots, requests] = await Promise.all([
    fetchTeams(),
    fetchSlots(weekOffset),
    fetchRequests(weekOffset),
  ]);
  render();
}

// ── WEEK ──────────────────────────────────────────────────────────────
function getWeekLabel(offset) {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + offset*7);
  const month = mon.getMonth()+1;
  const weekNum = Math.ceil((mon.getDate()+(new Date(mon.getFullYear(),mon.getMonth(),1).getDay()+6)%7)/7);
  return `${month}월 ${weekNum}주차 동아리방 사용 시간표`;
}

window.changeWeek = async function(delta) {
  weekOffset += delta;
  [slots, requests] = await Promise.all([fetchSlots(weekOffset), fetchRequests(weekOffset)]);
  render();
};

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  document.getElementById('weekLabel').textContent = getWeekLabel(weekOffset);
  const titleEl = document.getElementById('scheduleTitle');
  if(titleEl) titleEl.textContent = getWeekLabel(weekOffset);
  renderTeamList();
  renderPending();
  renderStats();
  renderEmptySlots();
  renderSchedule();
  document.getElementById('adminBar').style.display = mode==='admin'?'flex':'none';
}

function renderTeamList() {
  const groups = [
    { key: '합주', label: '합주' },
    { key: '스쿨', label: '스쿨' },
    { key: '이외', label: '이외' },
  ];
  document.getElementById('teamList').innerHTML = groups.map(g => {
    const list = teams.filter(t => t.type === g.key);
    if (!list.length) return '';
    return `
      <div style="margin-bottom:4px">
        <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;padding:6px 8px 4px">${g.label}</div>
        ${list.map(t=>`
          <div class="team-item">
            <div class="team-dot" style="background:${t.color}"></div>
            <div class="team-name">${t.name}</div>
          </div>`).join('')}
      </div>`;
  }).join('');
}

function renderPending() {
  const pending = requests.filter(r=>r.status==='pending');
  const title   = document.getElementById('pendingTitle');
  const list    = document.getElementById('pendingList');
  title.innerHTML = `대기 중 신청${pending.length?` <span class="badge-pending">${pending.length}</span>`:''}`;

  if (!pending.length) { list.innerHTML='<div class="no-pending">대기 중인 신청 없음</div>'; return; }

  list.innerHTML = pending.map(r=>{
    const typeLabel = r.type==='absent'?'미사용':'추가사용';
    const actions = mode==='admin'?`
      <div class="pending-actions">
        <button class="btn-approve" onclick="handleApprove(${r.id})">승인</button>
        <button class="btn-reject" onclick="handleReject(${r.id})">거절</button>
      </div>`:''
    ;
    return `
      <div class="pending-card ${r.type}">
        <div class="pending-title" style="color:${r.teams.color}">${r.teams.name}</div>
        <div class="pending-detail">${DAYS[r.day]} ${r.hour}:00 · ${typeLabel}</div>
        <div class="pending-detail">${r.reason}</div>
        ${r.requester_name?`<div class="pending-detail">신청자: ${r.requester_name}</div>`:''}
        ${actions}
      </div>`;
  }).join('');
}

function renderStats() {
  const absent  = slots.filter(s=>s.status==='absent').length;
  const extra   = slots.filter(s=>s.slot_type==='extra').length;
  const pending = requests.filter(r=>r.status==='pending').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">이번 주 배정</div><div class="stat-value">${slots.length}</div></div>
    <div class="stat-card"><div class="stat-label">미사용 확정</div><div class="stat-value" style="color:var(--danger)">${absent}</div></div>
    <div class="stat-card"><div class="stat-label">추가 사용</div><div class="stat-value" style="color:var(--accent2)">${extra}</div></div>
    <div class="stat-card"><div class="stat-label">대기 신청</div><div class="stat-value" style="color:var(--warn)">${pending}</div></div>
  `;
}

function renderEmptySlots() {
  const occupied = new Set(slots.filter(s=>s.status!=='absent').map(s=>`${s.day}-${s.hour}`));
  const empties = [];
  outer: for (let d=0;d<7;d++) for (const h of HOURS) {
    if (!occupied.has(`${d}-${h}`) && (occupied.has(`${d}-${h-1}`)||occupied.has(`${d}-${h+1}`))) {
      empties.push({day:d,hour:h});
      if(empties.length>=8) break outer;
    }
  }
  const bar = document.getElementById('emptySlotsBar');
  if (!empties.length) { bar.innerHTML='<div class="empty-slots-title">빈 시간대 없음</div>'; return; }
  bar.innerHTML = `
    <div class="empty-slots-title">⚡ 사용 가능한 빈 시간대 (클릭 → 신청)</div>
    <div class="empty-chips">${empties.map(e=>`
      <div class="empty-chip" onclick="openClaimModal(${e.day},${e.hour})">
        <div class="chip-dot"></div>${DAYS[e.day]} ${e.hour}:00
      </div>`).join('')}
    </div>`;
}

function renderSchedule() {
  document.getElementById('scheduleHeader').innerHTML =
    '<div class="day-header"></div>'+DAYS.map(d=>`<div class="day-header">${d}</div>`).join('');
  document.getElementById('timeCol').innerHTML = HOURS.map(h=>`<div class="time-cell">${h<24?h+':00':(h-24<10?'0'+(h-24):h-24)+':00'}<br><span style="font-size:8px;color:var(--text3)">${h>=24?'익일':''}</span></div>`).join('');

  const grid = document.getElementById('daysGrid');
  grid.innerHTML='';

  for (let d=0;d<7;d++) {
    const col = document.createElement('div');
    col.className='day-col';
    for (const h of HOURS) {
      const cell = document.createElement('div');
      cell.className='slot';
      const slot = slots.find(s=>s.day===d&&s.hour===h);
      const pendingExtra = requests.find(r=>r.type==='extra'&&r.day===d&&r.hour===h&&r.status==='pending');

      if (slot) {
        const t=slot.teams, absent=slot.status==='absent', extra=slot.slot_type==='extra';
        const displayColor = teamColor(t.type, t.color);
        const blk=document.createElement('div');
        blk.className=`slot-block${absent?' absent':''}${extra?' extra':''}`;
        blk.style.background = absent?'transparent':displayColor;
        if(absent) blk.style.border=`1px dashed ${displayColor}`;
        blk.innerHTML=`
          <span class="slot-block-name" style="color:${absent?displayColor:'#000'}">${t.name}</span>
          <span class="slot-block-tag" style="color:${absent?displayColor:'#000'};background:${absent?'transparent':'rgba(0,0,0,.15)'}">${absent?'미사용':t.type}</span>`;
        blk.onclick=()=>openSlotModal(slot);
        cell.appendChild(blk);
      } else if (pendingExtra) {
        const t=pendingExtra.teams;
        const displayColor = teamColor(t.type, t.color);
        const blk=document.createElement('div');
        blk.className='slot-block pending-block';
        blk.style.cssText=`background:${displayColor}33;border:1px dashed ${displayColor}`;
        blk.innerHTML=`<span class="slot-block-name" style="color:${displayColor}">${t.name}</span><span class="slot-block-tag" style="color:${displayColor}">대기</span>`;
        blk.onclick=()=>openRequestDetailModal(pendingExtra);
        cell.appendChild(blk);
      } else {
        const ind=document.createElement('div');
        ind.className='slot-empty';
        ind.textContent=mode==='admin'?'+':'신청';
        ind.onclick=mode==='admin'?()=>openAddSlotModal(d,h):()=>openClaimModal(d,h);
        cell.appendChild(ind);
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────
function showModal(title, bodyHTML, footerHTML) {
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHTML;
  document.getElementById('modalFooter').innerHTML=footerHTML;
  document.getElementById('modalBackdrop').style.display='flex';
}
window.closeModal = ()=>{ document.getElementById('modalBackdrop').style.display='none'; };
window.onBackdropClick = e=>{ if(e.target===document.getElementById('modalBackdrop')) closeModal(); };

// ── SLOT MODAL ────────────────────────────────────────────────────────
window.openSlotModal = function(slot) {
  const t=slot.teams, absent=slot.status==='absent', extra=slot.slot_type==='extra';
  const body=`
    <div class="info-row"><span class="info-key">팀</span><span style="color:${t.color};font-weight:700">${t.name}</span></div>
    <div class="info-row"><span class="info-key">시간</span><span>${DAYS[slot.day]} ${slot.hour}:00</span></div>
    <div class="info-row"><span class="info-key">종류</span><span>${extra?'추가 사용':t.type}</span></div>
    <div class="info-row"><span class="info-key">상태</span><span>${absent?'⛔ 미사용 확정':'✅ 정상'}</span></div>`;
  let footer;
  if (mode==='admin') {
    footer=`
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      <button class="btn btn-danger" onclick="handleDeleteSlot(${slot.id})">삭제</button>
      <button class="btn btn-primary" onclick="openEditSlotModal(${slot.id})">수정</button>`;
  } else if (!absent) {
    footer=`
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      <button class="btn btn-danger" onclick="openAbsenceModal(${slot.id})">미사용 신고</button>`;
  } else {
    footer=`<button class="btn btn-secondary" onclick="closeModal()">닫기</button>`;
  }
  showModal(`${t.name} · ${DAYS[slot.day]} ${slot.hour}:00`, body, footer);
};

// ── ABSENCE MODAL ─────────────────────────────────────────────────────
window.openAbsenceModal = function(slotId) {
  const slot=slots.find(s=>s.id===slotId);
  const t=slot.teams;
  showModal('미사용 신고',
    `<div class="info-row"><span class="info-key">팀</span><span style="color:${t.color};font-weight:700">${t.name}</span></div>
     <div class="info-row"><span class="info-key">시간</span><span>${DAYS[slot.day]} ${slot.hour}:00</span></div>
     <div><div class="field-label">신청자 이름</div><input class="field-input" id="absenceName" placeholder="이름 (선택)"/></div>
     <div><div class="field-label">사유 *</div><input class="field-input" id="absenceReason" placeholder="예: 팀원 시험 기간"/></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
     <button class="btn btn-danger" id="absenceSubmit" onclick="submitAbsence(${slotId})">신고 제출</button>`
  );
};

window.submitAbsence = async function(slotId) {
  const reason=document.getElementById('absenceReason').value.trim();
  const name=document.getElementById('absenceName').value.trim();
  if(!reason){showToast('사유를 입력해주세요','error');return;}
  const btn=document.getElementById('absenceSubmit');
  btn.disabled=true; btn.textContent='제출 중...';
  try {
    const slot=slots.find(s=>s.id===slotId);
    await createRequest({type:'absent',team_id:slot.team_id,slot_id:slot.id,day:slot.day,hour:slot.hour,week_offset:weekOffset,reason,requester_name:name});
    closeModal(); showToast('미사용 신고가 제출됐습니다');
    requests=await fetchRequests(weekOffset); renderPending(); renderStats();
  } catch(e){ showToast(e.message,'error'); btn.disabled=false; btn.textContent='신고 제출'; }
};

// ── CLAIM MODAL ───────────────────────────────────────────────────────
window.openClaimModal = function(day, hour) {
  showModal(`추가 사용 신청 · ${DAYS[day]} ${hour}:00`,
    `<div><div class="field-label">팀 선택 *</div>
       <select class="field-select" id="claimTeam">
         ${teams.map(t=>`<option value="${t.id}">${t.name} (${t.type})</option>`).join('')}
       </select></div>
     <div><div class="field-label">신청자 이름</div><input class="field-input" id="claimName" placeholder="이름 (선택)"/></div>
     <div><div class="field-label">사유 *</div><input class="field-input" id="claimReason" placeholder="예: 공연 준비 합주"/></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
     <button class="btn btn-primary" id="claimSubmit" onclick="submitClaim(${day},${hour})">신청 제출</button>`
  );
};

window.submitClaim = async function(day,hour) {
  const teamId=parseInt(document.getElementById('claimTeam').value);
  const reason=document.getElementById('claimReason').value.trim();
  const name=document.getElementById('claimName').value.trim();
  if(!reason){showToast('사유를 입력해주세요','error');return;}
  const btn=document.getElementById('claimSubmit');
  btn.disabled=true; btn.textContent='제출 중...';
  try {
    await createRequest({type:'extra',team_id:teamId,day,hour,week_offset:weekOffset,reason,requester_name:name});
    closeModal(); showToast('추가 사용 신청이 제출됐습니다');
    requests=await fetchRequests(weekOffset); renderPending(); renderStats(); renderSchedule(); renderEmptySlots();
  } catch(e){ showToast(e.message,'error'); btn.disabled=false; btn.textContent='신청 제출'; }
};

// ── REQUEST DETAIL ────────────────────────────────────────────────────
window.openRequestDetailModal = function(req) {
  const t=req.teams;
  showModal('승인 대기 중',
    `<div class="info-row"><span class="info-key">팀</span><span style="color:${t.color};font-weight:700">${t.name}</span></div>
     <div class="info-row"><span class="info-key">시간</span><span>${DAYS[req.day]} ${req.hour}:00</span></div>
     <div class="info-row"><span class="info-key">사유</span><span>${req.reason}</span></div>
     <div class="info-row"><span class="info-key">신청자</span><span>${req.requester_name||'미기입'}</span></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">닫기</button>`
  );
};

// ── ADD SLOT (admin) ──────────────────────────────────────────────────
window.openAddSlotModal = function(day=0, hour=10) {
  showModal('슬롯 추가',
    `<div><div class="field-label">팀</div>
       <select class="field-select" id="addTeam">${teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
     <div><div class="field-label">요일</div>
       <select class="field-select" id="addDay">${DAYS.map((d,i)=>`<option value="${i}" ${i===day?'selected':''}>${d}</option>`).join('')}</select></div>
     <div><div class="field-label">시간</div>
       <select class="field-select" id="addHour">${HOURS.map(h=>`<option value="${h}" ${h===hour?'selected':''}>${h}:00</option>`).join('')}</select></div>
     <div><div class="field-label">종류</div>
       <select class="field-select" id="addType"><option value="regular">정규</option><option value="extra">추가</option></select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
     <button class="btn btn-primary" id="addSubmit" onclick="submitAddSlot()">추가</button>`
  );
};

window.submitAddSlot = async function() {
  const team_id=parseInt(document.getElementById('addTeam').value);
  const day=parseInt(document.getElementById('addDay').value);
  const hour=parseInt(document.getElementById('addHour').value);
  const slot_type=document.getElementById('addType').value;
  const btn=document.getElementById('addSubmit');
  btn.disabled=true; btn.textContent='추가 중...';
  try {
    await createSlot({team_id,day,hour,slot_type,week_offset:weekOffset});
    closeModal(); showToast('슬롯이 추가됐습니다','success');
    slots=await fetchSlots(weekOffset); render();
  } catch(e){ showToast(e.message.includes('unique')?'이미 해당 시간에 슬롯이 있습니다':e.message,'error'); btn.disabled=false; btn.textContent='추가'; }
};

// ── EDIT SLOT (admin) ─────────────────────────────────────────────────
window.openEditSlotModal = function(slotId) {
  const slot=slots.find(s=>s.id===slotId);
  showModal('슬롯 수정',
    `<div><div class="field-label">팀</div>
       <select class="field-select" id="editTeam">${teams.map(t=>`<option value="${t.id}" ${t.id===slot.team_id?'selected':''}>${t.name}</option>`).join('')}</select></div>
     <div><div class="field-label">요일</div>
       <select class="field-select" id="editDay">${DAYS.map((d,i)=>`<option value="${i}" ${i===slot.day?'selected':''}>${d}</option>`).join('')}</select></div>
     <div><div class="field-label">시간</div>
       <select class="field-select" id="editHour">${HOURS.map(h=>`<option value="${h}" ${h===slot.hour?'selected':''}>${h}:00</option>`).join('')}</select></div>
     <div><div class="field-label">상태</div>
       <select class="field-select" id="editStatus"><option value="normal" ${slot.status!=='absent'?'selected':''}>정상</option><option value="absent" ${slot.status==='absent'?'selected':''}>미사용</option></select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
     <button class="btn btn-primary" id="editSubmit" onclick="submitEditSlot(${slotId})">저장</button>`
  );
};

window.submitEditSlot = async function(slotId) {
  const btn=document.getElementById('editSubmit');
  btn.disabled=true; btn.textContent='저장 중...';
  try {
    await updateSlot(slotId,{
      team_id:parseInt(document.getElementById('editTeam').value),
      day:parseInt(document.getElementById('editDay').value),
      hour:parseInt(document.getElementById('editHour').value),
      status:document.getElementById('editStatus').value,
    });
    closeModal(); showToast('슬롯이 수정됐습니다','success');
    slots=await fetchSlots(weekOffset); render();
  } catch(e){ showToast(e.message,'error'); btn.disabled=false; btn.textContent='저장'; }
};

window.handleDeleteSlot = async function(slotId) {
  if(!confirm('이 슬롯을 삭제할까요?')) return;
  try {
    await deleteSlot(slotId); showToast('슬롯이 삭제됐습니다');
    slots=await fetchSlots(weekOffset); render();
  } catch(e){ showToast(e.message,'error'); }
};

// ── APPROVE / REJECT ──────────────────────────────────────────────────
window.handleApprove = async function(reqId) {
  const req=requests.find(r=>r.id===reqId);
  if(!req) return;
  try {
    await approveRequest(req); showToast('승인됐습니다','success');
    [slots,requests]=await Promise.all([fetchSlots(weekOffset),fetchRequests(weekOffset)]);
    render();
  } catch(e){ showToast(e.message,'error'); }
};

window.handleReject = async function(reqId) {
  try {
    await rejectRequest(reqId); showToast('거절됐습니다');
    requests=await fetchRequests(weekOffset); renderPending(); renderStats();
  } catch(e){ showToast(e.message,'error'); }
};

// ── TEAM MANAGER (admin) ──────────────────────────────────────────────
const COLORS=['#47c5ff','#ff6b6b','#6bffb8','#ffaa47','#c47fff','#ff47a0','#47ffea','#ffd447','#b4ff47','#ff9d47'];
const GRAY_COLOR = '#888888';

function teamColor(type, color) {
  return type === '합주' ? GRAY_COLOR : color;
}

window.openTeamManagerModal = function() {
  const groups = ['합주','스쿨','이외'];
  const rows = groups.map(g => {
    const list = teams.filter(t=>t.type===g);
    if(!list.length) return '';
    return `<div style="margin-bottom:2px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:8px 0 4px">${g}</div>
      ${list.map(t=>`
        <div class="info-row">
          <span style="display:flex;align-items:center;gap:8px">
            <span class="team-dot" style="background:${teamColor(t.type,t.color)}"></span>
            <span style="font-weight:600">${t.name}</span>
          </span>
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="handleDeleteTeam(${t.id})">삭제</button>
        </div>`).join('')}
    </div>`;
  }).join('');

  const paletteSwatches = COLORS.map(c=>`
    <div onclick="selectPaletteColor('${c}')" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid transparent;transition:border-color .15s" id="swatch-${c.replace('#','')}"></div>
  `).join('');

  showModal('팀 관리',
    `${rows}
     <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border)">
       <div style="font-size:12px;font-weight:700;margin-bottom:12px;color:var(--text)">새 팀 추가</div>
       <div style="display:grid;grid-template-columns:1fr 90px;gap:8px;margin-bottom:10px">
         <div><div class="field-label">팀 이름</div><input class="field-input" id="newTeamName" placeholder="팀 이름"/></div>
         <div><div class="field-label">분류</div>
           <select class="field-select" id="newTeamType" onchange="onTeamTypeChange()">
             <option>합주</option><option>스쿨</option><option>이외</option>
           </select>
         </div>
       </div>
       <div id="colorPickerArea" style="display:none">
         <div class="field-label">컬러</div>
         <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${paletteSwatches}</div>
         <input type="hidden" id="newTeamColor" value="${COLORS[0]}"/>
       </div>
       <div id="grayNotice" style="font-size:11px;color:var(--text3);margin-top:4px">합주 팀은 자동으로 회색으로 표시됩니다</div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">닫기</button>
     <button class="btn btn-primary" onclick="submitNewTeam()">팀 추가</button>`
  );
  // init swatch selection
  selectPaletteColor(COLORS[0]);
};

window.onTeamTypeChange = function() {
  const type = document.getElementById('newTeamType').value;
  const isColored = type !== '합주';
  document.getElementById('colorPickerArea').style.display = isColored ? 'block' : 'none';
  document.getElementById('grayNotice').style.display = isColored ? 'none' : 'block';
};

window.selectPaletteColor = function(color) {
  document.getElementById('newTeamColor').value = color;
  COLORS.forEach(c => {
    const el = document.getElementById('swatch-'+c.replace('#',''));
    if(el) el.style.borderColor = c === color ? '#fff' : 'transparent';
  });
};

window.submitNewTeam = async function() {
  const name=document.getElementById('newTeamName').value.trim();
  const type=document.getElementById('newTeamType').value;
  const color= type==='합주' ? GRAY_COLOR : (document.getElementById('newTeamColor')?.value || COLORS[0]);
  if(!name){showToast('팀 이름을 입력해주세요','error');return;}
  try {
    const t=await createTeam({name,type,color});
    teams.push(t); renderTeamList();
    showToast(`${name} 팀이 추가됐습니다`,'success');
    openTeamManagerModal();
  } catch(e){ showToast(e.message,'error'); }
};

window.handleDeleteTeam = async function(id) {
  if(!confirm('팀을 삭제하면 해당 팀의 모든 슬롯도 삭제됩니다. 계속할까요?')) return;
  try {
    await deleteTeam(id);
    teams=teams.filter(t=>t.id!==id);
    slots=slots.filter(s=>s.team_id!==id);
    showToast('팀이 삭제됐습니다');
    openTeamManagerModal(); render();
  } catch(e){ showToast(e.message,'error'); }
};

// ── AUTH ──────────────────────────────────────────────────────────────
function syncModeUI() {
  document.getElementById('btnUser').classList.toggle('active',mode==='user');
  document.getElementById('btnAdmin').classList.toggle('active',mode==='admin');
  document.getElementById('btnAdmin').textContent=mode==='admin'?'로그아웃':'관리자';
}

window.setMode = function(m) {
  mode=m; syncModeUI(); render();
};

window.handleAdminClick = function() {
  if (mode==='admin') { logoutAdmin(); mode='user'; syncModeUI(); render(); return; }
  showModal('관리자 로그인',
    `<div><div class="field-label">비밀번호</div>
       <input class="field-input" id="adminPw" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')submitAdminLogin()"/></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button>
     <button class="btn btn-primary" id="loginBtn" onclick="submitAdminLogin()">로그인</button>`
  );
  setTimeout(()=>document.getElementById('adminPw')?.focus(),100);
};

window.submitAdminLogin = async function() {
  const pw=document.getElementById('adminPw').value;
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='확인 중...';
  try {
    await loginAdmin(pw);
    mode='admin'; closeModal(); syncModeUI(); render();
    showToast('관리자로 로그인됐습니다','success');
  } catch(e){ showToast(e.message,'error'); btn.disabled=false; btn.textContent='로그인'; }
};

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
window.showToast = function(msg, type='') {
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  el.className=`toast${type?' '+type:''}`;
  el.textContent=msg; el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.style.display='none'; },2800);
};

init();
</script>
</body>
</html>
