<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 시간표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e34;
    --accent: #e8ff47;
    --accent2: #47c5ff;
    --danger: #ff4747;
    --warn: #ffaa47;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ─── HEADER ─── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(14,14,15,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text2); font-weight: 400; margin-left: 6px; font-size: 12px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .mode-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    transition: all .15s;
  }
  .mode-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .week-nav button {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px;
    transition: color .15s;
  }
  .week-nav button:hover { color: var(--accent); }
  .week-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    min-width: 120px;
    text-align: center;
  }

  /* ─── LAYOUT ─── */
  .container { display: flex; height: calc(100vh - 56px); }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 0 4px 8px;
    border-bottom: 1px solid var(--border);
  }

  .team-list { display: flex; flex-direction: column; gap: 2px; }

  .team-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s;
  }
  .team-item:hover { background: var(--surface2); }
  .team-item.selected { background: var(--surface2); outline: 1px solid var(--border); }

  .team-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .team-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .team-type {
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Pending badges */
  .pending-list { display: flex; flex-direction: column; gap: 6px; }
  .pending-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .pending-card.absence { border-left: 3px solid var(--danger); }
  .pending-card.extra { border-left: 3px solid var(--accent2); }
  .pending-title { font-size: 12px; font-weight: 700; }
  .pending-detail { font-size: 11px; color: var(--text2); }
  .pending-actions { display: flex; gap: 6px; }
  .btn-approve, .btn-reject {
    flex: 1;
    padding: 5px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .15s;
  }
  .btn-approve { background: var(--accent); color: #000; }
  .btn-reject { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
  .btn-approve:hover, .btn-reject:hover { opacity: .8; }

  .no-pending { font-size: 12px; color: var(--text3); padding: 8px 4px; }

  /* ─── MAIN ─── */
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: flex;
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    flex: 1;
  }
  .stat-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; }
  .stat-value.green { color: var(--accent); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.red { color: var(--danger); }

  /* ─── EMPTY SLOTS ─── */
  .empty-slots-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .empty-slots-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .empty-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .empty-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .empty-chip:hover { border-color: var(--accent); color: var(--accent); }
  .empty-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ─── SCHEDULE GRID ─── */
  .schedule-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .schedule-header {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .day-header {
    padding: 10px 6px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text2);
    border-right: 1px solid var(--border);
  }
  .day-header:last-child { border-right: none; }
  .day-header.today { color: var(--accent); }

  .schedule-body { display: flex; }

  .time-col {
    width: 60px;
    min-width: 60px;
    border-right: 1px solid var(--border);
  }
  .time-cell {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .time-cell:last-child { border-bottom: none; }

  .days-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .day-col {
    border-right: 1px solid var(--border);
    position: relative;
  }
  .day-col:last-child { border-right: none; }

  .slot {
    height: 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: background .1s;
  }
  .slot:last-child { border-bottom: none; }
  .slot:hover { background: var(--surface2); }

  .slot-block {
    position: absolute;
    inset: 2px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .slot-block:hover { opacity: .85; transform: scale(0.98); }

  .slot-block-name {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #000;
  }
  .slot-block-tag {
    font-size: 9px;
    font-weight: 700;
    background: rgba(0,0,0,0.2);
    color: #000;
    padding: 1px 4px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .slot-block.absent {
    opacity: 0.35;
    text-decoration: line-through;
  }
  .slot-block.absent .slot-block-name { color: var(--text2); }

  .slot-block.extra {
    outline: 2px solid var(--accent2);
  }

  .slot-empty-indicator {
    position: absolute;
    inset: 2px;
    border-radius: 5px;
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
  }
  .slot-empty-indicator:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  /* ─── MODAL ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
    animation: fadeIn .15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 380px;
    max-width: 95vw;
    animation: slideUp .18s;
    overflow: hidden;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }

  .field-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }

  .field-input, .field-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .field-input:focus, .field-select:focus { border-color: var(--accent); }
  .field-select option { background: var(--surface); }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }

  .slot-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .slot-info-row:last-child { border-bottom: none; }
  .slot-info-key { color: var(--text2); }

  .tag-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
  }
  .tag-school { background: rgba(232,255,71,0.15); color: var(--accent); }
  .tag-concert { background: rgba(71,197,255,0.15); color: var(--accent2); }
  .tag-extra { background: rgba(71,197,255,0.12); color: var(--accent2); border: 1px solid rgba(71,197,255,0.3); }
  .tag-absent { background: rgba(255,71,71,0.12); color: var(--danger); border: 1px solid rgba(255,71,71,0.3); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    animation: fadeIn .2s;
  }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  .badge-pending {
    background: var(--warn);
    color: #000;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 900;
  }

  /* admin edit mode */
  .admin-bar {
    background: rgba(232,255,71,0.06);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-bar-text { font-size: 12px; color: var(--accent); font-weight: 500; }
  .btn-add-slot { background: var(--accent); color: #000; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">BAND<span>동아리방 시간표</span></div>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="weekLabel">—</div>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnUser" onclick="setMode('user')">이용자</button>
      <button class="mode-btn" id="btnAdmin" onclick="setMode('admin')">관리자</button>
    </div>
  </div>
</header>

<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="sidebar-section-title">팀 목록</div>
      <div class="team-list" id="teamList"></div>
    </div>
    <div id="pendingSection">
      <div class="sidebar-section-title" id="pendingTitle">대기 중 신청</div>
      <div class="pending-list" id="pendingList"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Admin Bar -->
    <div class="admin-bar" id="adminBar" style="display:none">
      <div class="admin-bar-text">🔧 관리자 모드 — 슬롯 클릭으로 수정, 빈 슬롯 클릭으로 추가</div>
      <button class="btn btn-add-slot" onclick="openAddSlotModal()">+ 슬롯 추가</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Empty slots -->
    <div class="empty-slots-bar" id="emptySlotsBar"></div>

    <!-- Schedule -->
    <div class="schedule-wrapper">
      <div class="schedule-header" id="scheduleHeader"></div>
      <div class="schedule-body">
        <div class="time-col" id="timeCol"></div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────

const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
const HOURS = Array.from({length: 14}, (_, i) => i + 10); // 10:00 ~ 23:00

const TEAM_COLORS = [
  '#e8ff47','#47c5ff','#ff6b6b','#6bffb8','#ffaa47',
  '#c47fff','#ff47a0','#47ffea','#ffd447','#b4ff47'
];

const TEAMS = [
  { id: 1, name: '블루문', type: '합주' },
  { id: 2, name: '소닉붐', type: '합주' },
  { id: 3, name: '레드스타', type: '합주' },
  { id: 4, name: '더웨이브', type: '합주' },
  { id: 5, name: '에코', type: '스쿨' },
  { id: 6, name: '그루브팩토리', type: '합주' },
  { id: 7, name: '노이즈', type: '합주' },
  { id: 8, name: '선셋', type: '스쿨' },
].map((t, i) => ({ ...t, color: TEAM_COLORS[i] }));

// Slots: { id, teamId, day(0-6), hour, type:'regular'|'extra', status:'normal'|'absent'|'pending_absent'|'pending_extra' }
let slots = [
  { id: 1, teamId: 1, day: 0, hour: 14, type: 'regular' },
  { id: 2, teamId: 2, day: 0, hour: 15, type: 'regular' },
  { id: 3, teamId: 3, day: 1, hour: 13, type: 'regular' },
  { id: 4, teamId: 4, day: 1, hour: 16, type: 'regular' },
  { id: 5, teamId: 5, day: 2, hour: 11, type: 'regular' },
  { id: 6, teamId: 6, day: 2, hour: 14, type: 'regular' },
  { id: 7, teamId: 7, day: 3, hour: 10, type: 'regular' },
  { id: 8, teamId: 8, day: 3, hour: 15, type: 'regular' },
  { id: 9, teamId: 1, day: 4, hour: 16, type: 'regular' },
  { id: 10, teamId: 3, day: 4, hour: 18, type: 'regular' },
  { id: 11, teamId: 2, day: 5, hour: 12, type: 'regular' },
  { id: 12, teamId: 5, day: 6, hour: 14, type: 'regular' },
  { id: 13, teamId: 4, day: 2, hour: 19, type: 'regular' },
  { id: 14, teamId: 6, day: 5, hour: 17, type: 'regular' },
];

// Pending requests
let pendingRequests = [
  { id: 'r1', type: 'absent', teamId: 2, day: 0, hour: 15, reason: '팀원 시험 기간', status: 'pending' },
  { id: 'r2', type: 'extra', teamId: 7, day: 1, hour: 17, reason: '공연 준비 합주', status: 'pending' },
];

let slotIdCounter = 100;
let requestIdCounter = 10;

// Week state
let weekOffset = 0;
let mode = 'user'; // 'user' | 'admin'

// ─── WEEK HELPERS ────────────────────────────────────────────────────────

function getWeekLabel(offset) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - now.getDay() + 1 + offset * 7);
  const month = monday.getMonth() + 1;
  // week of month
  const firstDay = new Date(monday.getFullYear(), monday.getMonth(), 1);
  const weekNum = Math.ceil((monday.getDate() + firstDay.getDay() - 1) / 7);
  return `${month}월 ${weekNum}주차`;
}

function changeWeek(delta) {
  weekOffset += delta;
  render();
}

// ─── TEAM HELPERS ─────────────────────────────────────────────────────────

function teamById(id) { return TEAMS.find(t => t.id === id); }

// ─── STATS ───────────────────────────────────────────────────────────────

function computeStats() {
  const total = slots.length;
  const absent = slots.filter(s => s.status === 'absent').length;
  const extra = slots.filter(s => s.type === 'extra' && s.status !== 'absent').length;
  const empty = countEmptySlots();
  return { total, absent, extra, empty };
}

function countEmptySlots() {
  // Count hours where no slot exists (spot check a few busy days)
  let count = 0;
  for (let d = 0; d < 7; d++) {
    for (const h of HOURS) {
      const has = slots.find(s => s.day === d && s.hour === h && s.status !== 'absent');
      if (!has) count++;
    }
  }
  return count; // raw count for demo
}

function getEmptySlots() {
  // Only return hours that are empty AND adjacent to occupied ones (meaningful gaps)
  const occupied = new Set(slots.filter(s=>s.status!=='absent').map(s=>`${s.day}-${s.hour}`));
  const result = [];
  for (let d = 0; d < 7; d++) {
    for (const h of HOURS) {
      const key = `${d}-${h}`;
      if (!occupied.has(key)) {
        // check if neighbor occupied
        const adj = occupied.has(`${d}-${h-1}`) || occupied.has(`${d}-${h+1}`);
        if (adj) result.push({ day: d, hour: h });
        if (result.length >= 8) break;
      }
    }
    if (result.length >= 8) break;
  }
  return result;
}

// ─── RENDER ──────────────────────────────────────────────────────────────

function render() {
  document.getElementById('weekLabel').textContent = getWeekLabel(weekOffset);
  renderTeamList();
  renderPending();
  renderStats();
  renderEmptySlots();
  renderSchedule();
  document.getElementById('adminBar').style.display = mode === 'admin' ? 'flex' : 'none';
}

function renderTeamList() {
  const el = document.getElementById('teamList');
  el.innerHTML = TEAMS.map(t => `
    <div class="team-item" onclick="filterTeam(${t.id})">
      <div class="team-dot" style="background:${t.color}"></div>
      <div class="team-name">${t.name}</div>
      <div class="team-type">${t.type}</div>
    </div>
  `).join('');
}

function renderPending() {
  const list = document.getElementById('pendingList');
  const title = document.getElementById('pendingTitle');
  const pending = pendingRequests.filter(r => r.status === 'pending');
  title.innerHTML = `대기 중 신청 ${pending.length > 0 ? `<span class="badge-pending">${pending.length}</span>` : ''}`;

  if (!pending.length) {
    list.innerHTML = '<div class="no-pending">대기 중인 신청 없음</div>';
    return;
  }

  if (mode !== 'admin') {
    list.innerHTML = pending.map(r => {
      const team = teamById(r.teamId);
      const typeLabel = r.type === 'absent' ? '미사용' : '추가사용';
      return `
        <div class="pending-card ${r.type}">
          <div class="pending-title" style="color:${team.color}">${team.name}</div>
          <div class="pending-detail">${DAYS[r.day]} ${r.hour}:00 · ${typeLabel}</div>
          <div class="pending-detail">${r.reason}</div>
        </div>
      `;
    }).join('');
    return;
  }

  list.innerHTML = pending.map(r => {
    const team = teamById(r.teamId);
    const typeLabel = r.type === 'absent' ? '미사용 신고' : '추가 사용 신청';
    return `
      <div class="pending-card ${r.type}">
        <div class="pending-title" style="color:${team.color}">${team.name}</div>
        <div class="pending-detail">${DAYS[r.day]} ${r.hour}:00 · ${typeLabel}</div>
        <div class="pending-detail">${r.reason}</div>
        <div class="pending-actions">
          <button class="btn-approve" onclick="approveRequest('${r.id}')">승인</button>
          <button class="btn-reject" onclick="rejectRequest('${r.id}')">거절</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderStats() {
  const s = computeStats();
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">이번 주 배정</div>
      <div class="stat-value">${slots.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">미사용 확정</div>
      <div class="stat-value red">${slots.filter(s=>s.status==='absent').length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">추가 사용</div>
      <div class="stat-value blue">${slots.filter(s=>s.type==='extra').length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">대기 신청</div>
      <div class="stat-value" style="color:var(--warn)">${pendingRequests.filter(r=>r.status==='pending').length}</div>
    </div>
  `;
}

function renderEmptySlots() {
  const bar = document.getElementById('emptySlotsBar');
  const empties = getEmptySlots();
  if (!empties.length) {
    bar.innerHTML = '<div class="empty-slots-title">빈 시간대 없음</div>';
    return;
  }
  bar.innerHTML = `
    <div class="empty-slots-title">⚡ 사용 가능한 빈 시간대 (클릭하여 신청)</div>
    <div class="empty-chips">
      ${empties.map(e => `
        <div class="empty-chip" onclick="openClaimModal(${e.day},${e.hour})">
          <div class="chip-dot"></div>
          ${DAYS[e.day]} ${e.hour}:00
        </div>
      `).join('')}
    </div>
  `;
}

function renderSchedule() {
  // Header
  const header = document.getElementById('scheduleHeader');
  header.innerHTML = `<div class="day-header"></div>` +
    DAYS.map(d => `<div class="day-header">${d}</div>`).join('');

  // Time col
  const timeCol = document.getElementById('timeCol');
  timeCol.innerHTML = HOURS.map(h => `<div class="time-cell">${h}:00</div>`).join('');

  // Days grid
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  for (let d = 0; d < 7; d++) {
    const col = document.createElement('div');
    col.className = 'day-col';

    for (const h of HOURS) {
      const cell = document.createElement('div');
      cell.className = 'slot';

      const slot = slots.find(s => s.day === d && s.hour === h);
      // Also check pending extra
      const pendingExtra = pendingRequests.find(r => r.type === 'extra' && r.day === d && r.hour === h && r.status === 'pending');

      if (slot) {
        const team = teamById(slot.teamId);
        const isAbsent = slot.status === 'absent';
        const isExtra = slot.type === 'extra';
        const block = document.createElement('div');
        block.className = `slot-block${isAbsent ? ' absent' : ''}${isExtra ? ' extra' : ''}`;
        block.style.background = isAbsent ? 'transparent' : team.color;
        if (isAbsent) block.style.border = `1px dashed ${team.color}`;
        block.innerHTML = `
          <span class="slot-block-name" style="color:${isAbsent ? team.color : '#000'}">${team.name}</span>
          <span class="slot-block-tag" style="color:${isAbsent?team.color:'#000'};background:${isAbsent?'transparent':'rgba(0,0,0,0.15)'}">${isAbsent?'미사용':team.type}</span>
        `;
        block.onclick = () => openSlotModal(slot);
        cell.appendChild(block);
      } else if (pendingExtra) {
        const team = teamById(pendingExtra.teamId);
        const block = document.createElement('div');
        block.className = 'slot-block';
        block.style.background = team.color + '44';
        block.style.border = `1px dashed ${team.color}`;
        block.innerHTML = `<span class="slot-block-name" style="color:${team.color}">${team.name}</span><span class="slot-block-tag" style="color:${team.color}">대기</span>`;
        block.onclick = () => openPendingDetailModal(pendingExtra);
        cell.appendChild(block);
      } else {
        if (mode === 'admin') {
          const ind = document.createElement('div');
          ind.className = 'slot-empty-indicator';
          ind.textContent = '+';
          ind.onclick = () => openAddSlotModal(d, h);
          cell.appendChild(ind);
        } else {
          const ind = document.createElement('div');
          ind.className = 'slot-empty-indicator';
          ind.textContent = '신청';
          ind.onclick = () => openClaimModal(d, h);
          cell.appendChild(ind);
        }
      }

      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// ─── MODE ─────────────────────────────────────────────────────────────────

function setMode(m) {
  mode = m;
  document.getElementById('btnUser').classList.toggle('active', m === 'user');
  document.getElementById('btnAdmin').classList.toggle('active', m === 'admin');
  render();
}

// ─── MODALS ──────────────────────────────────────────────────────────────

function openSlotModal(slot) {
  const team = teamById(slot.teamId);
  const isAbsent = slot.status === 'absent';
  const isExtra = slot.type === 'extra';

  document.getElementById('modalTitle').textContent = `${team.name} · ${DAYS[slot.day]} ${slot.hour}:00`;

  document.getElementById('modalBody').innerHTML = `
    <div class="slot-info-row">
      <span class="slot-info-key">팀</span>
      <span style="color:${team.color};font-weight:700">${team.name}</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">종류</span>
      <span class="tag-badge ${isExtra ? 'tag-extra' : 'tag-school'}">${isExtra ? '추가 사용' : team.type}</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">상태</span>
      <span class="tag-badge ${isAbsent ? 'tag-absent' : ''}">${isAbsent ? '미사용 확정' : '정상'}</span>
    </div>
  `;

  const footer = document.getElementById('modalFooter');
  if (mode === 'admin') {
    footer.innerHTML = `
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      <button class="btn btn-danger" onclick="deleteSlot(${slot.id})">삭제</button>
      <button class="btn btn-primary" onclick="editSlotModal(${slot.id})">수정</button>
    `;
  } else {
    // User can report absence or extra
    if (!isAbsent) {
      footer.innerHTML = `
        <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
        <button class="btn btn-danger" onclick="openAbsenceModal(${slot.id})">미사용 신고</button>
      `;
    } else {
      footer.innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">닫기</button>`;
    }
  }

  showModal();
}

function openAbsenceModal(slotId) {
  const slot = slots.find(s => s.id === slotId);
  const team = teamById(slot.teamId);
  document.getElementById('modalTitle').textContent = '미사용 신고';
  document.getElementById('modalBody').innerHTML = `
    <div class="slot-info-row">
      <span class="slot-info-key">팀</span>
      <span style="color:${team.color};font-weight:700">${team.name}</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">시간</span>
      <span>${DAYS[slot.day]} ${slot.hour}:00</span>
    </div>
    <div>
      <div class="field-label">사유</div>
      <input class="field-input" id="absenceReason" placeholder="예: 팀원 시험 기간" />
    </div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-danger" onclick="submitAbsence(${slotId})">신고 제출</button>
  `;
  showModal();
}

function submitAbsence(slotId) {
  const reason = document.getElementById('absenceReason').value.trim();
  if (!reason) { showToast('사유를 입력해주세요', 'error'); return; }
  const slot = slots.find(s => s.id === slotId);
  pendingRequests.push({
    id: 'r' + (++requestIdCounter),
    type: 'absent',
    teamId: slot.teamId,
    day: slot.day,
    hour: slot.hour,
    slotId,
    reason,
    status: 'pending',
  });
  closeModal();
  showToast('미사용 신고가 제출됐습니다. 관리자 승인 대기 중.');
  render();
}

function openClaimModal(day, hour) {
  document.getElementById('modalTitle').textContent = `추가 사용 신청 · ${DAYS[day]} ${hour}:00`;
  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="field-label">팀 선택</div>
      <select class="field-select" id="claimTeam">
        ${TEAMS.map(t => `<option value="${t.id}">${t.name} (${t.type})</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">사유</div>
      <input class="field-input" id="claimReason" placeholder="예: 공연 준비 합주" />
    </div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitClaim(${day},${hour})">신청 제출</button>
  `;
  showModal();
}

function submitClaim(day, hour) {
  const teamId = parseInt(document.getElementById('claimTeam').value);
  const reason = document.getElementById('claimReason').value.trim();
  if (!reason) { showToast('사유를 입력해주세요', 'error'); return; }
  pendingRequests.push({
    id: 'r' + (++requestIdCounter),
    type: 'extra',
    teamId,
    day,
    hour,
    reason,
    status: 'pending',
  });
  closeModal();
  showToast('추가 사용 신청이 제출됐습니다. 관리자 승인 대기 중.');
  render();
}

function openAddSlotModal(day, hour) {
  const preDay = day !== undefined ? day : 0;
  const preHour = hour !== undefined ? hour : 10;
  document.getElementById('modalTitle').textContent = '슬롯 추가 (관리자)';
  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="field-label">팀</div>
      <select class="field-select" id="addTeam">
        ${TEAMS.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">요일</div>
      <select class="field-select" id="addDay">
        ${DAYS.map((d,i) => `<option value="${i}" ${i===preDay?'selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">시간</div>
      <select class="field-select" id="addHour">
        ${HOURS.map(h => `<option value="${h}" ${h===preHour?'selected':''}>${h}:00</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">종류</div>
      <select class="field-select" id="addType">
        <option value="regular">정규</option>
        <option value="extra">추가</option>
      </select>
    </div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="addSlot()">추가</button>
  `;
  showModal();
}

function addSlot() {
  const teamId = parseInt(document.getElementById('addTeam').value);
  const day = parseInt(document.getElementById('addDay').value);
  const hour = parseInt(document.getElementById('addHour').value);
  const type = document.getElementById('addType').value;

  // Check conflict
  if (slots.find(s => s.day === day && s.hour === hour)) {
    showToast('이미 해당 시간에 슬롯이 있습니다', 'error');
    return;
  }

  slots.push({ id: ++slotIdCounter, teamId, day, hour, type, status: 'normal' });
  closeModal();
  showToast('슬롯이 추가됐습니다', 'success');
  render();
}

function editSlotModal(slotId) {
  const slot = slots.find(s => s.id === slotId);
  document.getElementById('modalTitle').textContent = '슬롯 수정 (관리자)';
  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="field-label">팀</div>
      <select class="field-select" id="editTeam">
        ${TEAMS.map(t => `<option value="${t.id}" ${t.id===slot.teamId?'selected':''}>${t.name}</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">요일</div>
      <select class="field-select" id="editDay">
        ${DAYS.map((d,i) => `<option value="${i}" ${i===slot.day?'selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">시간</div>
      <select class="field-select" id="editHour">
        ${HOURS.map(h => `<option value="${h}" ${h===slot.hour?'selected':''}>${h}:00</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="field-label">상태</div>
      <select class="field-select" id="editStatus">
        <option value="normal" ${slot.status!=='absent'?'selected':''}>정상</option>
        <option value="absent" ${slot.status==='absent'?'selected':''}>미사용</option>
      </select>
    </div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="saveEdit(${slotId})">저장</button>
  `;
}

function saveEdit(slotId) {
  const slot = slots.find(s => s.id === slotId);
  const newDay = parseInt(document.getElementById('editDay').value);
  const newHour = parseInt(document.getElementById('editHour').value);
  const conflict = slots.find(s => s.id !== slotId && s.day === newDay && s.hour === newHour);
  if (conflict) { showToast('해당 시간에 이미 슬롯이 있습니다', 'error'); return; }

  slot.teamId = parseInt(document.getElementById('editTeam').value);
  slot.day = newDay;
  slot.hour = newHour;
  slot.status = document.getElementById('editStatus').value;
  closeModal();
  showToast('슬롯이 수정됐습니다', 'success');
  render();
}

function deleteSlot(slotId) {
  slots = slots.filter(s => s.id !== slotId);
  closeModal();
  showToast('슬롯이 삭제됐습니다');
  render();
}

function openPendingDetailModal(req) {
  const team = teamById(req.teamId);
  document.getElementById('modalTitle').textContent = '승인 대기 중 신청';
  document.getElementById('modalBody').innerHTML = `
    <div class="slot-info-row">
      <span class="slot-info-key">팀</span>
      <span style="color:${team.color};font-weight:700">${team.name}</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">시간</span>
      <span>${DAYS[req.day]} ${req.hour}:00</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">사유</span>
      <span>${req.reason}</span>
    </div>
    <div class="slot-info-row">
      <span class="slot-info-key">상태</span>
      <span class="tag-badge" style="background:rgba(255,170,71,0.15);color:var(--warn)">승인 대기</span>
    </div>
  `;
  document.getElementById('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">닫기</button>`;
  showModal();
}

// ─── APPROVE / REJECT ─────────────────────────────────────────────────────

function approveRequest(reqId) {
  const req = pendingRequests.find(r => r.id === reqId);
  if (!req) return;
  req.status = 'approved';

  if (req.type === 'absent') {
    const slot = slots.find(s => s.id === req.slotId || (s.teamId === req.teamId && s.day === req.day && s.hour === req.hour));
    if (slot) slot.status = 'absent';
  } else if (req.type === 'extra') {
    // Check no conflict
    if (!slots.find(s => s.day === req.day && s.hour === req.hour)) {
      slots.push({ id: ++slotIdCounter, teamId: req.teamId, day: req.day, hour: req.hour, type: 'extra', status: 'normal' });
    }
  }

  showToast('승인됐습니다', 'success');
  render();
}

function rejectRequest(reqId) {
  const req = pendingRequests.find(r => r.id === reqId);
  if (!req) return;
  req.status = 'rejected';
  showToast('거절됐습니다');
  render();
}

// ─── FILTER ──────────────────────────────────────────────────────────────

function filterTeam(teamId) {
  // Highlight — just visual for now, could filter grid
  showToast(`${teamById(teamId).name} 팀 선택됨`);
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────

function showModal() {
  document.getElementById('modalBackdrop').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalBackdrop')) return;
  document.getElementById('modalBackdrop').style.display = 'none';
}

// ─── TOAST ───────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg, type = '') {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    document.body.appendChild(el);
  }
  el.className = `toast${type ? ' ' + type : ''}`;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────

render();
</script>
