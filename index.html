<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>동아리방 시간표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#0e0e0f;--surface:#18181b;--surface2:#222226;--border:#2e2e34;
  --accent:#e8ff47;--accent2:#47c5ff;--danger:#ff4747;--warn:#ffaa47;
  --text:#f0f0f0;--text2:#888;--text3:#444;--radius:6px;
  --hh:44px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* HEADER */
header{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;background:rgba(14,14,15,.97);backdrop-filter:blur(8px);z-index:100;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:var(--accent);white-space:nowrap;}
.nav{display:flex;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-right:4px;}
.nav-btn{padding:4px 12px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;transition:all .12s;white-space:nowrap;}
.nav-btn.active{background:var(--surface);color:var(--text);font-weight:700;}
.nav-btn:hover:not(.active){color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.season-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--accent2);}
.week-nav{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;}
.week-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:1px 3px;line-height:1;transition:color .12s;}
.week-nav button:hover{color:var(--accent);}
.week-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--text);white-space:nowrap;min-width:70px;text-align:center;}
.hdr-search{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;width:120px;}
.hdr-search:focus{border-color:var(--accent);}

/* LAYOUT */
.page{display:none;height:calc(100vh - var(--hh));overflow:hidden;}
.page.active{display:flex;}

/* SCHEDULE PAGE — 2-col */
#pgSchedule{flex-direction:row;}
.panel-left{width:180px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
.panel-main{flex:1;min-width:0;min-height:0;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}

/* TEAM LIST sidebar */
.tg-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:6px 6px 3px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.tg-label:hover{color:var(--text2);}
.tg-arrow{font-size:10px;transition:transform .15s;}
.tg-arrow.open{transform:rotate(90deg);}
.t-item{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:4px;}
.t-item:hover{background:var(--surface2);}
.t-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.t-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.t-info{font-size:9px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.hdr-contacts-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap;}
.hdr-contacts-btn:hover{color:var(--text);border-color:var(--accent2);}

/* NOTICE BAR */
.notice-bar{background:rgba(71,197,255,.06);border:1px solid rgba(71,197,255,.2);border-radius:var(--radius);padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:12px;}
.notice-bar-icon{font-size:13px;flex-shrink:0;}
.notice-bar-text{flex:1;color:var(--text2);}

/* STATS ROW */
.stats-row{display:flex;gap:6px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;flex:1;display:flex;align-items:center;gap:7px;}
.stat-ico{font-size:15px;line-height:1;}
.stat-txt{display:flex;flex-direction:column;gap:0px;}
.stat-lbl{font-size:9px;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;}
.stat-val{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;line-height:1.1;}

/* SCHEDULE GRID */
.sch-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.sch-title-row{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sch-title{font-size:12px;font-weight:700;}
.sch-season{font-size:10px;color:var(--text2);}
.sch-hdr{display:grid;grid-template-columns:42px repeat(7,1fr);border-bottom:1px solid var(--border);}
.sch-day{padding:5px 2px;text-align:center;font-size:10px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);}
.sch-day:last-child{border-right:none;}
.sch-day.today{color:var(--accent);background:rgba(232,255,71,.04);}
.sch-body{display:flex;}
.sch-times{width:42px;flex-shrink:0;border-right:1px solid var(--border);}
.sch-time{height:58px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);line-height:1.3;}
.sch-time:last-child{border-bottom:none;}
.sch-time-next{font-size:9px;color:var(--text3);}
.sch-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.sch-col{border-right:1px solid var(--border);position:relative;}
.sch-col:last-child{border-right:none;}
.sch-col.today{background:rgba(232,255,71,.02);}
.sch-slot{height:58px;border-bottom:1px solid var(--border);position:relative;}
.sch-slot:last-child{border-bottom:none;}
.sch-slot:hover{background:rgba(255,255,255,.02);}
.blk{position:absolute;inset:2px;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;cursor:pointer;transition:opacity .12s,transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.35);}
.blk:hover{opacity:.88;transform:scale(.97);}
.blk-top{flex:1;display:flex;align-items:center;padding:0 5px;gap:3px;}
.blk-div{height:1px;background:rgba(0,0,0,.18);margin:0 3px;}
.blk-bot{flex:1;display:flex;align-items:center;padding:0 5px;}
.blk-name{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px;}
.blk-info{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.85;}
.blk-tag{font-size:9px;font-weight:700;background:rgba(0,0,0,.2);padding:1px 3px;border-radius:2px;flex-shrink:0;margin-left:auto;}
.blk.absent{box-shadow:none;}
.blk.extra{box-shadow:0 0 0 1.5px var(--accent2),0 1px 3px rgba(0,0,0,.3);}
.blk.pending{opacity:.5;box-shadow:none;}
.blk-empty{position:absolute;inset:2px;border-radius:4px;border:1px dashed rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;}
.blk-empty:hover{border-color:rgba(232,255,71,.5);color:var(--accent);background:rgba(232,255,71,.04);}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:10;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-1px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--danger);}

/* APPLY PAGE */
#pgApply{flex-direction:column;overflow-y:auto;padding:16px 20px;gap:12px;}
.apply-status{border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.apply-status.open{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);}
.apply-status.closed{background:var(--surface);border:1px solid var(--border);}
.apply-status.finished{background:rgba(71,197,255,.06);border:1px solid rgba(71,197,255,.2);}
.apply-status-icon{font-size:20px;}
.apply-status-texts{display:flex;flex-direction:column;gap:2px;}
.apply-status-title{font-size:14px;font-weight:700;}
.apply-status-sub{font-size:11px;color:var(--text2);}
.apply-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.apply-card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
.pref-grid{display:grid;grid-template-columns:52px 1fr 1fr;gap:6px;align-items:center;margin-bottom:8px;}
.pref-lbl{font-size:11px;font-weight:700;}
.pref-lbl.p1{color:var(--accent);}
.pref-lbl.p2{color:var(--accent2);}
.pref-lbl.p3{color:var(--text2);}
.apply-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.apply-tbl th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
.apply-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.apply-tbl tr:last-child td{border-bottom:none;}
.apply-tbl tr:hover td{background:rgba(255,255,255,.02);}
.pbadge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;}
.pbadge.p1{background:rgba(232,255,71,.15);color:var(--accent);}
.pbadge.p2{background:rgba(71,197,255,.15);color:var(--accent2);}
.pbadge.p3{background:rgba(255,170,71,.15);color:var(--warn);}
.pbadge.none{background:rgba(255,71,71,.1);color:var(--danger);}

/* MODAL */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);animation:fi .15s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:400px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column;animation:su .15s;}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:13px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-size:14px;font-weight:700;}
.modal-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;}
.modal-x:hover{color:var(--text);}
.modal-body{padding:13px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;}
.fl{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .12s;}
.fi:focus,.fs:focus{border-color:var(--accent);}
.fs option{background:var(--surface);}
.btn{padding:6px 14px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:var(--accent);color:#000;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-d{background:var(--danger);color:#fff;}
.btn-xs{padding:3px 8px;font-size:11px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.irow:last-child{border-bottom:none;}
.ik{color:var(--text2);}

/* LOADING */
.ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-txt{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;animation:fi .2s;}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.err{border-color:var(--danger);color:var(--danger);}

/* HELP */
.help-bd{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);}
.help-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:400px;max-width:92vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;}
.help-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.help-title{font-size:14px;font-weight:700;}
.help-body{padding:12px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.help-sec-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.help-item{font-size:12px;color:var(--text2);line-height:1.6;padding-left:8px;border-left:2px solid var(--border);}
.help-item strong{color:var(--text);}
.help-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.help-chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;}
.help-chk input{accent-color:var(--accent);}

/* MOBILE TAB BAR */
.tab-bar{display:none;}
@media(max-width:700px){
  :root{--hh:44px;--tab-h:52px;}
  .hdr-search,.season-chip,.desktop-only{display:none;}
  #pgSchedule{flex-direction:column;}
  .panel-left{display:none;}
  .panel-main{padding:8px;gap:6px;overflow-x:hidden;}
  /* 모바일: 시간표 가로 스크롤 허용 */
  .sch-wrap{overflow-x:auto;}
  .sch-hdr{display:grid;grid-template-columns:38px repeat(7,minmax(52px,1fr));min-width:440px;}
  .sch-body{min-width:440px;}
  .sch-times{width:38px;min-width:38px;}
  .sch-grid{grid-template-columns:repeat(7,minmax(52px,1fr));}
  .sch-day{font-size:10px;padding:5px 2px;}
  .sch-time{height:54px;font-size:9px;}
  .sch-slot{height:54px;}
  .blk-name{font-size:10px;}
  .blk-info{font-size:9px;}
  .blk-tag{font-size:8px;}
  /* 모바일 팀 목록 패널 */
  #mobileTeamPanel{display:none;flex-direction:column;overflow-y:auto;padding:10px;gap:6px;padding-bottom:calc(var(--tab-h)+10px);}
  #mobileTeamPanel.active{display:flex;}
  #pgApply{padding:10px;padding-bottom:calc(var(--tab-h)+10px);}
  .modal-bd{align-items:flex-end;}
  .modal{border-radius:12px 12px 0 0;width:100%;max-width:100%;max-height:85vh;}
  .modal::before{content:'';display:block;width:32px;height:3px;background:var(--border);border-radius:2px;margin:8px auto 0;}
  .fi,.fs{font-size:16px;}
  .toast{bottom:calc(var(--tab-h)+8px);}
  .tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(14,14,15,.97);border-top:1px solid var(--border);z-index:100;backdrop-filter:blur(8px);}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;}
  .tab-btn.active{color:var(--accent);}
  .tab-btn svg{width:18px;height:18px;}
  .page.active{flex-direction:column;}
  .panel-main{padding-bottom:calc(var(--tab-h)+8px);}
  .nav{display:none;}
  .week-lbl{min-width:56px;font-size:9px;}
}
@media(min-width:701px){
  .tab-bar{display:none !important;}
  #mobileTeamPanel{display:none !important;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="spin"></div><div class="ld-txt">Loading...</div></div>

<header>
  <a class="logo" href="https://kuagc.com" target="_blank" style="text-decoration:none">BAND</a>
  <div class="nav">
    <button class="nav-btn active" id="nb-schedule" onclick="showPage('schedule')">시간표</button>
    <button class="nav-btn" id="nb-apply" onclick="showPage('apply')">시간 신청</button>
  </div>
  <div class="hdr-right">
    <input class="hdr-search desktop-only" id="searchInput" placeholder="팀 검색..." oninput="onSearch(this.value)"/>
    <div class="season-chip desktop-only" id="seasonChip">—</div>
    <button class="hdr-contacts-btn desktop-only" onclick="openContactsModal()">📞 연락처</button>
    <div class="week-nav" id="weekNavEl">
      <button onclick="changeWeek(-1)">‹</button>
      <div class="week-lbl" id="weekLbl">—</div>
      <button onclick="changeWeek(1)">›</button>
    </div>
  </div>
</header>

<!-- SCHEDULE PAGE -->
<div class="page active" id="pgSchedule">
  <div class="panel-left" id="panelLeft">
    <div id="teamListEl"></div>
  </div>
  <div class="panel-main">
    <div id="noticeBarEl"></div>
    <div class="stats-row" id="statsEl"></div>
    <div class="sch-wrap">
      <div class="sch-title-row">
        <span class="sch-title" id="schTitle">—</span>
        <span class="sch-season" id="schSeason"></span>
      </div>
      <div class="sch-hdr" id="schHdr"></div>
      <div class="sch-body">
        <div class="sch-times" id="schTimes"></div>
        <div class="sch-grid" id="schGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- APPLY PAGE -->
<div class="page" id="pgApply">
  <div id="applyContent"></div>
</div>

<!-- MOBILE TEAM PANEL -->
<div id="mobileTeamPanel">
  <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px">팀 목록</div>
  <div id="mobileTeamListEl"></div>
</div>

<!-- MOBILE TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tb-schedule" onclick="showPage('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    시간표
  </button>
  <button class="tab-btn" id="tb-teams" onclick="showPage('teams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
    팀 목록
  </button>
  <button class="tab-btn" id="tb-apply" onclick="showPage('apply')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    시간신청
  </button>
</div>

<!-- MODAL -->
<div class="modal-bd" id="modalBd" style="display:none" onclick="onMBd(event)">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-ttl" id="modalTtl"></div><button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- HELP -->
<div class="help-bd" id="helpBd">
  <div class="help-box">
    <div class="help-hdr"><div class="help-title">📋 동아리방 시간표 사용법</div></div>
    <div class="help-body">
      <div>
        <div class="help-sec-title">시간표 보기</div>
        <div class="help-item">◀ ▶ 버튼으로 주차를 이동할 수 있습니다.</div>
        <div class="help-item">슬롯을 클릭하면 상세 정보를 볼 수 있습니다.</div>
      </div>
      <div>
        <div class="help-sec-title">미사용 신고</div>
        <div class="help-item">이번 주 합주를 쉬는 경우 내 팀 슬롯 클릭 → <strong>미사용 신고</strong>를 제출하세요.</div>
      </div>
      <div>
        <div class="help-sec-title">추가 사용 신청</div>
        <div class="help-item">비어 있는 시간 칸의 <strong>신청</strong> 버튼을 클릭해 추가 사용을 신청하세요.</div>
      </div>
      <div>
        <div class="help-sec-title">시간 신청</div>
        <div class="help-item">학기 초 <strong>시간 신청</strong> 탭에서 1~3지망으로 정기 합주 시간을 신청할 수 있습니다.</div>
      </div>
    </div>
    <div class="help-foot">
      <label class="help-chk"><input type="checkbox" id="helpChk"> 다시 열지 않음</label>
      <button class="btn btn-p" onclick="closeHelp()">확인</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { isAdmin } from './js/auth.js';
import {
  getConfig, fetchTeams, fetchBaseSlots, fetchExceptions, mergeSchedule,
  fetchRequests, createRequest, approveRequest, rejectRequest,
  createException, deleteException, fetchNotices,
  fetchActiveRound, fetchApplications, submitApplication,
  fetchContacts
} from './js/schedule.js';

// ── CONFIG ────────────────────────────────────────────────────────────
const DAYS  = ['월','화','수','목','금','토','일'];
const HOURS = Array.from({length:18},(_,i)=>i+8);
const GRAY  = '#888888';
const korSort = (a,k) => [...a].sort((x,y)=>x[k].localeCompare(y[k],'ko-KR',{numeric:true}));
const teamClr = t => t.type==='합주'?GRAY:(t.color||GRAY);
const timeStr = h => h<24?h+':00':'0'+(h-24)+':00';
function weekLabel(off){
  const now=new Date(),m=new Date(now);
  m.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  const mo=m.getMonth()+1;
  const wn=Math.ceil((m.getDate()+(new Date(m.getFullYear(),m.getMonth(),1).getDay()+6)%7)/7);
  return `${mo}월 ${wn}주차`;
}

// ── STATE ─────────────────────────────────────────────────────────────
let weekOff=0, season='1학기';
let teams=[], baseSlots=[], exceptions=[], requests=[], notices=[], contacts=[];
let merged=[], round=null, applications=[];
let searchQ='', collapsed=new Set();

async function init(){
  initHelp();
  season = await getConfig('current_season').catch(()=>'1학기');
  await loadAll();
  setInterval(()=>{ if(weekOff===0) renderSchedule(); },60000);
}

async function loadAll(){
  const ldEl = document.getElementById('ld');
  ldEl.style.display='flex';
  try{
    [teams,baseSlots,exceptions,requests,notices,contacts] = await Promise.all([
      fetchTeams(), fetchBaseSlots(season), fetchExceptions(weekOff),
      fetchRequests(weekOff), fetchNotices(), fetchContacts()
    ]);
    teams=korSort(teams,'name');
    merged=mergeSchedule(baseSlots,exceptions);
    round=await fetchActiveRound(season);
    if(round) applications=await fetchApplications(round.id);
    ldEl.style.display='none';
    render();
    // realtime
    import('./js/supabase.js').then(({supabase})=>{
      supabase.channel('rt')
        .on('postgres_changes',{event:'*',schema:'public',table:'base_slots'},async()=>{
          baseSlots=await fetchBaseSlots(season); merged=mergeSchedule(baseSlots,exceptions); renderSchedule();
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'slot_exceptions'},async()=>{
          exceptions=await fetchExceptions(weekOff); merged=mergeSchedule(baseSlots,exceptions); renderSchedule();
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'requests'},async()=>{
          requests=await fetchRequests(weekOff); renderStats();
        })
        .subscribe();
    });
  } catch(e){
    ldEl.innerHTML=`
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">
        <div style="font-size:14px;color:var(--danger)">데이터를 불러오지 못했습니다</div>
        <div style="font-size:12px;color:var(--text2)">${e.message||'네트워크 오류'}</div>
        <button class="btn btn-p" onclick="loadAll()">다시 시도</button>
      </div>`;
  }
}

// ── PAGE SWITCH ───────────────────────────────────────────────────────
window.showPage=function(pg){
  ['schedule','apply'].forEach(p=>{
    document.getElementById('pg'+p.charAt(0).toUpperCase()+p.slice(1))?.classList.toggle('active',p===pg);
    document.getElementById('nb-'+p)?.classList.toggle('active',p===pg);
  });
  ['schedule','teams','apply'].forEach(p=>{
    document.getElementById('tb-'+p)?.classList.toggle('active',p===pg);
  });
  document.getElementById('weekNavEl').style.display = pg==='schedule'?'':'none';
  // 모바일 팀 패널
  const teamPanel=document.getElementById('mobileTeamPanel');
  if(pg==='teams'){ teamPanel.classList.add('active'); renderMobileTeams(); }
  else teamPanel.classList.remove('active');
  // 시간표/신청 페이지 active
  document.getElementById('pgSchedule')?.classList.toggle('active',pg==='schedule');
  document.getElementById('pgApply')?.classList.toggle('active',pg==='apply');
  if(pg==='apply') renderApply();
};

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const wl=weekLabel(weekOff);
  document.getElementById('weekLbl').textContent=wl;
  document.getElementById('seasonChip').textContent=season;
  document.getElementById('schTitle').textContent=`${wl} 동아리방 사용 시간표`;
  document.getElementById('schSeason').textContent=season;
  renderTeams();
  renderNotice();
  renderStats();
  renderSchedule();
}

function teamListHTML(q=''){
  const groups=[{k:'합주'},{k:'스쿨'},{k:'이외'}];
  return groups.map(g=>{
    let list=korSort(teams.filter(t=>t.type===g.k),'name');
    if(q) list=list.filter(t=>t.name.includes(q)||(t.info&&t.info.includes(q)));
    if(!list.length) return '';
    const open=!collapsed.has(g.k);
    return `<div>
      <div class="tg-label" onclick="toggleGroup('${g.k}')">
        <span>${g.k} <span style="color:var(--text3);font-weight:400">(${list.length})</span></span>
        <span class="tg-arrow ${open?'open':''}">›</span>
      </div>
      <div style="display:${open?'flex':'none'};flex-direction:column;gap:0">
        ${list.map(t=>`<div class="t-item">
          <div class="t-dot" style="background:${teamClr(t)}"></div>
          <div style="flex:1;min-width:0">
            <div class="t-name">${t.name}</div>
            ${t.info?`<div class="t-info">${t.info}</div>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderTeams(){
  const q=searchQ.toLowerCase();
  const html=teamListHTML(q);
  document.getElementById('teamListEl').innerHTML=html;
}

function renderMobileTeams(){
  document.getElementById('mobileTeamListEl').innerHTML=teamListHTML();
}

window.toggleGroup=function(k){
  collapsed.has(k)?collapsed.delete(k):collapsed.add(k);
  renderTeams();
};
window.onSearch=function(v){ searchQ=v; renderTeams(); };

function renderNotice(){
  const el=document.getElementById('noticeBarEl');
  if(!notices.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="notice-bar">
    <span class="notice-bar-icon">📢</span>
    <div class="notice-bar-text">${notices.map(n=>n.content).join(' &nbsp;·&nbsp; ')}</div>
  </div>`;
}

function renderStats(){
  const absent=merged.filter(s=>s.status==='absent').length;
  const extra=exceptions.filter(e=>e.exception_type==='extra').length;
  const pend=requests.filter(r=>r.status==='pending').length;
  document.getElementById('statsEl').innerHTML=`
    <div class="stat"><div class="stat-ico">📋</div><div class="stat-txt"><div class="stat-lbl">기본 배정</div><div class="stat-val">${baseSlots.length}</div></div></div>
    <div class="stat"><div class="stat-ico">🔕</div><div class="stat-txt"><div class="stat-lbl">이번 주 미사용</div><div class="stat-val" style="color:var(--danger)">${absent}</div></div></div>
    <div class="stat"><div class="stat-ico">➕</div><div class="stat-txt"><div class="stat-lbl">이번 주 추가</div><div class="stat-val" style="color:var(--accent2)">${extra}</div></div></div>
    <div class="stat"><div class="stat-ico">🕐</div><div class="stat-txt"><div class="stat-lbl">대기 신청</div><div class="stat-val" style="color:var(--warn)">${pend}</div></div></div>`;
}

function renderSchedule(){
  const todayDow=(new Date().getDay()+6)%7;
  const nowH=new Date().getHours(), nowM=new Date().getMinutes();
  const isNow=weekOff===0;
  document.getElementById('schHdr').innerHTML='<div class="sch-day"></div>'+
    DAYS.map((d,i)=>`<div class="sch-day${isNow&&i===todayDow?' today':''}">${d}</div>`).join('');
  document.getElementById('schTimes').innerHTML=HOURS.map(h=>
    `<div class="sch-time"><span>${timeStr(h)}</span>${h>=24?`<span class="sch-time-next">익일</span>`:''}</div>`).join('');
  const grid=document.getElementById('schGrid');
  grid.innerHTML='';
  const mm=new Map(merged.map(s=>[`${s.day}-${s.hour}`,s]));
  const pm=new Map(requests.filter(r=>r.type==='extra'&&r.status==='pending').map(r=>[`${r.day}-${r.hour}`,r]));
  for(let d=0;d<7;d++){
    const col=document.createElement('div');
    col.className='sch-col'+(isNow&&d===todayDow?' today':'');
    if(isNow&&d===todayDow&&nowH>=HOURS[0]&&nowH<=HOURS[HOURS.length-1]){
      const line=document.createElement('div'); line.className='now-line';
      line.style.top=((nowH-HOURS[0])*58+(nowM/60)*58)+'px';
      col.appendChild(line);
    }
    for(const h of HOURS){
      const cell=document.createElement('div'); cell.className='sch-slot';
      const s=mm.get(`${d}-${h}`), pe=pm.get(`${d}-${h}`);
      if(s){
        const t=s.teams, absent=s.status==='absent', isExtra=s.source==='extra';
        const c=teamClr(t);
        const blk=document.createElement('div');
        blk.className=`blk${absent?' absent':''}${isExtra?' extra':''}`;
        if(absent){
          blk.style.cssText=`background:repeating-linear-gradient(45deg,${c}18,${c}18 3px,transparent 3px,transparent 9px);border:1.5px dashed ${c}55;`;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}88">${t.name}</span><span class="blk-tag" style="color:${c}88">미사용</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}66">${t.info||''}</span></div>`;
        } else {
          blk.style.background=c;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:#000">${t.name}</span><span class="blk-tag" style="color:#000">${isExtra?'추가':t.type}</span></div><div class="blk-div"></div><div class="blk-bot"><span class="blk-info" style="color:#000">${t.info||''}</span></div>`;
        }
        blk.onclick=()=>openSlotModal(s);
        cell.appendChild(blk);
      } else if(pe){
        const t=pe.teams, c=teamClr(t);
        const blk=document.createElement('div');
        blk.className='blk pending';
        blk.style.cssText=`background:${c}20;border:1.5px dashed ${c}77;`;
        blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}">${t.name}</span><span class="blk-tag" style="color:${c}">대기</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}99">${t.info||''}</span></div>`;
        blk.onclick=()=>openReqDetail(pe);
        cell.appendChild(blk);
      } else {
        const ind=document.createElement('div'); ind.className='blk-empty';
        ind.textContent='신청';
        ind.onclick=()=>openClaimModal(d,h);
        cell.appendChild(ind);
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// ── WEEK NAV ─────────────────────────────────────────────────────────
window.changeWeek=async function(delta){
  weekOff+=delta;
  [exceptions,requests]=await Promise.all([fetchExceptions(weekOff),fetchRequests(weekOff)]);
  merged=mergeSchedule(baseSlots,exceptions); render();
};

// ── SLOT MODAL ───────────────────────────────────────────────────────
function openSlotModal(s){
  const t=s.teams, absent=s.status==='absent', isExtra=s.source==='extra', c=teamClr(t);
  showModal(`${t.name} · ${DAYS[s.day]} ${s.hour}:00`,
    `<div class="irow"><span class="ik">팀</span><span style="color:${c};font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[s.day]} ${s.hour}:00</span></div>
     <div class="irow"><span class="ik">종류</span><span>${isExtra?'추가 사용 (이번 주)':'기본 시간표'}</span></div>
     <div class="irow"><span class="ik">상태</span><span>${absent?'⛔ 이번 주 미사용':'✅ 정상'}</span></div>
     ${t.info?`<div class="irow"><span class="ik">${t.type==='스쿨'?'선생님':'정보'}</span><span>${t.info}</span></div>`:''}`,
    !absent&&s.source==='base'
      ? `<button class="btn btn-s" onclick="closeModal()">닫기</button>
         <button class="btn btn-d" onclick="openAbsenceModal(${s.id},${s.day},${s.hour},${s.team_id})">미사용 신고</button>`
      : `<button class="btn btn-s" onclick="closeModal()">닫기</button>`
  );
}

function openAbsenceModal(slotId,day,hour,teamId){
  const t=teams.find(t=>t.id===teamId);
  // 이미 대기 중인 신청이 있는지 확인
  const existing=requests.find(r=>r.status==='pending'&&r.type==='absent'&&r.team_id===teamId&&r.day===day&&r.hour===hour&&r.week_offset===weekOff);
  if(existing){
    showModal('미사용 신고',
      `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
       <div class="irow"><span class="ik">상태</span><span style="color:var(--warn)">승인 대기 중</span></div>
       <div class="irow"><span class="ik">사유</span><span>${existing.reason}</span></div>`,
      `<button class="btn btn-s" onclick="closeModal()">닫기</button>
       <button class="btn btn-d" id="cancelBtn" onclick="cancelRequest(${existing.id})">신고 취소</button>`
    );
    return;
  }
  showModal('미사용 신고',
    `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[day]} ${hour}:00</span></div>
     <div><div class="fl">신청자 이름</div><input class="fi" id="absName" placeholder="이름 (선택)" maxlength="20"/></div>
     <div><div class="fl">사유 *</div><input class="fi" id="absReason" placeholder="예: 팀원 시험 기간" maxlength="100"/></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-d" id="absBtn" onclick="submitAbsence(${teamId},${day},${hour})">신고 제출</button>`
  );
}
window.submitAbsence=async function(teamId,day,hour){
  const reason=document.getElementById('absReason').value.trim();
  if(!reason){toast('사유를 입력해주세요','err');return;}
  const btn=document.getElementById('absBtn'); btn.disabled=true; btn.textContent='제출 중...';
  try{
    await createRequest({type:'absent',team_id:teamId,day,hour,week_offset:weekOff,reason,requester_name:document.getElementById('absName').value.trim()});
    closeModal(); toast('미사용 신고가 제출됐습니다');
    requests=await fetchRequests(weekOff); renderStats();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='신고 제출';}
};

function openClaimModal(day,hour){
  const opts=korSort(teams,'name').map(t=>`<option value="${t.id}">${t.name} (${t.type})</option>`).join('');
  showModal(`추가 사용 신청 · ${DAYS[day]} ${hour}:00`,
    `<div><div class="fl">팀 선택 *</div><select class="fs" id="clTeam">${opts}</select></div>
     <div><div class="fl">신청자 이름</div><input class="fi" id="clName" placeholder="이름 (선택)" maxlength="20"/></div>
     <div><div class="fl">사유 *</div><input class="fi" id="clReason" placeholder="예: 공연 준비 합주" maxlength="100"/></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-p" id="clBtn" onclick="submitClaim(${day},${hour})">신청 제출</button>`
  );
}

window.cancelRequest=async function(reqId){
  const btn=document.getElementById('cancelBtn'); btn.disabled=true; btn.textContent='취소 중...';
  try{
    const {supabase}=await import('./js/supabase.js');
    await supabase.from('requests').delete().eq('id',reqId);
    requests=requests.filter(r=>r.id!==reqId);
    closeModal(); toast('신청이 취소됐습니다'); renderStats(); renderSchedule();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='신고 취소';}
};
window.submitClaim=async function(day,hour){
  const reason=document.getElementById('clReason').value.trim();
  if(!reason){toast('사유를 입력해주세요','err');return;}
  const btn=document.getElementById('clBtn'); btn.disabled=true; btn.textContent='제출 중...';
  try{
    await createRequest({type:'extra',team_id:parseInt(document.getElementById('clTeam').value),day,hour,week_offset:weekOff,reason,requester_name:document.getElementById('clName').value.trim()});
    closeModal(); toast('추가 사용 신청이 제출됐습니다');
    requests=await fetchRequests(weekOff); renderStats();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='신청 제출';}
};

function openReqDetail(req){
  const t=req.teams;
  showModal('추가 사용 신청 대기 중',
    `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[req.day]} ${req.hour}:00</span></div>
     <div class="irow"><span class="ik">사유</span><span>${req.reason}</span></div>
     <div class="irow"><span class="ik">신청자</span><span>${req.requester_name||'미기입'}</span></div>
     <div class="irow"><span class="ik">상태</span><span style="color:var(--warn)">관리자 승인 대기 중</span></div>`,
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>
     <button class="btn btn-d" id="cancelBtn" onclick="cancelRequest(${req.id})">신청 취소</button>`
  );
}

// ── APPLY PAGE ────────────────────────────────────────────────────────
function renderApply(){
  const isOpen=round&&round.status==='open';
  const isFin=round&&(round.status==='finished'||round.draft_approved);
  const dayOpts=DAYS.map((d,i)=>`<option value="${i}">${d}</option>`).join('');
  const hourOpts=HOURS.map(h=>`<option value="${h}">${timeStr(h)}</option>`).join('');
  const teamOpts=korSort(teams,'name').map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  let html=`
    <div class="apply-status ${isOpen?'open':isFin?'finished':'closed'}">
      <div class="apply-status-icon">${isOpen?'🟢':isFin?'🔵':'⭕'}</div>
      <div class="apply-status-texts">
        <div class="apply-status-title">${isOpen?'신청 진행 중':isFin?'신청 마감 — 배정 완료':'신청 기간이 아닙니다'}</div>
        <div class="apply-status-sub">${isOpen&&round.close_at?'마감: '+new Date(round.close_at).toLocaleString('ko-KR'):!isOpen&&!isFin?'관리자가 신청을 열면 여기서 신청할 수 있습니다.':''}</div>
      </div>
    </div>`;

  if(isOpen){
    html+=`
    <div class="apply-card">
      <div class="apply-card-title">시간 신청</div>
      <div style="margin-bottom:10px"><div class="fl">팀 선택</div><select class="fs" id="apTeam">${teamOpts}</select></div>
      <div class="pref-grid" style="margin-bottom:4px"><div></div><div style="font-size:9px;color:var(--text3);font-weight:700">요일</div><div style="font-size:9px;color:var(--text3);font-weight:700">시간</div></div>
      <div class="pref-grid"><div class="pref-lbl p1">1지망</div><select class="fs" id="apD1">${dayOpts}</select><select class="fs" id="apH1">${hourOpts}</select></div>
      <div class="pref-grid"><div class="pref-lbl p2">2지망</div><select class="fs" id="apD2"><option value="">—</option>${dayOpts}</select><select class="fs" id="apH2"><option value="">—</option>${hourOpts}</select></div>
      <div class="pref-grid"><div class="pref-lbl p3">3지망</div><select class="fs" id="apD3"><option value="">—</option>${dayOpts}</select><select class="fs" id="apH3"><option value="">—</option>${hourOpts}</select></div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-p" onclick="submitApply()">신청 제출</button>
      </div>
    </div>`;
  }

  if(round&&applications.length){
    const pc=p=>p===1?'p1':p===2?'p2':p===3?'p3':'none';
    const pl=p=>p?p+'지망':'미배정';
    html+=`
    <div class="apply-card">
      <div class="apply-card-title">${isFin?'배정 결과':'신청 현황'} (${applications.length}팀)</div>
      <table class="apply-tbl">
        <thead><tr><th>팀</th><th>1지망</th><th>2지망</th><th>3지망</th>${isFin?'<th>결과</th>':''}</tr></thead>
        <tbody>
          ${applications.map(a=>`<tr>
            <td style="font-weight:600">${a.teams.name}</td>
            <td>${DAYS[a.pref1_day]} ${a.pref1_hour}:00</td>
            <td>${a.pref2_day!=null?DAYS[a.pref2_day]+' '+a.pref2_hour+':00':'—'}</td>
            <td>${a.pref3_day!=null?DAYS[a.pref3_day]+' '+a.pref3_hour+':00':'—'}</td>
            ${isFin?`<td>${a.assigned_day!=null?`<span class="pbadge ${pc(a.assigned_pref)}">${pl(a.assigned_pref)}</span> ${DAYS[a.assigned_day]} ${a.assigned_hour}:00`:`<span class="pbadge none">미배정</span>`}</td>`:''}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  document.getElementById('applyContent').innerHTML=html;
}

window.submitApply=async function(){
  if(!round||round.status!=='open'){toast('현재 신청 기간이 아닙니다','err');return;}
  const team_id=parseInt(document.getElementById('apTeam').value);
  const p1d=parseInt(document.getElementById('apD1').value);
  const p1h=parseInt(document.getElementById('apH1').value);
  const p2d=document.getElementById('apD2').value; const p2h=document.getElementById('apH2').value;
  const p3d=document.getElementById('apD3').value; const p3h=document.getElementById('apH3').value;
  try{
    await submitApplication({round_id:round.id,team_id,pref1_day:p1d,pref1_hour:p1h,
      pref2_day:p2d?parseInt(p2d):null,pref2_hour:p2h?parseInt(p2h):null,
      pref3_day:p3d?parseInt(p3d):null,pref3_hour:p3h?parseInt(p3h):null});
    applications=await fetchApplications(round.id);
    toast('신청이 제출됐습니다','ok'); renderApply();
  }catch(e){toast(e.message,'err');}
};

// ── CONTACTS MODAL ────────────────────────────────────────────────────
window.openContactsModal=async function(){
  let ct=contacts;
  if(!ct.length){
    showModal('회장단 연락처','<div style="color:var(--text2);font-size:13px;padding:8px 0">등록된 연락처가 없습니다.</div>','<button class="btn btn-s" onclick="closeModal()">닫기</button>');
    return;
  }
  showModal('📞 그루터기 회장단 연락처',
    ct.map(c=>`
      <div class="irow">
        <span class="ik">${c.role}</span>
        <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span style="font-weight:600">${c.name}</span>
          ${c.phone?`<span style="font-size:11px;color:var(--text2)">${c.phone}</span>`:''}
        </span>
      </div>`).join(''),
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>`
  );
};

// ── MODAL ─────────────────────────────────────────────────────────────
function showModal(title,body,foot){
  document.getElementById('modalTtl').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFoot').innerHTML=foot;
  document.getElementById('modalBd').style.display='flex';
}
window.closeModal=()=>{ document.getElementById('modalBd').style.display='none'; };
window.onMBd=e=>{ if(e.target===document.getElementById('modalBd')) closeModal(); };

// ── HELP ──────────────────────────────────────────────────────────────
function initHelp(){
  if(localStorage.getItem('help_ok')==='1') document.getElementById('helpBd').style.display='none';
}
window.closeHelp=function(){
  if(document.getElementById('helpChk').checked) localStorage.setItem('help_ok','1');
  document.getElementById('helpBd').style.display='none';
};

// ── TOAST ─────────────────────────────────────────────────────────────
let toastT;
function toast(msg,type=''){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.className='toast'+(type?' '+type:''); el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display='none',2800);
}

init();
</script>
</body>
</html>
