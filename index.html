<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 시간표 | 그루터기</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<div class="ld" id="ld" role="status" aria-label="로딩 중"><div class="spin"></div><div class="ld-txt">Loading...</div></div>

<header>
  <a class="logo" href="https://kuagc.com" target="_blank" style="text-decoration:none">KUAGC</a>
  <div class="nav">
    <button class="nav-btn active" id="nb-schedule" onclick="navigate('schedule')">시간표</button>
  </div>
  <div style="width:1px;height:18px;background:var(--border);flex-shrink:0;"></div>
  <button class="hdr-apply-btn" onclick="navigate('timeassign')">📅 시간 배정</button>
  <button class="hdr-school-btn" onclick="navigate('school')">🏫 스쿨 신청</button>
  <button class="hdr-ensemble-btn" onclick="navigate('ensemble')">🎸 합주 신청</button>
  <div class="type-toggle" id="typeToggle" style="display:none">
    <button class="type-btn active" id="tb-regular" onclick="switchType('regular')">일반</button>
    <button class="type-btn" id="tb-busking" onclick="switchType('busking')">버스킹</button>
  </div>
  <div class="hdr-right">
    <div class="season-chip desktop-only" id="seasonChip">—</div>
    <button class="hdr-contacts-btn" onclick="openContactsModal()">📞<span class="desktop-only"> 연락처</span></button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="다크/라이트 모드 전환">🌙</button>
    <div class="week-nav" id="weekNavEl">
      <button onclick="changeWeek(-1)" aria-label="이전 주">‹</button>
      <div class="week-lbl" id="weekLbl">—</div>
      <button onclick="changeWeek(1)" aria-label="다음 주">›</button>
    </div>
  </div>
</header>

<!-- SCHEDULE PAGE -->
<div class="page active" id="pgSchedule">
  <div class="panel-left" id="panelLeft">
    <div id="teamListEl"></div>
  </div>
  <div class="panel-main">
    <div id="noticeBarEl"></div>
    <div class="stats-row" id="statsEl"></div>
    <div class="sch-wrap">
      <div class="sch-title-row">
        <span class="sch-title" id="schTitle">—</span>
        <span class="sch-season" id="schSeason"></span>
      </div>
      <!-- 모바일 요일 탭 (desktop에선 숨김) -->
      <div class="day-tab-bar" id="dayTabBar"></div>
      <div class="sch-hdr" id="schHdr"></div>
      <div class="sch-body">
        <div class="sch-times" id="schTimes"></div>
        <div class="sch-grid" id="schGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE TEAM PANEL -->
<div id="mobileTeamPanel">
  <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px">팀 목록</div>
  <div id="mobileTeamListEl"></div>
</div>

<!-- DYNAMIC VIEW CONTAINER -->
<div id="view-dynamic" style="display:none"></div>

<!-- MOBILE TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tb-schedule" onclick="navigate('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    시간표
  </button>
  <button class="tab-btn" id="tb-teams" onclick="navigate('teams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
    팀 목록
  </button>
  <button class="tab-btn" id="tb-apply" onclick="navigate('timeassign')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    시간배정
  </button>
  <button class="tab-btn" id="tb-school" onclick="navigate('school')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    스쿨신청
  </button>
  <button class="tab-btn" id="tb-ensemble" onclick="navigate('ensemble')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    합주신청
  </button>
</div>

<!-- MODAL -->
<div class="modal-bd" id="modalBd" style="display:none" onclick="onMBd(event)">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-ttl" id="modalTtl"></div><button class="modal-x" onclick="closeModal()" aria-label="닫기">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- STATUS POPUP -->
<div class="status-bd" id="statusBd" style="display:none">
  <div class="status-popup">
    <div class="status-popup-main" id="statusMain"></div>
    <div class="status-popup-foot">
      <label class="status-suppress-lbl"><input type="checkbox" id="statusSuppressChk"> 30분 동안 보지 않기</label>
      <button class="btn btn-p" onclick="closeStatus()">닫기</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite" style="display:none"></div>

<script type="module" src="js/index/main.js"></script>
</body>
</html>
