<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그루터기 하이퍼 코스믹 데이터 매트릭스</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; user-select: none; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: grab; }
        #webgl-canvas:active { cursor: grabbing; }
        
        /* 하단 미니멀 Supabase 입력 제어 UI 콘솔 */
        .supabase-ui-console {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        .space-input {
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid #333;
            color: #fff;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            outline: none;
            width: 240px;
            transition: all 0.3s;
        }
        .space-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }
        .space-btn {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .space-btn:hover {
            background: #00cccc;
            box-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    
    <div class="supabase-ui-console">
        <input type="text" id="msgInput" class="space-input" placeholder="우주에 각인할 텍스트 입력 (엔터)" maxlength="15">
        <button id="sendBtn" class="space-btn">LAUNCH</button>
    </div>

    <script>
        // --- [CRITICAL CONFIG] 본인의 Supabase 접속 정보 주입 자리에 세팅 ---
        const SUPABASE_URL = "https://your-project-id.supabase.co"; 
        const SUPABASE_ANON_KEY = "your-anon-public-key";

        // --- 1. 3D 가상 우주 공간 기초 세팅 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 2. 하이퍼 은하계 성운 파티클 시스템 ---
        const starsGeom = new THREE.BufferGeometry();
        const count = 3500;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        for(let i=0; i<count*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 40;
            positions[i+1] = (Math.random() - 0.5) * 40;
            positions[i+2] = (Math.random() - 0.5) * 40;
            colors[i] = Math.random() * 0.5 + 0.5;
            colors[i+1] = Math.random() * 0.2;
            colors[i+2] = Math.random() * 1.0;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const starField = new THREE.Points(starsGeom, new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
        scene.add(starField);

        // --- 3. 메인 그루터기 3D 입체 블록(두께감) 배치 ---
        let logoMesh, originalPositions, geom;
        geom = new THREE.BoxGeometry(4, 4, 0.4, 48, 48, 6);
        originalPositions = geom.attributes.position.clone();

        new THREE.TextureLoader().load('./img/logo.png', (texture) => {
            const frontMat = new THREE.MeshPhongMaterial({ map: texture, transparent: true, shininess: 200 });
            const sideMat = new THREE.MeshPhongMaterial({ color: 0x1f2226, shininess: 120, specular: 0xffffff });
            logoMesh = new THREE.Mesh(geom, [sideMat, sideMat, sideMat, sideMat, frontMat, sideMat]);
            scene.add(logoMesh);
            gsap.from(logoMesh.scale, { x: 0, y: 0, z: 0, duration: 1.5, ease: "elastic.out(1, 0.5)" });
        });

        // 조명 셋업
        const light1 = new THREE.PointLight(0x00ffff, 3, 30);
        const light2 = new THREE.PointLight(0xff00ff, 3, 30);
        scene.add(light1, light2);

        // --- 4. 드래그 관성 및 클릭 왜곡 데이터 스코프 ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const rotationVelocity = { x: 0, y: 0 };
        let isDragging = false, isPressing = false, pressTimer = null, hitPointLocal = new THREE.Vector3();
        const raycaster = new THREE.Raycaster(), mouseVec = new THREE.Vector2();

        window.addEventListener('mousemove', (e) => {
            // 입력창 내부 컴포넌트 마우스 무브 조작 시 3D 회전 제어 차단 인터셉트
            if(document.activeElement === document.getElementById('msgInput')) return;
            
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDragging && logoMesh) {
                const deltaX = mouse.targetX - mouse.x; const deltaY = mouse.targetY - mouse.y;
                logoMesh.rotation.y += deltaX * 3; logoMesh.rotation.x -= deltaY * 3;
                rotationVelocity.y = deltaX * 1.5; rotationVelocity.x = -deltaY * 1.5;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('.supabase-ui-console')) return; // 입력 오버레이 클릭 시 예외 처리
            mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouseVec, camera);
            if (logoMesh) {
                const intersects = raycaster.intersectObject(logoMesh);
                if (intersects.length > 0) {
                    isDragging = true; isPressing = true;
                    hitPointLocal = logoMesh.worldToLocal(intersects[0].point.clone());
                    rotationVelocity.x = 0; rotationVelocity.y = 0;
                    gsap.killTweensOf(window);
                    pressTimer = gsap.to(window, { deformStrength: 1.5, duration: 1.0, ease: "power2.out" });
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (isPressing) {
                isDragging = false; isPressing = false;
                if (pressTimer) pressTimer.kill();
                gsap.to(window, {
                    deformStrength: 0, duration: 1.4, ease: "elastic.out(1.2, 0.4)",
                    onUpdate: () => { if(logoMesh) updateDeformation(); },
                    onComplete: () => { if(logoMesh) { geom.attributes.position.copy(originalPositions); geom.attributes.position.needsUpdate = true; } }
                });
            }
        });

        function updateDeformation() {
            if (!logoMesh) return;
            const posAttr = geom.attributes.position; const origAttr = originalPositions; const normAttr = geom.attributes.normal;
            for (let i = 0; i < posAttr.count; i++) {
                const vx = origAttr.getX(i); const vy = origAttr.getY(i); const vz = origAttr.getZ(i);
                const dist = Math.sqrt((vx - hitPointLocal.x)**2 + (vy - hitPointLocal.y)**2 + (vz - hitPointLocal.z)**2);
                if (dist < 2.0) {
                    const falloff = (1.0 - (dist / 2.0)) ** 2;
                    const nx = normAttr.getX(i); const ny = normAttr.getY(i); const nz = normAttr.getZ(i);
                    posAttr.setX(i, vx + nx * falloff * window.deformStrength * 0.5);
                    posAttr.setY(i, vy + ny * falloff * window.deformStrength * 0.5);
                    posAttr.setZ(i, vz + nz * falloff * window.deformStrength * 0.5);
                } else {
                    posAttr.setX(i, vx); posAttr.setY(i, vy); posAttr.setZ(i, vz);
                }
            }
            posAttr.needsUpdate = true; geom.computeVertexNormals();
        }

        // --- 5. [핵심 기술] 한글 손글씨 JSON 폰트 파싱 및 3D 생성 엔진 ---
        let globalFont = null;
        const floatingTexts = []; // 우주에 띄운 텍스트 객체 배열 구조체
        const fontLoader = new THREE.FontLoader();
        
        // 오픈소스 CDN을 통해 '나눔손글씨 붓' 고해상도 벡터 다면체 JSON 데이터 스트리밍 로드
        fontLoader.load('https://raw.githubusercontent.com/space-shuttle/kr-fonts-json/main/NanumBrushScript_Regular.json', (font) => {
            globalFont = font;
            // 폰트 로드가 끝나면 Supabase로부터 기존 유저들이 입력했던 데이터 일괄 소환
            fetchExistingMessages();
        });

        // 3D 텍스트 개체를 매트릭스 내부 공간에 임베딩 및 날리기 함수
        function create3DText(textStr, isNewLaunch = false) {
            if (!globalFont) return;

            // 3D 텍스트 지오메트리 옵션 상세 정의 (한글 손글씨 두께감 0.15 구현)
            const textGeom = new THREE.TextGeometry(textStr, {
                font: globalFont,
                size: 0.4,
                height: 0.15,
                curveSegments: 4,
                bevelEnabled: true,
                bevelThickness: 0.02,
                bevelSize: 0.01,
                bevelSegments: 2
            });
            textGeom.center(); // 바운딩 박스 정중앙 정렬

            // 네온 무광 매테리얼 조합 (무작위 사이버 컬러 조합)
            const textMat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`hsl(${Math.random() * 360}, 90%, 65%)`),
                shininess: 100
            });

            const textMesh = new THREE.Mesh(textGeom, textMat);

            // 초기 물리적 소환 위치 서정 (로고 주변에 무작위 구체 궤도 분포)
            if(isNewLaunch) {
                // 새로 작성된 글은 정면 중앙에서 대폭발 스케일로 사출 연출
                textMesh.position.set(0, 0, 3);
                textMesh.scale.set(0, 0, 0);
                gsap.to(textMesh.scale, { x: 1, y: 1, z: 1, duration: 1, ease: "back.out(1.7)" });
            } else {
                textMesh.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 4 - 2);
            }

            // 고유 유영 관성값 임베딩
            textMesh.userData = {
                rotSpeedX: (Math.random() - 0.5) * 0.015,
                rotSpeedY: (Math.random() - 0.5) * 0.015,
                seed: Math.random() * 50,
                baseX: textMesh.position.x,
                baseY: textMesh.position.y
            };

            scene.add(textMesh);
            floatingTexts.push(textMesh);
        }

        // --- 6. Supabase REST API 연동 네트워크 레이어 ---
        async function fetchExistingMessages() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/space_messages?select=text&order=created_at.desc&limit=25`, {
                    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
                });
                const data = await response.json();
                // 기존 가동되었던 최대 25개의 메시지들을 우주 배경 공간에 역전개 소환
                data.forEach(item => create3DText(item.text, false));
            } catch (err) { console.error("Supabase 로드 오류:", err); }
        }

        async function uploadMessage(textStr) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/space_messages`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ text: textStr })
                });
            } catch (err) { console.error("Supabase 전송 오류:", err); }
        }

        // UI 이벤트 바인딩
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        function triggerLaunch() {
            const val = msgInput.value.trim();
            if(!val) return;
            if(!globalFont) { alert("한글 3D 엔진 초기화 중입니다. 잠시만 기다려주세요."); return; }

            create3DText(val, true); // 내 화면에 즉각 실시간 3D 사출 연출
            uploadMessage(val);     // Supabase 원격 공유 클라우드 테이블에 기록 전송
            msgInput.value = '';
        }

        sendBtn.addEventListener('click', triggerLaunch);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') triggerLaunch(); });


        // --- 7. 실시간 메인 프레임 렌더 룹 (지랄 가속도 엔진) ---
        const clock = new THREE.Clock();
        window.deformStrength = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            mouse.x += (mouse.targetX - mouse.x) * 0.1;
            mouse.y += (mouse.targetY - mouse.y) * 0.1;

            if (isPressing) updateDeformation();

            if (logoMesh) {
                if (!isDragging) {
                    logoMesh.rotation.y += rotationVelocity.y; logoMesh.rotation.x += rotationVelocity.x;
                    rotationVelocity.y *= 0.95; rotationVelocity.x *= 0.95;
                    logoMesh.rotation.y += (mouse.x * 0.04); logoMesh.rotation.x += (-mouse.y * 0.04);
                }
                logoMesh.position.x = mouse.x * 2.5; logoMesh.position.y = mouse.y * 2.5;
                logoMesh.position.z = Math.sin(time * 3) * 0.1 + (Math.abs(rotationVelocity.y) * 4);
            }

            // [추가 잡기술] 우주 공간에 생성된 한글 3D 텍스트 개체들의 무작위 자율 유영 물리 시뮬레이션
            floatingTexts.forEach((textMesh) => {
                const ud = textMesh.userData;
                // 천천히 자전 처리
                textMesh.rotation.x += ud.rotSpeedX;
                textMesh.rotation.y += ud.rotSpeedY;
                // 코스믹 부유 효과 (사인파 중합 연산)
                textMesh.position.x = ud.baseX + Math.sin(time * 0.5 + ud.seed) * 0.3;
                textMesh.position.y = ud.baseY + Math.cos(time * 0.4 + ud.seed) * 0.3;
            });

            starField.rotation.y = time * 0.03;
            starField.position.x = -mouse.x * 1.5; starField.position.y = -mouse.y * 1.5;

            light1.position.set(Math.sin(time * 3) * 5, Math.cos(time * 2) * 5, 3);
            light2.position.set(mouse.x * 6, mouse.y * 6, 2);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
