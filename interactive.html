<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그루터기 하이퍼 탄성 매트릭스</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; user-select: none; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: grab; }
        #webgl-canvas:active { cursor: grabbing; }
        
        .system-ui {
            position: absolute; top: 4%; left: 4%; z-index: 10;
            color: #00ffff; font-family: monospace; font-size: 0.75rem; line-height: 1.6;
            text-shadow: 0 0 5px #00ffff; pointer-events: none;
        }
        .center-instruction {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); z-index: 10;
            color: #ffff00; font-family: monospace; font-size: 0.8rem; letter-spacing: 3px;
            text-shadow: 0 0 8px #ffff00; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    
    <div class="system-ui">
        [SYSTEM: HYPER-ELASTIC LOGO MATRIX ACTIVE]<br>
        [ENGINES: THREE.JS + GSAP ENHANCED]<br>
        [INTERACTION: DRAG TO SPIN / LONG PRESS TO SQUASH]
    </div>
    
    <div class="center-instruction">DRAG TO FLING / HOLD & RELEASE FOR JELLY ELASTICITY</div>

    <script>
        // --- 1. 3D 가상 우주 공간 기초 세팅 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 2. 하이퍼 은하계 파티클 시스템 (배경 디스플레이스먼트용 3500개) ---
        const starsGeom = new THREE.BufferGeometry();
        const count = 3500;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i=0; i<count*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 40;
            positions[i+1] = (Math.random() - 0.5) * 40;
            positions[i+2] = (Math.random() - 0.5) * 40;
            
            colors[i] = Math.random() * 0.5 + 0.5;
            colors[i+1] = Math.random() * 0.2;
            colors[i+2] = Math.random() * 1.0;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const starMat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const starField = new THREE.Points(starsGeom, starMat);
        scene.add(starField);

        // --- 3. 메인 그루터기 로고 배치 (고해상도 버텍스 세그먼트 부여) ---
        let logoMesh;
        // 꾹 누를 때 마우스 좌표 중심으로 찌그러트리는 연출을 위해 세그먼트를 64x64로 쪼갭니다.
        const geom = new THREE.PlaneGeometry(4, 4, 64, 64);
        // 원래 버텍스 위치 기억용 배열
        const originalPositions = geom.attributes.position.clone();

        new THREE.TextureLoader().load('./img/logo.png', (texture) => {
            const mat = new THREE.MeshPhongMaterial({ 
                map: texture, 
                transparent: true, 
                side: THREE.DoubleSide, 
                shininess: 200,
                depthWrite: false
            });
            logoMesh = new THREE.Mesh(geom, mat);
            scene.add(logoMesh);
            
            // 최초 진입 연출
            gsap.from(logoMesh.scale, { x: 0, y: 0, z: 0, duration: 1.5, ease: "elastic.out(1, 0.5)" });
        });

        // --- 4. 네온 라이팅 시스템 ---
        const light1 = new THREE.PointLight(0x00ffff, 3, 30);
        const light2 = new THREE.PointLight(0xff00ff, 3, 30);
        scene.add(light1, light2);

        // --- 5. 마우스 트래킹 및 드래그/인터랙션 데이터 연산 장치 ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const rotationVelocity = { x: 0, y: 0 }; // 던지는 관성 속도
        
        let isDragging = false;
        let isPressing = false;
        let pressTimer = null;
        let deformStrength = 0; // 부풀어 오르는 누적 강도
        
        const raycaster = new THREE.Raycaster();
        const mouseVec = new THREE.Vector2();
        let hitPoint3D = new THREE.Vector3(); // 꾹 누른 3D 로고 표면 좌표

        // 마우스 무브먼트 핸들러
        window.addEventListener('mousemove', (e) => {
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;

            mouseVec.x = mouse.targetX;
            mouseVec.y = mouse.targetY;

            // 드래그 중일 때 로고 마우스 방향으로 회전 강제 가속화
            if (isDragging && logoMesh) {
                // 이전 프레임과의 차이만큼 회전 속도 부여 (잡기술: 마우스 변조 플링)
                const deltaX = mouse.targetX - mouse.x;
                const deltaY = mouse.targetY - mouse.y;
                
                logoMesh.rotation.y += deltaX * 3;
                logoMesh.rotation.x -= deltaY * 3;

                rotationVelocity.y = deltaX * 1.5;
                rotationVelocity.x = -deltaY * 1.5;
            }
        });

        // 다운 (클릭 및 꾹 누르기 시작)
        window.addEventListener('mousedown', (e) => {
            mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouseVec, camera);
            if (logoMesh) {
                const intersects = raycaster.intersectObject(logoMesh);
                
                // 로고 위를 정확히 클릭했을 때만 발동
                if (intersects.length > 0) {
                    isDragging = true;
                    isPressing = true;
                    hitPoint3D.copy(intersects[0].point); // 정확히 클릭된 3D 지점 저장

                    // 드래그 시작 시 기존 회전 관성 정지
                    rotationVelocity.x = 0;
                    rotationVelocity.y = 0;

                    // [탱탱볼 효과] 누르고 있으면 실시간으로 부풀어 오르는 강도 누적 트래킹
                    gsap.killTweensOf(window); // 기존 리턴 트윈 초기화
                    pressTimer = gsap.to(window, {
                        deformStrength: 1.8, 
                        duration: 1.2, 
                        ease: "power2.out"
                    });
                }
            }
        });

        // 업 (마우스를 놓았을 때 탄성 복귀)
        window.addEventListener('mouseup', () => {
            if (isPressing) {
                isDragging = false;
                isPressing = false;
                if (pressTimer) pressTimer.kill();

                // [탱탱볼 복귀] 부풀어 올랐던 변형 강도를 탱탱하게 0으로 리턴 (Elastic 튕김 효과)
                gsap.to(window, {
                    deformStrength: 0,
                    duration: 1.5,
                    ease: "elastic.out(1.5, 0.3)", // 극대화된 젤리 복원력 바인딩
                    onUpdate: () => {
                        if(!logoMesh) return;
                        // GSAP이 0으로 복귀시키는 도중에도 실시간으로 메시 형태 복원 연산
                        updateDeformation();
                    },
                    onComplete: () => {
                        // 완전히 끝나면 버텍스 위치 완벽 원상복구 보정
                        if(logoMesh) {
                            geom.attributes.position.copy(originalPositions);
                            geom.attributes.position.needsUpdate = true;
                        }
                    }
                });
            }
        });

        // --- 6. 실시간 정밀 3D 버텍스 파괴/부품 변형 연산 엔진 ---
        function updateDeformation() {
            if (!logoMesh) return;

            const posAttr = geom.attributes.position;
            const origAttr = originalPositions;
            
            // 로고의 현재 세계관 중심 매트릭스 변환
            const localHit = logoMesh.worldToLocal(hitPoint3D.clone());

            for (let i = 0; i < posAttr.count; i++) {
                // 원본 버텍스 좌표 가져오기
                const vx = origAttr.getX(i);
                const vy = origAttr.getY(i);
                const vz = origAttr.getZ(i);

                // 클릭한 3D 위치와 각 정점(Vertex) 사이의 거리 계산
                const dist = Math.sqrt((vx - localHit.x)**2 + (vy - localHit.y)**2);

                // 마우스 클릭 반경 내의 버텍스들을 마우스 반대축(Z축 앞)으로 밀어내어 부풀림 구현
                if (dist < 2.5) {
                    const falloff = (1.0 - (dist / 2.5)) ** 2; // 거리에 따른 왜곡 감쇄율
                    // Z축으로 부풀리며 볼록 렌즈 효과 연출
                    posAttr.setZ(i, vz + (falloff * window.deformStrength * 1.2));
                } else {
                    posAttr.setZ(i, vz);
                }
            }
            posAttr.needsUpdate = true;
            geom.computeVertexNormals(); // 빛 반사 법선 벡터 재계산하여 네온 반사각 유지
        }

        // --- 7. 실시간 메인 프레임 렌더 룹 (지랄 가속도 엔진) ---
        const clock = new THREE.Clock();
        window.deformStrength = 0; // 글로벌 윈도우 스코프 바인딩

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 부드러운 감속 LERP 추적
            mouse.x += (mouse.targetX - mouse.x) * 0.1;
            mouse.y += (mouse.targetY - mouse.y) * 0.1;

            // 1. 누르고 있는 동안 실시간 버텍스 융기 처리
            if (isPressing) {
                updateDeformation();
            }

            if (logoMesh) {
                if (!isDragging) {
                    // 2. 드래그를 놓았을 때 적용되는 관성 회전 속도 (마찰 저항값 0.95 부과)
                    logoMesh.rotation.y += rotationVelocity.y;
                    logoMesh.rotation.x += rotationVelocity.x;
                    
                    rotationVelocity.y *= 0.95;
                    rotationVelocity.x *= 0.95;

                    // 평상시 마우스 포인터 움직임에 따른 격렬한 추가 반응 (기존보다 반응 증폭값 2.5배 상향)
                    logoMesh.rotation.y += (mouse.x * 0.05);
                    logoMesh.rotation.x += (-mouse.y * 0.05);
                }

                // 3. 마우스 포인터 위치에 따른 로고 자체의 3D 공간 요동 무브먼트 (격렬하게 포지션 이동)
                logoMesh.position.x = mouse.x * 2.5;
                logoMesh.position.y = mouse.y * 2.5;
                
                // 마우스 속도에 반응하여 Z축으로 울렁거리는 잡기술
                logoMesh.position.z = Math.sin(time * 3) * 0.2 + (Math.abs(rotationVelocity.y) * 5);
            }

            // 4. 배경 성운 파티클 공간의 매트릭스 동시 뒤틀기
            starField.rotation.y = time * 0.03;
            starField.position.x = -mouse.x * 1.5;
            starField.position.y = -mouse.y * 1.5;

            // 5. 네온 조명의 초고속 크로스 추격전
            light1.position.set(Math.sin(time * 3) * 5, Math.cos(time * 2) * 5, 3);
            light2.position.set(mouse.x * 6, mouse.y * 6, 2);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
