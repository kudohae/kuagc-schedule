<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그루터기 하이퍼 코스믹 타이포그래피</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; user-select: none; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; cursor: grab; }
        #webgl-canvas:active { cursor: grabbing; }
        
        /* 하단 Supabase 입력 콘솔 UI */
        .supabase-ui-console {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(4px);
        }
        .space-input {
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid #333;
            color: #fff;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            outline: none;
            width: 240px;
            transition: all 0.3s;
        }
        .space-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }
        .space-btn {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .space-btn:hover {
            background: #00cccc;
            box-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    
    <div class="supabase-ui-console">
        <input type="text" id="msgInput" class="space-input" placeholder="우주에 각인할 텍스트 입력 (엔터)" maxlength="15">
        <button id="sendBtn" class="space-btn">LAUNCH</button>
    </div>

    <script>
        // --- [CONFIG] Supabase 접속 정보 입력 자리에 세팅 ---
        const SUPABASE_URL = "https://your-project-id.supabase.co"; 
        const SUPABASE_ANON_KEY = "your-anon-public-key";

        // --- 1. 3D 가상 우주 공간 세팅 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 7;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 2. 하이퍼 은하계 파티클 시스템 ---
        const starsGeom = new THREE.BufferGeometry();
        const count = 3000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        for(let i=0; i<count*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 50;
            positions[i+1] = (Math.random() - 0.5) * 50;
            positions[i+2] = (Math.random() - 0.5) * 50;
            colors[i] = Math.random() * 0.4 + 0.6;
            colors[i+1] = Math.random() * 0.2;
            colors[i+2] = Math.random() * 1.0;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const starField = new THREE.Points(starsGeom, new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
        scene.add(starField);

        // 조명 셋업 (금속성 텍스트 반사용 스포트라이트 조합)
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);
        const light1 = new THREE.PointLight(0x00ffff, 4, 40);
        const light2 = new THREE.PointLight(0xff00ff, 4, 40);
        scene.add(light1, light2);

        // --- 3. 인터랙션 및 드래그 관성 물리 트래킹 데이터 ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const rotationVelocity = { x: 0, y: 0 };
        let isDragging = false, isPressing = false, pressTimer = null;
        const raycaster = new THREE.Raycaster(), mouseVec = new THREE.Vector2();
        
        let logoMesh = null;        // 메인 "그루터기" 3D 오브젝트
        let geom = null;            // 메인 텍스트 지오메트리
        let originalPositions = null;
        let hitPointLocal = new THREE.Vector3();

        window.addEventListener('mousemove', (e) => {
            if(document.activeElement === document.getElementById('msgInput')) return;
            
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDragging && logoMesh) {
                const deltaX = mouse.targetX - mouse.x;
                const deltaY = mouse.targetY - mouse.y;
                
                logoMesh.rotation.y += deltaX * 3;
                logoMesh.rotation.x -= deltaY * 3;

                rotationVelocity.y = deltaX * 1.5;
                rotationVelocity.x = -deltaY * 1.5;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('.supabase-ui-console')) return;
            mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouseVec, camera);
            if (logoMesh) {
                const intersects = raycaster.intersectObject(logoMesh);
                if (intersects.length > 0) {
                    isDragging = true;
                    isPressing = true;
                    
                    hitPointLocal = logoMesh.worldToLocal(intersects[0].point.clone());
                    rotationVelocity.x = 0; rotationVelocity.y = 0;

                    gsap.killTweensOf(window);
                    pressTimer = gsap.to(window, { deformStrength: 1.2, duration: 0.8, ease: "power2.out" });
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (isPressing) {
                isDragging = false; isPressing = false;
                if (pressTimer) pressTimer.kill();
                
                gsap.to(window, {
                    deformStrength: 0, duration: 1.4, ease: "elastic.out(1.2, 0.4)",
                    onUpdate: () => { if(logoMesh) updateDeformation(); },
                    onComplete: () => {
                        if(logoMesh) {
                            geom.attributes.position.copy(originalPositions);
                            geom.attributes.position.needsUpdate = true;
                        }
                    }
                });
            }
        });

        // 벡터 팽창 연산식 (순수 글자 버텍스 법선 방향 확장)
        function updateDeformation() {
            if (!logoMesh) return;
            const posAttr = geom.attributes.position;
            const origAttr = originalPositions;
            const normAttr = geom.attributes.normal;

            for (let i = 0; i < posAttr.count; i++) {
                const vx = origAttr.getX(i); const vy = origAttr.getY(i); const vz = origAttr.getZ(i);
                const dist = Math.sqrt((vx - hitPointLocal.x)**2 + (vy - hitPointLocal.y)**2 + (vz - hitPointLocal.z)**2);

                if (dist < 2.5) {
                    const falloff = (1.0 - (dist / 2.5)) ** 2;
                    const nx = normAttr.getX(i); const ny = normAttr.getY(i); const nz = normAttr.getZ(i);

                    posAttr.setX(i, vx + nx * falloff * window.deformStrength * 0.6);
                    posAttr.setY(i, vy + ny * falloff * window.deformStrength * 0.6);
                    posAttr.setZ(i, vz + nz * falloff * window.deformStrength * 0.6);
                } else {
                    posAttr.setX(i, vx); posAttr.setY(i, vy); posAttr.setZ(i, vz);
                }
            }
            posAttr.needsUpdate = true;
            geom.computeVertexNormals();
        }

        // --- 4. [중요] 한글 폰트 파싱 및 3D 타이포그래피 구현부 ---
        let globalFont = null;
        const floatingTexts = [];
        const fontLoader = new THREE.FontLoader();
        
        // 고해상도 나눔손글씨 붓 JSON 오픈소스 백터 폰트 로드
        fontLoader.load('https://raw.githubusercontent.com/space-shuttle/kr-fonts-json/main/NanumBrushScript_Regular.json', (font) => {
            globalFont = font;
            
            // A. 메인 시그니처 "그루터기" 3D 텍스트 빌드
            buildMainLogoText();
            
            // B. Supabase 데이터 동기화 연동 실행
            fetchExistingMessages();
        });

        function buildMainLogoText() {
            // 메인 타이포 정밀 스펙 설정 (두께 0.4 부여 및 베벨 라운딩 처리)
            geom = new THREE.TextGeometry("그루터기", {
                font: globalFont,
                size: 1.4,
                height: 0.4,
                curveSegments: 12, // 글자의 곡선을 부드럽게 세그먼트 밀도화
                bevelEnabled: true,
                bevelThickness: 0.06,
                bevelSize: 0.03,
                bevelSegments: 3
            });
            geom.center(); // 글자 메쉬의 피벗을 정확히 정중앙으로 보정
            originalPositions = geom.attributes.position.clone();

            // 정면은 화이트 실버, 측면은 딥 사이언 컬러 배합으로 입체감 분리 극대화
            const frontMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 200, specular: 0xffffff });
            const sideMat = new THREE.MeshPhongMaterial({ color: 0x005577, shininess: 100 });
            
            logoMesh = new THREE.Mesh(geom, [frontMat, sideMat]);
            scene.add(logoMesh);

            gsap.from(logoMesh.scale, { x: 0, y: 0, z: 0, duration: 1.5, ease: "elastic.out(1, 0.5)" });
        }

        // B. 사용자들이 사출한 유저 파티클 텍스트 생성기
        function createUser3DText(textStr, isNewLaunch = false) {
            if (!globalFont) return;

            const textGeom = new THREE.TextGeometry(textStr, {
                font: globalFont,
                size: 0.45,
                height: 0.15,
                curveSegments: 4,
                bevelEnabled: true,
                bevelThickness: 0.02,
                bevelSize: 0.01,
                bevelSegments: 2
            });
            textGeom.center();

            const textMat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`hsl(${Math.random() * 360}, 95%, 65%)`),
                shininess: 120
            });

            const textMesh = new THREE.Mesh(textGeom, textMat);

            if(isNewLaunch) {
                textMesh.position.set(0, 0, 3);
                textMesh.scale.set(0, 0, 0);
                gsap.to(textMesh.scale, { x: 1, y: 1, z: 1, duration: 1, ease: "back.out(1.5)" });
            } else {
                textMesh.position.set((Math.random() - 0.5) * 14, (Math.random() - 0.5) * 9, (Math.random() - 0.5) * 5 - 2);
            }

            textMesh.userData = {
                rotSpeedX: (Math.random() - 0.5) * 0.012,
                rotSpeedY: (Math.random() - 0.5) * 0.012,
                seed: Math.random() * 100,
                baseX: textMesh.position.x,
                baseY: textMesh.position.y
            };

            scene.add(textMesh);
            floatingTexts.push(textMesh);
        }

        // --- 5. Supabase 통신 연산 레이어 ---
        async function fetchExistingMessages() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/space_messages?select=text&order=created_at.desc&limit=25`, {
                    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
                });
                const data = await response.json();
                data.forEach(item => createUser3DText(item.text, false));
            } catch (err) { console.error("Supabase 로드 오류:", err); }
        }

        async function uploadMessage(textStr) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/space_messages`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ text: textStr })
                });
            } catch (err) { console.error("Supabase 전송 오류:", err); }
        }

        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        function triggerLaunch() {
            const val = msgInput.value.trim();
            if(!val) return;
            if(!globalFont) return;

            createUser3DText(val, true);
            uploadMessage(val);
            msgInput.value = '';
        }

        sendBtn.addEventListener('click', triggerLaunch);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') triggerLaunch(); });

        // --- 6. 실시간 프레임 동적 렌더 룹 ---
        const clock = new THREE.Clock();
        window.deformStrength = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            mouse.x += (mouse.targetX - mouse.x) * 0.1;
            mouse.y += (mouse.targetY - mouse.y) * 0.1;

            if (isPressing) updateDeformation();

            if (logoMesh) {
                if (!isDragging) {
                    logoMesh.rotation.y += rotationVelocity.y;
                    logoMesh.rotation.x += rotationVelocity.x;
                    rotationVelocity.y *= 0.95;
                    rotationVelocity.x *= 0.95;

                    // 평상시 마우스 움직임 동기화 회전각
                    logoMesh.rotation.y += (mouse.x * 0.05);
                    logoMesh.rotation.x += (-mouse.y * 0.04);
                }
                // 마우스 추적 위치 시프트 이동
                logoMesh.position.x = mouse.x * 2.5;
                logoMesh.position.y = mouse.y * 2.5;
                logoMesh.position.z = Math.sin(time * 2.5) * 0.15 + (Math.abs(rotationVelocity.y) * 4);
            }

            // 유저 사출 서브 한글 3D 텍스트 개체들 공간 유영 연산
            floatingTexts.forEach((textMesh) => {
                const ud = textMesh.userData;
                textMesh.rotation.x += ud.rotSpeedX;
                textMesh.rotation.y += ud.rotSpeedY;
                textMesh.position.x = ud.baseX + Math.sin(time * 0.4 + ud.seed) * 0.4;
                textMesh.position.y = ud.baseY + Math.cos(time * 0.3 + ud.seed) * 0.4;
            });

            starField.rotation.y = time * 0.02;
            starField.position.x = -mouse.x * 1.5;
            starField.position.y = -mouse.y * 1.5;

            light1.position.set(Math.sin(time * 2) * 6, Math.cos(time * 1.5) * 6, 4);
            light2.position.set(mouse.x * 6, mouse.y * 6, 3);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
