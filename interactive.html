<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그루터기 인터랙티브</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* 배경 우주 느낌의 그라디언트 및 패러랙스 요소 */
        .bg-container {
            position: absolute;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            background: radial-gradient(circle at center, #111115 0%, #000000 80%);
            z-index: 1;
            will-change: transform;
        }

        .bg-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.4;
            z-index: 2;
            will-change: transform;
        }

        /* 마우스 클릭 파티클 캔버스 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* 클릭 이벤트가 뒤로 통과되도록 설정 */
        }

        /* 메인 로고 컨테이너 (중앙 정렬 및 3D 이펙트 준비) */
        .logo-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            perspective: 1000px;
            cursor: pointer;
        }

        .logo-container {
            width: 400px;
            height: 400px;
            max-width: 90vw;
            max-height: 90vw;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* 초기 진입 모션 그래픽을 위한 설정 */
            opacity: 0;
            transform: scale(0.3) rotate(-15deg);
            filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0));
        }

        /* 안내 문구 */
        .instruction {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bgLayer"></div>
    <div class="bg-stars" id="starLayer"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="logo-wrapper" id="logoWrapper">
        <div class="logo-container" id="logoContainer">
            <img src="./img/logo.png" alt="그루터기 로고" class="logo-img" id="logo">
        </div>
    </div>

    <div class="instruction" id="instruction">MOVE MOUSE & CLICK LOGO</div>

    <script>
        const logo = document.getElementById('logo');
        const logoContainer = document.getElementById('logoContainer');
        const bgLayer = document.getElementById('bgLayer');
        const starLayer = document.getElementById('starLayer');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');

        // 1. 화면 진입 모션 그래픽 (Intro Motion)
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            
            tl.to(logo, {
                opacity: 1,
                scale: 1,
                rotation: 0,
                duration: 1.8,
                ease: "power4.out"
            })
            .to(logo, {
                filter: "drop-shadow(0 0 25px rgba(255, 255, 255, 0.6))",
                duration: 1,
                ease: "power2.bleed"
            }, "-=0.8")
            .to(instruction, {
                opacity: 1,
                duration: 1
            }, "-=0.5");
        });

        // 2. 마우스 움직임 연동 (패러랙스 및 3D 호버 이펙트)
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // 화면 중심 기준 마우스 좌표 (-0.5 ~ 0.5)
            const mouseX = (e.clientX / width) - 0.5;
            const mouseY = (e.clientY / height) - 0.5;

            // 배경 패러랙스 (반대 방향으로 은은하게 이동)
            gsap.to(bgLayer, { x: -mouseX * 30, y: -mouseY * 30, duration: 0.7, ease: "power1.out" });
            gsap.to(starLayer, { x: -mouseX * 60, y: -mouseY * 60, duration: 0.9, ease: "power1.out" });

            // 로고 3D 틸트 호버 효과
            gsap.to(logoContainer, {
                rotateY: mouseX * 45,  // 좌우 회전 값
                rotateX: -mouseY * 45, // 상하 회전 값
                x: mouseX * 20,        // 중심축 약간 이동
                y: mouseY * 20,
                duration: 0.5,
                ease: "power2.out"
            });
        });

        // 3. 마우스 클릭 이펙트 (Canvas 파티클 시스템)
        let particles = [];
        
        // 캔버스 크기 동적 맞춤
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // 사방으로 퍼지는 속도 정의
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.radius = Math.random() * 3 + 1;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                // 화려함을 더할 무작위 컬러 파티클 (흰색~연푸른색 계열)
                this.color = `hsla(${200 + Math.random() * 40}, 100%, 85%, `;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 미세한 중력 작용
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                // 빛나는 효과 부여
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#fff";
                ctx.fill();
                ctx.restore();
            }
        }

        // 애니메이션 루프 실행
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 클릭 시 로고 스케일 팝 반응 및 파티클 생성
        document.getElementById('logoWrapper').addEventListener('click', (e) => {
            // 클릭 충격 이펙트 (로고 순간 압축 후 튕김)
            gsap.timeline()
                .to(logo, { scale: 0.85, filter: "drop-shadow(0 0 40px rgba(255, 255, 255, 1))", duration: 0.1 })
                .to(logo, { scale: 1, filter: "drop-shadow(0 0 25px rgba(255, 255, 255, 0.6))", duration: 0.4, ease: "elastic.out(1, 0.3)" });

            // 클릭 위치 기준 50개의 불꽃 파티클 생성
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });
    </script>
</body>
</html>
