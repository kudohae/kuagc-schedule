<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그루터기 사이버네틱스</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
        }
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* 사이버펑크 스타일 오버레이 안내 */
        .ui-overlay {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #00ffff;
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ffff;
            pointer-events: none;
            opacity: 0;
            text-align: center;
        }
        .glitch-text {
            animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 2px -1px 0 #ff00ff, -2px 1px 0 #00ffff; }
            50% { text-shadow: -1px 2px 0 #ff00ff, 2px -2px 0 #00ffff; }
            100% { text-shadow: 1px -1px 0 #ff00ff, -1px 1px 0 #00ffff; }
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div class="ui-overlay" id="ui"><span class="glitch-text">SYSTEM ACTIVE: MOVE MOUSE & OVERDRIVE CLICK</span></div>

    <script>
        // 1. 기본 3D 셋업 (Scene, Camera, Renderer)
        const scene = new THREE.Scene();
        // 안개 효과 추가하여 깊이감(패러랙스 극대화) 조성
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 2. 우주공간 파티클 필드 (3,000개의 성운 입자)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);
        const starColors = new Float32Array(starsCount * 3);

        for(let i=0; i < starsCount * 3; i+=3) {
            // 사방에 무작위 배치
            starPositions[i] = (Math.random() - 0.5) * 30;
            starPositions[i+1] = (Math.random() - 0.5) * 30;
            starPositions[i+2] = (Math.random() - 0.5) * 30;

            // 사이버네틱 컬러 (네온 블루, 마젠타, 화이트 믹스)
            starColors[i] = Math.random() > 0.5 ? 0.0 : 1.0;     // R
            starColors[i+1] = Math.random() > 0.5 ? 1.0 : 0.0;   // G
            starColors[i+2] = 1.0;                               // B
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        // 입자 텍스처 스타일링
        const starMaterial = new THREE.PointsMaterial({
            size: 0.06,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const starField = new THREE.Points(starsGeometry, starMaterial);
        scene.add(starField);

        // 3. 메인 3D 로고 플레이트 생성
        let logoMesh;
        const textureLoader = new THREE.TextureLoader();
        
        // 여기에 이미지 경로 바인딩
        textureLoader.load('./img/logo.png', (texture) => {
            // 로고 정밀 사각형 평면
            const geometry = new THREE.PlaneGeometry(3.5, 3.5, 32, 32);
            
            // 고급 메테리얼 설정: 마우스 빛에 반응하는 질감 구현
            const material = new THREE.MeshPhongMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                shininess: 100,
                specular: 0xffffff
            });
            
            logoMesh = new THREE.Mesh(geometry, material);
            logoMesh.scale.set(0, 0, 0); // 인트로용 초기화
            scene.add(logoMesh);

            // 최초 화면 진입 연출 (시공간 왜곡 돌진 마우스 인트로)
            gsap.to(logoMesh.scale, { x: 1, y: 1, z: 1, duration: 2, ease: "elastic.out(1, 0.5)" });
            gsap.to(logoMesh.rotation, { z: Math.PI * 2, duration: 2, ease: "power4.out" });
            gsap.to(document.getElementById('ui'), { opacity: 1, duration: 1, delay: 1.5 });
        });

        // 4. 조명 시스템 (마우스 반응형 네온 스포트라이트)
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x00ffff, 2, 50); // 사이언 빔
        const pointLight2 = new THREE.PointLight(0xff00ff, 2, 50); // 마젠타 빔
        scene.add(pointLight1, pointLight2);

        // 5. 마우스 인터랙션 데이터 트래킹
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const raycaster = new THREE.Raycaster(); // 클릭 위치 판정용
        const clickCoords = new THREE.Vector2();

        window.addEventListener('mousemove', (e) => {
            // 정규화 좌표 (-1 ~ 1)
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // 6. 하이퍼 파티클 클릭 엔진 (클릭 시 3D 파티클 분사)
        const clickParticlesCount = 150;
        const clickGeometry = new THREE.BufferGeometry();
        const clickPositions = new Float32Array(clickParticlesCount * 3);
        const clickVels = [];

        for(let i=0; i<clickParticlesCount; i++) {
            // 대기 상태 좌표 배치
            clickPositions[i*3] = 999;
            clickPositions[i*3+1] = 999;
            clickPositions[i*3+2] = 999;
            clickVels.push(new THREE.Vector3());
        }
        clickGeometry.setAttribute('position', new THREE.BufferAttribute(clickPositions, 3));
        const clickMaterial = new THREE.PointsMaterial({
            size: 0.08,
            color: 0xffffff,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const clickParticleSystem = new THREE.Points(clickGeometry, clickMaterial);
        scene.add(clickParticleSystem);

        let activeParticleIdx = 0;

        window.addEventListener('click', (e) => {
            clickCoords.x = (e.clientX / window.innerWidth) * 2 - 1;
            clickCoords.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // 3D 스페이스 상의 마우스 월드 좌표 역추적 계산
            raycaster.setFromCamera(clickCoords, camera);
            const targetPos = new THREE.Vector3();
            raycaster.ray.at(5, targetPos); // 카메라 앞 5유닛 거리의 좌표 계산

            // 로고 펄스 리액션 강타 애니메이션
            if(logoMesh) {
                gsap.timeline()
                    .to(logoMesh.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 0.05 })
                    .to(logoMesh.scale, { x: 1, y: 1, z: 1, duration: 0.6, ease: "elastic.out(1, 0.3)" });
                
                // 광폭 회전축 뒤틀기 잡기술
                gsap.to(logoMesh.rotation, {
                    x: logoMesh.rotation.x + (Math.random() - 0.5) * 3,
                    y: logoMesh.rotation.y + (Math.random() - 0.5) * 3,
                    duration: 0.5,
                    ease: "power2.out"
                });
            }

            // 실시간 3D 위치 기반 파티클 사방 폭발 시퀀스
            const posArr = clickParticleSystem.geometry.attributes.position.array;
            for(let i=0; i<30; i++) { // 클릭당 30개씩 순환 사출
                const idx = (activeParticleIdx + i) % clickParticlesCount;
                posArr[idx*3] = targetPos.x;
                posArr[idx*3+1] = targetPos.y;
                posArr[idx*3+2] = targetPos.z;

                // 유기적 구체 연쇄 분산 벡터 계산
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = Math.random() * 0.15 + 0.05;

                clickVels[idx].x = Math.sin(phi) * Math.cos(theta) * speed;
                clickVels[idx].y = Math.sin(phi) * Math.sin(theta) * speed;
                clickVels[idx].z = Math.cos(phi) * speed;
            }
            activeParticleIdx = (activeParticleIdx + 30) % clickParticlesCount;
            clickParticleSystem.geometry.attributes.position.needsUpdate = true;
        });

        // 7. 실시간 무한 프레임 렌더 룹 (매트릭스 연산 처리 부서)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 마우스 부드러운 감속 추적 감도 계산 (LERP 기법)
            mouse.x += (mouse.targetX - mouse.x) * 0.08;
            mouse.y += (mouse.targetY - mouse.y) * 0.08;

            // [잡기술 1] 배경 성운 공간의 매트릭스 회전 및 카메라 마우스 디스플레이스먼트(패러랙스 극대화)
            starField.rotation.y = elapsedTime * 0.02;
            starField.rotation.x = elapsedTime * 0.01;
            camera.position.x = mouse.x * 1.5;
            camera.position.y = mouse.y * 1.5;
            camera.lookAt(scene.position);

            // [잡기술 2] 네온 스포트라이트가 마우스 커서 궤적을 3D 궤도로 강렬하게 추격
            pointLight1.position.set(mouse.x * 5, mouse.y * 5, 2);
            pointLight2.position.set(-mouse.x * 5, -mouse.y * 5, 3);

            // [잡기술 3] 메인 로고 3D 매트릭스 제어
            if(logoMesh) {
                // 평상시 숨쉬는 듯한 부유(Floating) 모션 
                logoMesh.position.y = Math.sin(elapsedTime * 2) * 0.15;
                
                // 마우스 무브먼트 연동 강렬한 3D 회전각 틸트 변조
                logoMesh.rotation.y = mouse.x * 1.2;
                logoMesh.rotation.x = -mouse.y * 1.2;
                
                // 마우스 왜곡 깊이 변경
                logoMesh.position.z = Math.abs(mouse.x) * 0.5;
            }

            // [잡기술 4] 클릭 파티클 역학 처리 루틴 (소멸 및 확산)
            const posArr = clickParticleSystem.geometry.attributes.position.array;
            for(let i=0; i<clickParticlesCount; i++) {
                if(posArr[i*3] !== 999) {
                    posArr[i*3] += clickVels[i].x;
                    posArr[i*3+1] += clickVels[i].y;
                    posArr[i*3+2] += clickVels[i].z;

                    // 서서히 감속하면서 블랙홀로 분해되는 연출 (저항값 부과)
                    clickVels[i].multiplyScalar(0.96);

                    // 화면 밖 멀어지거나 힘을 다하면 좌표 초기화 격리
                    if (clickVels[i].length() < 0.005) {
                        posArr[i*3] = 999;
                    }
                }
            }
            clickParticleSystem.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // 브라우저 해상도 변경 대응 가변 리사이징
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        animate();
    </script>
</body>
</html>
