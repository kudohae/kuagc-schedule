<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 관리자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--border:#dddde0;
  --accent:#5c9e00;--accent2:#0077cc;--danger:#d93025;--warn:#c8760a;
  --text:#111111;--text2:#555555;--text3:#999999;--radius:6px;--hh:48px;
  --header-bg:rgba(244,244,245,.97);
}
body.dark{
  --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2e;--border:#333338;
  --accent:#e8ff47;--accent2:#47c5ff;--danger:#ff4747;--warn:#ffaa47;
  --text:#f0f0f0;--text2:#888888;--text3:#505055;
  --header-bg:rgba(18,18,18,.97);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:32px;width:340px;display:flex;flex-direction:column;gap:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-title{font-family:'Space Mono',monospace;font-size:15px;color:var(--accent);}
.login-sub{font-size:13px;color:var(--text2);}
.login-err{font-size:13px;color:var(--danger);display:none;}

/* ── HEADER ── */
header{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(8px);z-index:100;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--accent);text-decoration:none;}
.logo-sub{font-size:11px;color:var(--text3);margin-left:3px;font-family:'Noto Sans KR',sans-serif;font-weight:400;}
.nav{display:flex;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.nb{padding:5px 13px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all .12s;white-space:nowrap;}
.nb.active{background:var(--surface);color:var(--text);font-weight:700;}
.nb:hover:not(.active){color:var(--text);}
.hdr-r{display:flex;align-items:center;gap:7px;margin-left:auto;}
.season-sel{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-size:12px;font-weight:700;color:var(--accent2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;outline:none;}
.week-nav{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;}
.week-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:1px 3px;transition:color .12s;}
.week-nav button:hover{color:var(--accent);}
.week-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);white-space:nowrap;min-width:70px;text-align:center;}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 11px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;}
.logout-btn:hover{color:var(--danger);border-color:var(--danger);}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:14px;cursor:pointer;line-height:1;}
.theme-btn:hover{border-color:var(--text2);}

/* ── PAGES ── */
.page{display:none;height:calc(100vh - var(--hh));}
.page.active{display:flex;overflow:hidden;}

/* ── SCHEDULE PAGE (left: schedule, right: pending sidebar) ── */
#pgSch{flex-direction:row;}
.sch-main{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:10px 12px;gap:8px;min-width:0;}
.pend-sidebar{width:240px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.pend-sidebar-hdr{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pend-sidebar-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.pend-badge{background:var(--warn);color:#000;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:900;}
.pend-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.pcard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;display:flex;flex-direction:column;gap:5px;}
.pcard.absent{border-left:3px solid var(--danger);}
.pcard.extra{border-left:3px solid var(--accent2);}
.pcard-name{font-size:12px;font-weight:700;}
.pcard-detail{font-size:10px;color:var(--text2);}
.pcard-actions{display:flex;gap:5px;margin-top:2px;}
.pa-ok{flex:1;padding:4px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:var(--accent);color:#000;font-family:'Noto Sans KR',sans-serif;}
.pa-no{flex:1;padding:4px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;background:var(--surface);color:var(--text2);font-family:'Noto Sans KR',sans-serif;}
.no-pend{font-size:11px;color:var(--text3);padding:8px 4px;}

/* ── SCHEDULE GRID ── */
.admin-bar{background:rgba(92,158,0,.05);border:1px solid rgba(92,158,0,.2);border-radius:var(--radius);padding:7px 11px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
body.dark .admin-bar{background:rgba(232,255,71,.05);border-color:rgba(232,255,71,.18);}
.admin-bar-label{font-size:12px;color:var(--accent);font-weight:500;}
.sch-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.sch-title-row{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sch-title{font-size:13px;font-weight:700;}
.sch-season{font-size:11px;color:var(--text2);}
.week-now-badge{font-size:11px;font-weight:700;background:rgba(92,158,0,.1);color:var(--accent);border:1px solid rgba(92,158,0,.3);border-radius:4px;padding:2px 7px;vertical-align:middle;display:inline-block;}
body.dark .week-now-badge{background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.25);}
.week-goto-badge{font-size:11px;font-weight:700;color:var(--accent2);cursor:pointer;border:1px solid rgba(0,119,204,.3);border-radius:4px;padding:2px 7px;background:rgba(0,119,204,.06);transition:all .12s;vertical-align:middle;display:inline-block;}
body.dark .week-goto-badge{background:rgba(71,197,255,.06);border-color:rgba(71,197,255,.25);}
.week-goto-badge:hover{background:rgba(0,119,204,.12);}
.sch-day-date{font-size:9px;font-weight:400;color:var(--text3);}
.day-tab-bar{display:none;}
.sch-hdr{display:grid;grid-template-columns:46px repeat(7,1fr);border-bottom:1px solid var(--border);}
.sch-day{padding:6px 2px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);}
.sch-day:last-child{border-right:none;}
.sch-day.today{color:var(--accent);}
.sch-body{display:flex;}
.sch-times{width:46px;flex-shrink:0;border-right:1px solid var(--border);}
.sch-time{height:62px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);line-height:1.3;}
.sch-time:last-child{border-bottom:none;}
.sch-time-next{font-size:9px;color:var(--text3);}
.sch-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.sch-col{border-right:1px solid var(--border);position:relative;}
.sch-col:last-child{border-right:none;}
.sch-col.today{background:rgba(92,158,0,.04);}
body.dark .sch-col.today{background:rgba(232,255,71,.02);}
.sch-slot{height:62px;border-bottom:1px solid var(--border);position:relative;}
.sch-slot:last-child{border-bottom:none;}
.sch-slot:hover{background:rgba(0,0,0,.03);}
body.dark .sch-slot:hover{background:rgba(255,255,255,.02);}
.blk{position:absolute;inset:2px;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;cursor:pointer;transition:opacity .12s,transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
body.dark .blk{box-shadow:0 1px 3px rgba(0,0,0,.35);}
.blk:hover{opacity:.88;transform:scale(.97);}
.blk-top{flex:1;display:flex;align-items:center;padding:0 5px;gap:3px;}
.blk-div{height:1px;background:rgba(0,0,0,.15);margin:0 3px;}
.blk-bot{flex:1;display:flex;align-items:center;padding:0 5px;}
.blk-name{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.blk-info{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9;color:#fff;}
.blk-tag{font-size:9px;font-weight:700;background:rgba(0,0,0,.2);padding:1px 3px;border-radius:2px;flex-shrink:0;margin-left:auto;color:#fff;}
.blk.absent{box-shadow:none;}
.blk.extra{box-shadow:0 0 0 1.5px var(--accent2);}
.blk-empty{position:absolute;inset:2px;border-radius:4px;border:1px dashed rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);cursor:pointer;transition:all .12s;}
body.dark .blk-empty{border-color:rgba(255,255,255,.1);}
.blk-empty:hover{border-color:var(--accent);color:var(--accent);}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:10;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-1px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--danger);}

/* ── TEAMS PAGE ── */
#pgTeams{flex-direction:column;overflow-y:auto;padding:10px 14px;gap:10px;}
.teams-toolbar{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.teams-sel-count{font-size:11px;color:var(--text3);margin-left:2px;}
.teams-section{display:flex;flex-direction:column;gap:6px;}
.teams-section-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:4px 2px;border-bottom:1px solid var(--border);}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px;}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;display:flex;flex-direction:column;gap:6px;transition:border-color .12s;}
.tcard.tcard-sel{border-color:var(--accent2);background:rgba(0,119,204,.04);}
body.dark .tcard.tcard-sel{background:rgba(71,197,255,.05);}
.team-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--accent2);flex-shrink:0;}
.tcard-hdr{display:flex;align-items:center;gap:7px;}
.tcard-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tcard-name-static{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tcard-type{font-size:9px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:3px;border:1px solid var(--border);}
.tcard-row{display:flex;gap:4px;}

/* ── APPLY PAGE ── */
#pgApply{flex-direction:column;overflow-y:auto;padding:10px 14px;gap:8px;}
.apply-status{border-radius:var(--radius);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.apply-status.open{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);}
.apply-status.closed{background:var(--surface);border:1px solid var(--border);}
.apply-status.finished{background:rgba(71,197,255,.06);border:1px solid rgba(71,197,255,.2);}
.apply-status-left{display:flex;align-items:center;gap:9px;}
.apply-status-icon{font-size:18px;}
.apply-status-title{font-size:13px;font-weight:700;}
.apply-status-sub{font-size:11px;color:var(--text2);}
.apply-status-actions{display:flex;gap:6px;flex-wrap:wrap;}
.apply-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.apply-tbl th{padding:5px 9px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
.apply-tbl td{padding:6px 9px;border-bottom:1px solid var(--border);}
.apply-tbl tr:last-child td{border-bottom:none;}
.apply-tbl tr:hover td{background:rgba(255,255,255,.02);}
.pbadge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;}
.pbadge.p1{background:rgba(232,255,71,.15);color:var(--accent);}
.pbadge.p2{background:rgba(71,197,255,.15);color:var(--accent2);}
.pbadge.p3{background:rgba(255,170,71,.15);color:var(--warn);}
.pbadge.none{background:rgba(255,71,71,.1);color:var(--danger);}

/* ── NOTICES PAGE ── */
#pgNotices{flex-direction:column;overflow-y:auto;padding:10px 14px;gap:8px;}
.ncard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ncard-text{font-size:13px;flex:1;}
.ncard-date{font-size:10px;color:var(--text3);white-space:nowrap;}

/* ── SHARED ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.section-title{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}

/* ── MODAL ── */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);animation:fi .15s;}
body.dark .modal-bd{background:rgba(0,0,0,.7);}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:420px;max-width:94vw;max-height:88vh;display:flex;flex-direction:column;animation:su .15s;box-shadow:0 8px 32px rgba(0,0,0,.1);}
body.dark .modal{box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;}
.modal-x:hover{color:var(--text);}
.modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;}
.fl{font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .12s;}
.fi:focus,.fs:focus{border-color:var(--accent);}
.fs option{background:var(--surface);}
.btn{padding:7px 14px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:var(--accent);color:#000;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-d{background:var(--danger);color:#fff;}
.btn-xs{padding:4px 9px;font-size:12px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.irow:last-child{border-bottom:none;}
.ik{color:var(--text2);}
.swatch-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s;}

/* ── TOAST / LOADING ── */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;animation:fi .2s;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.err{border-color:var(--danger);color:var(--danger);}

/* ── CENTERED PAGE (공지/연락처) ── */
.page-centered{align-items:center;justify-content:center;overflow-y:auto;}
.centered-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:520px;max-width:94%;display:flex;flex-direction:column;gap:0;overflow:hidden;}
.centered-card-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.centered-card-title{font-size:14px;font-weight:700;}
.centered-card-body{padding:16px 20px;display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;}
.centered-card-foot{padding:12px 20px;border-top:1px solid var(--border);}

/* ── ENSEMBLE 2-COL ── */
.ensemble-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow-y:auto;min-height:0;}
.ensemble-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;}
.ensemble-col-hdr{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ensemble-col-title{font-size:12px;font-weight:700;}
.ensemble-phase{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.ensemble-phase.closed{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.ensemble-phase.song{background:rgba(232,255,71,.15);color:var(--accent);}
.ensemble-phase.session{background:rgba(71,197,255,.15);color:var(--accent2);}
.ensemble-col-ctrl{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.ensemble-col-meta{padding:6px 13px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);flex-shrink:0;}
.ensemble-col-body{overflow-y:auto;flex:1;}
.e-song-item{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.e-song-item:last-child{border-bottom:none;}
.e-song-hdr{display:flex;align-items:center;gap:6px;}
.e-song-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;}
.e-song-title{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.e-song-artist{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.e-song-status{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.e-song-status.confirmed{background:rgba(232,255,71,.15);color:var(--accent);}
.e-song-status.pending{background:rgba(255,170,71,.1);color:var(--warn);}
.e-song-status.rejected{background:rgba(255,71,71,.1);color:var(--danger);}
.e-song-meta{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.e-song-actions{display:flex;gap:4px;}
.e-sess-list{background:var(--surface2);border-radius:3px;padding:5px 8px;display:flex;flex-direction:column;gap:3px;}
.e-sess-row{display:flex;align-items:center;gap:6px;font-size:11px;}
.e-sess-name{font-weight:600;flex:1;}
.e-sess-tags{display:flex;gap:3px;flex-wrap:wrap;}
.e-sess-tag{font-size:9px;padding:1px 4px;border-radius:2px;background:rgba(71,197,255,.1);border:1px solid rgba(71,197,255,.2);color:var(--accent2);}
.e-sess-tag.confirmed{background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.2);color:var(--accent);}
.e-sess-actions{display:flex;gap:3px;flex-shrink:0;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── MOBILE ── */
.mob-tab-bar{display:none;}
@media(max-width:700px){
  body{font-size:14px;}
  :root{--hh:50px;--tab-h:56px;}

  /* 헤더: nav 숨기고 필수 요소만 */
  header{padding:0 10px;gap:7px;flex-wrap:nowrap;}
  .nav{display:none;}

<script type="module">
import { supabase } from './js/supabase.js';
import {
  getConfig, setConfig,
  fetchTeams, createTeam, updateTeam, deleteTeam,
  fetchBaseSlots, createBaseSlot, updateBaseSlot, deleteBaseSlot,
  fetchExceptions, createException, deleteException, mergeSchedule,
  fetchRequests, fetchAllPendingRequests, approveRequest, rejectRequest, approveTerminate,
  fetchNotices, createNotice, deleteNotice,
  fetchActiveRound, createRound, updateRound,
  fetchApplications, deleteApplication, runAssignment, approveDraft,
  fetchContacts, upsertContact, deleteContact
} from './js/schedule.js';

// ── THEME ─────────────────────────────────────────────────────────────
(function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark') document.body.classList.add('dark');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
})();
window.toggleTheme=function(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
};

const ADMIN_PW = 'kuagc513';
const DAYS  = ['월','화','수','목','금','토','일'];
const HOURS = Array.from({length:18},(_,i)=>i+8);
const GRAY  = '#888888';
const COLORS= ['#47c5ff','#ff6b6b','#6bffb8','#ffaa47','#c47fff','#ff47a0','#47ffea','#ffd447','#b4ff47','#ff9d47'];
const korSort=(a,k)=>[...a].sort((x,y)=>x[k].localeCompare(y[k],'ko-KR',{numeric:true}));
const getWeekDates=off=>{const now=new Date(),mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return `${d.getMonth()+1}/${d.getDate()}`;});};
const reqActualDate=(weekOffset,day)=>{const now=new Date(),mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7)+weekOffset*7);const d=new Date(mon);d.setDate(mon.getDate()+day);return `${d.getMonth()+1}/${d.getDate()}`;};
const teamClr=t=>t.type==='합주'?GRAY:(t.color||GRAY);
const timeStr=h=>h<24?h+':00':'0'+(h-24)+':00';
const fmtTime=ts=>{if(!ts)return'';const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const errMsg=e=>{const m=e?.message||'';if(m.includes('unique')||m.includes('duplicate'))return'이미 동일한 데이터가 존재합니다';if(m.includes('foreign key'))return'참조 데이터가 존재하지 않습니다';if(m.includes('network')||m.includes('fetch'))return'네트워크 오류가 발생했습니다';if(m.includes('JWT')||m.includes('auth'))return'인증 오류입니다. 새로고침 후 시도해주세요';return m||'오류가 발생했습니다';};
function weekLabel(off){
  const now=new Date(),m=new Date(now);
  m.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  const mo=m.getMonth()+1;
  const wn=Math.ceil((m.getDate()+(new Date(m.getFullYear(),m.getMonth(),1).getDay()+6)%7)/7);
  return `${mo}월 ${wn}주차`;
}
function weekLabelWithThis(off){
  return weekLabel(off)+(off===0?' (이번주)':'');
}

let weekOff=0, season='1학기';
let mobileDayIdx=(new Date().getDay()+6)%7;
let teams=[], baseSlots=[], exceptions=[], requests=[], notices=[], contacts=[];
let pendingAll=[];
let selectedTeams=new Set();
let merged=[], round=null, applications=[];

// ── LOGIN ─────────────────────────────────────────────────────────────
function isLoggedIn(){ return sessionStorage.getItem('adm')==='1'; }

window.doLogin=function(){
  const pw=document.getElementById('pwInput').value;
  const err=document.getElementById('loginErr');
  if(pw===ADMIN_PW){
    sessionStorage.setItem('adm','1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminUI').style.display='block';
    document.getElementById('mobTabBar').style.display='';
    loadAll();
  } else {
    err.style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
};

window.doLogout=function(){
  sessionStorage.removeItem('adm');
  location.reload();
};

// auto-login if session active
if(isLoggedIn()){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminUI').style.display='block';
  document.getElementById('mobTabBar').style.display='';
  loadAll();
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadAll(){
  season=await getConfig('current_season').catch(()=>'1학기');
  document.getElementById('seasonSel').value=season;
  [teams,baseSlots,exceptions,requests,notices,contacts]=await Promise.all([
    fetchTeams(),fetchBaseSlots(season),fetchExceptions(weekOff),
    fetchRequests(weekOff),fetchNotices(),fetchContacts()
  ]);
  teams=korSort(teams,'name');
  merged=mergeSchedule(baseSlots,exceptions);
  round=await fetchActiveRound(season);
  if(round) applications=await fetchApplications(round.id);
  pendingAll=await fetchAllPendingRequests();
  await loadEnsemble();
  supabase.channel('admin-pending-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'requests'},async()=>{
      pendingAll=await fetchAllPendingRequests();
      renderPending();
    })
    .subscribe();
  supabase.channel('admin-ens-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'ensemble_rounds'},async()=>{
      await loadEnsemble();
      renderEnsemble();
    })
    .subscribe();
  supabase.channel('admin-apply-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'time_applications'},async()=>{
      if(round) applications=await fetchApplications(round.id);
      renderApply();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'application_rounds'},async()=>{
      round=await fetchActiveRound(season);
      if(round) applications=await fetchApplications(round.id);
      renderApply();
    })
    .subscribe();
  render();
}

function render(){
  const wl=weekLabel(weekOff);
  document.getElementById('weekLbl').textContent=wl;
  document.getElementById('schTitle').innerHTML=`${wl} 시간표 `+(weekOff===0?`<span class="week-now-badge">이번주</span>`:`<span class="week-goto-badge" onclick="goToThisWeek()">이번주로 이동 →</span>`);
  document.getElementById('schSeason').textContent=season;
  renderSchedule(); renderPending(); renderTeams(); renderApply(); renderNotices(); renderContacts();
}

// ── PAGE SWITCH ───────────────────────────────────────────────────────
window.showPage=function(pg){
  ['sch','teams','apply','notices','contacts','ensemble'].forEach(p=>{
    document.getElementById('pg'+p.charAt(0).toUpperCase()+p.slice(1))?.classList.toggle('active',p===pg);
    document.getElementById('nb-'+p)?.classList.toggle('active',p===pg);
    document.getElementById('mt-'+p)?.classList.toggle('active',p===pg);
  });
  document.getElementById('weekNavEl').style.display=pg==='sch'?'':'none';
  if(pg==='ensemble') renderEnsemble();
};

window.changeWeek=async function(delta){
  weekOff+=delta;
  [exceptions,requests]=await Promise.all([fetchExceptions(weekOff),fetchRequests(weekOff)]);
  merged=mergeSchedule(baseSlots,exceptions); render();
};
window.goToThisWeek=async function(){
  weekOff=0;
  [exceptions,requests]=await Promise.all([fetchExceptions(0),fetchRequests(0)]);
  merged=mergeSchedule(baseSlots,exceptions); render();
};

window.changeSeason=async function(s){
  await setConfig('current_season',s); season=s;
  [baseSlots,exceptions]=await Promise.all([fetchBaseSlots(season),fetchExceptions(weekOff)]);
  merged=mergeSchedule(baseSlots,exceptions);
  round=await fetchActiveRound(season);
  applications=round?await fetchApplications(round.id):[];
  render(); toast(`${s}으로 전환됐습니다`,'ok');
};

// ── SCHEDULE ──────────────────────────────────────────────────────────
function renderSchedule(){
  const todayDow=(new Date().getDay()+6)%7;
  const nowH=new Date().getHours(),nowM=new Date().getMinutes();
  const isNow=weekOff===0;
  const mobile=window.innerWidth<=700;
  const wdates=getWeekDates(weekOff);

  const dayTabBar=document.getElementById('dayTabBar');
  if(dayTabBar){
    if(mobile){
      dayTabBar.innerHTML=DAYS.map((d,i)=>`
        <button class="day-tab${i===mobileDayIdx?' active':''}${isNow&&i===todayDow?' today-tab':''}"
          onclick="selectMobileDay(${i})">${d}<br><span style="font-size:9px;font-weight:400">${wdates[i]}</span></button>`).join('');
    } else {
      dayTabBar.innerHTML='';
    }
  }

  document.getElementById('schHdr').innerHTML='<div class="sch-day"></div>'+
    DAYS.map((d,i)=>`<div class="sch-day${isNow&&i===todayDow?' today':''}">${d}<br><span class="sch-day-date">${wdates[i]}</span></div>`).join('');
  document.getElementById('schTimes').innerHTML=HOURS.map(h=>
    `<div class="sch-time"><span>${timeStr(h)}</span>${h>=24?`<span class="sch-time-next">익일</span>`:''}</div>`).join('');
  const grid=document.getElementById('schGrid'); grid.innerHTML='';
  const mm=new Map(merged.map(s=>[`${s.day}-${s.hour}`,s]));
  const pm=new Map(requests.filter(r=>r.type==='extra'&&r.status==='pending').map(r=>[`${r.day}-${r.hour}`,r]));
  for(let d=0;d<7;d++){
    const col=document.createElement('div');
    col.className='sch-col'+(isNow&&d===todayDow?' today':'')+(mobile?(d===mobileDayIdx?' mobile-active':''):'');
    if(isNow&&d===todayDow&&nowH>=HOURS[0]&&nowH<=HOURS[HOURS.length-1]){
      const slotH=window.innerWidth<=700?56:62;
      const line=document.createElement('div'); line.className='now-line';
      line.style.top=((nowH-HOURS[0])*slotH+(nowM/60)*slotH)+'px'; col.appendChild(line);
    }
    for(const h of HOURS){
      const cell=document.createElement('div'); cell.className='sch-slot';
      const s=mm.get(`${d}-${h}`),pe=pm.get(`${d}-${h}`);
      if(s){
        const t=s.teams,absent=s.status==='absent',isExtra=s.source==='extra',c=teamClr(t);
        const blk=document.createElement('div');
        blk.className=`blk${absent?' absent':''}${isExtra?' extra':''}`;
        if(absent){
          blk.style.cssText=`background:repeating-linear-gradient(45deg,${c}18,${c}18 3px,transparent 3px,transparent 9px);border:1.5px dashed ${c}55;`;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}88">${t.name}</span><span class="blk-tag" style="color:${c}88">미사용</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}66">${t.info||''}</span></div>`;
        } else {
          blk.style.background=c;
          blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:#000">${t.name}</span><span class="blk-tag" style="color:#000">${isExtra?'추가':t.type}</span></div><div class="blk-div"></div><div class="blk-bot"><span class="blk-info" style="color:#000">${t.info||''}</span></div>`;
        }
        blk.onclick=()=>openSlotModal(s); cell.appendChild(blk);
      } else if(pe){
        const t=pe.teams,c=teamClr(t);
        const blk=document.createElement('div');
        blk.className='blk'; blk.style.cssText=`background:${c}20;border:1.5px dashed ${c}77;opacity:.6`;
        blk.innerHTML=`<div class="blk-top"><span class="blk-name" style="color:${c}">${t.name}</span><span class="blk-tag" style="color:${c}">대기</span></div><div class="blk-bot"><span class="blk-info" style="color:${c}88">${t.info||''}</span></div>`;
        blk.onclick=()=>openPendingSlotModal(pe); cell.appendChild(blk);
      } else {
        const ind=document.createElement('div'); ind.className='blk-empty';
        ind.textContent='+'; ind.onclick=()=>openAddSlotModal(d,h); cell.appendChild(ind);
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

window.selectMobileDay=function(idx){
  mobileDayIdx=idx;
  document.querySelectorAll('.day-tab').forEach((btn,i)=>btn.classList.toggle('active',i===idx));
  document.querySelectorAll('.sch-col').forEach((col,i)=>col.classList.toggle('mobile-active',i===idx));
};

function openSlotModal(s){
  const t=s.teams,absent=s.status==='absent',isExtra=s.source==='extra',c=teamClr(t);
  showModal(`${t.name} · ${DAYS[s.day]} ${s.hour}:00`,
    `<div class="irow"><span class="ik">팀</span><span style="color:${c};font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[s.day]} ${s.hour}:00</span></div>
     <div class="irow"><span class="ik">상태</span><span>${absent?'⛔ 미사용':'✅ 정상'}</span></div>
     ${t.info?`<div class="irow"><span class="ik">정보</span><span>${t.info}</span></div>`:''}`,
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>
     ${s.exceptionId?`<button class="btn btn-s" onclick="removeException(${s.exceptionId})">예외 제거</button>`:''}
     ${!absent&&s.source==='base'?`<button class="btn btn-d" onclick="markAbsent(${s.team_id},${s.day},${s.hour})">이번 주 미사용</button>`:''}
     <button class="btn btn-p" onclick="openEditSlotModal(${s.id})">수정</button>`
  );
}

window.removeException=async function(id){
  try{
    await deleteException(id); exceptions=await fetchExceptions(weekOff);
    merged=mergeSchedule(baseSlots,exceptions); closeModal(); renderSchedule(); toast('예외 제거됐습니다','ok');
  }catch(e){toast(errMsg(e),'err');}
};
window.markAbsent=async function(teamId,day,hour){
  try{
    await createException({team_id:teamId,day,hour,week_offset:weekOff,exception_type:'absent'});
    exceptions=await fetchExceptions(weekOff); merged=mergeSchedule(baseSlots,exceptions);
    closeModal(); renderSchedule(); toast('미사용 처리됐습니다','ok');
  }catch(e){toast(errMsg(e),'err');}
};
window.openEditSlotModal=function(slotId){
  const s=baseSlots.find(b=>b.id===slotId);
  const tOpts=korSort(teams,'name').map(t=>`<option value="${t.id}" ${t.id===s.team_id?'selected':''}>${t.name}</option>`).join('');
  showModal('슬롯 수정',
    `<div><div class="fl">팀</div><select class="fs" id="eTeam">${tOpts}</select></div>
     <div><div class="fl">요일</div><select class="fs" id="eDay">${DAYS.map((d,i)=>`<option value="${i}" ${i===s.day?'selected':''}>${d}</option>`).join('')}</select></div>
     <div><div class="fl">시간</div><select class="fs" id="eHour">${HOURS.map(h=>`<option value="${h}" ${h===s.hour?'selected':''}>${timeStr(h)}</option>`).join('')}</select></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-d" onclick="deleteSlot(${slotId})">삭제</button>
     <button class="btn btn-p" id="eBtn" onclick="saveSlot(${slotId})">저장</button>`
  );
};
window.saveSlot=async function(id){
  const btn=document.getElementById('eBtn'); btn.disabled=true;
  try{
    await updateBaseSlot(id,{team_id:parseInt(document.getElementById('eTeam').value),day:parseInt(document.getElementById('eDay').value),hour:parseInt(document.getElementById('eHour').value)});
    baseSlots=await fetchBaseSlots(season); merged=mergeSchedule(baseSlots,exceptions);
    closeModal(); renderSchedule(); toast('슬롯이 수정됐습니다','ok');
  }catch(e){toast(errMsg(e),'err');btn.disabled=false;}
};
window.deleteSlot=async function(id){
  if(!confirm('이 슬롯을 삭제할까요?')) return;
  try{
    await deleteBaseSlot(id); baseSlots=await fetchBaseSlots(season);
    merged=mergeSchedule(baseSlots,exceptions); closeModal(); renderSchedule(); toast('삭제됐습니다');
  }catch(e){toast(errMsg(e),'err');}
};
window.openAddSlotModal=function(day=0,hour=10){
  const tOpts=korSort(teams,'name').map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  // ±4주 범위 옵션 생성
  const weekOpts=Array.from({length:9},(_,i)=>i-4).map(off=>{
    const label=weekLabelWithThis(off);
    return `<option value="week_${off}" ${off===weekOff?'selected':''}>${label}</option>`;
  }).join('');
  showModal('슬롯 추가',
    `<div>
       <div class="fl">추가 대상</div>
       <select class="fs" id="aTarget">
         <option value="base">${season} 기본 시간표</option>
         ${weekOpts}
       </select>
     </div>
     <div><div class="fl">팀</div><select class="fs" id="aTeam">${tOpts}</select></div>
     <div><div class="fl">요일</div><select class="fs" id="aDay">${DAYS.map((d,i)=>`<option value="${i}" ${i===day?'selected':''}>${d}</option>`).join('')}</select></div>
     <div><div class="fl">시간</div><select class="fs" id="aHour">${HOURS.map(h=>`<option value="${h}" ${h===hour?'selected':''}>${timeStr(h)}</option>`).join('')}</select></div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-p" id="aBtn" onclick="addSlot()">추가</button>`
  );
};
window.addSlot=async function(){
  const btn=document.getElementById('aBtn'); btn.disabled=true;
  const target=document.getElementById('aTarget').value;
  const team_id=parseInt(document.getElementById('aTeam').value);
  const day=parseInt(document.getElementById('aDay').value);
  const hour=parseInt(document.getElementById('aHour').value);
  try{
    if(target==='base'){
      await createBaseSlot({team_id,day,hour,season});
      baseSlots=await fetchBaseSlots(season);
    } else {
      const off=parseInt(target.replace('week_',''));
      await createException({team_id,day,hour,week_offset:off,exception_type:'extra'});
      exceptions=await fetchExceptions(weekOff);
    }
    merged=mergeSchedule(baseSlots,exceptions);
    closeModal(); renderSchedule(); toast('슬롯이 추가됐습니다','ok');
  }catch(e){toast(e.message.includes('unique')?'이미 해당 시간에 슬롯이 있습니다':errMsg(e),'err');btn.disabled=false;}
};

// ── PENDING SIDEBAR ───────────────────────────────────────────────────
function renderPending(){
  const badge=document.getElementById('pendBadge');
  badge.textContent=pendingAll.length; badge.style.display=pendingAll.length?'':'none';
  const list=document.getElementById('pendList');
  if(!pendingAll.length){list.innerHTML='<div class="no-pend">대기 중인 신청 없음</div>';return;}
  list.innerHTML=pendingAll.map(r=>{
    const isTerminate=r.teams.type==='스쿨'&&r.type==='absent';
    const typeLabel=isTerminate?'종강 신고':r.type==='absent'?'미사용':'추가사용';
    const dateStr=reqActualDate(r.week_offset,r.day);
    return `
    <div class="pcard ${r.type}">
      <div class="pcard-name" style="color:${teamClr(r.teams)}">${r.teams.name}</div>
      <div class="pcard-detail">${dateStr} ${r.hour}:00 · ${typeLabel}</div>
      <div class="pcard-detail">${r.reason}</div>
      ${r.requester_name?`<div class="pcard-detail">신청자: ${r.requester_name}</div>`:''}
      <div class="pcard-detail" style="color:var(--text3)">${fmtTime(r.created_at)}</div>
      <div class="pcard-actions">
        ${isTerminate
          ?`<button class="pa-ok" onclick="doApproveTerminate(${r.id})" title="기본 배정 슬롯을 영구 삭제합니다">종강 승인</button>`
          :`<button class="pa-ok" onclick="doApprove(${r.id})">승인</button>`}
        <button class="pa-no" onclick="doReject(${r.id})">거절</button>
      </div>
    </div>`;
  }).join('');
}
function openPendingSlotModal(req){
  const t=req.teams;
  showModal('추가사용 대기',
    `<div class="irow"><span class="ik">팀</span><span style="font-weight:700">${t.name}</span></div>
     <div class="irow"><span class="ik">시간</span><span>${DAYS[req.day]} ${req.hour}:00</span></div>
     <div class="irow"><span class="ik">사유</span><span>${req.reason}</span></div>`,
    `<button class="btn btn-s" onclick="closeModal()">닫기</button>
     <button class="btn btn-d" onclick="doReject(${req.id});closeModal()">거절</button>
     <button class="btn btn-p" onclick="doApprove(${req.id});closeModal()">승인</button>`
  );
}
window.doApprove=async function(id){
  const req=pendingAll.find(r=>r.id===id); if(!req) return;
  try{
    await approveRequest(req,req.week_offset); toast('승인됐습니다','ok');
    [exceptions,requests,pendingAll]=await Promise.all([fetchExceptions(weekOff),fetchRequests(weekOff),fetchAllPendingRequests()]);
    merged=mergeSchedule(baseSlots,exceptions); renderSchedule(); renderPending();
  }catch(e){toast(errMsg(e),'err');}
};
window.doApproveTerminate=async function(id){
  const req=pendingAll.find(r=>r.id===id); if(!req) return;
  try{
    await approveTerminate(req,season); toast('종강 처리됐습니다 — 기본 배정 슬롯이 삭제됐습니다','ok');
    [baseSlots,exceptions,requests,pendingAll]=await Promise.all([fetchBaseSlots(season),fetchExceptions(weekOff),fetchRequests(weekOff),fetchAllPendingRequests()]);
    merged=mergeSchedule(baseSlots,exceptions); renderSchedule(); renderPending();
  }catch(e){toast(errMsg(e),'err');}
};
window.doReject=async function(id){
  try{
    await rejectRequest(id); toast('거절됐습니다');
    pendingAll=await fetchAllPendingRequests(); renderPending();
  }catch(e){toast(errMsg(e),'err');}
};

// ── TEAMS ─────────────────────────────────────────────────────────────
function renderTeams(){
  const groups=[{k:'합주',label:'합주'},{k:'스쿨',label:'스쿨'},{k:'이외',label:'이외'}];
  document.getElementById('teamsContent').innerHTML=groups.map(g=>{
    const list=korSort(teams.filter(t=>t.type===g.k),'name');
    if(!list.length) return '';
    return `<div class="teams-section">
      <div class="teams-section-title">${g.label} (${list.length}팀)</div>
      <div class="teams-grid">
        ${list.map(t=>`<div class="tcard${selectedTeams.has(t.id)?' tcard-sel':''}">
          <div class="tcard-hdr">
            <input type="checkbox" class="team-chk" ${selectedTeams.has(t.id)?'checked':''} onchange="toggleTeamSelect(${t.id},this.checked)"/>
            <div class="tcard-dot" style="background:${teamClr(t)}"></div>
            <div class="tcard-name-static">${t.name}</div>
            <div class="tcard-type">${t.type}</div>
          </div>
          <div class="tcard-row">
            <input class="fi" style="padding:4px 7px;font-size:12px" value="${t.name}" id="tname-${t.id}"/>
            <button class="btn btn-s btn-xs" onclick="saveTeamName(${t.id})">이름</button>
          </div>
          <div class="tcard-row">
            <input class="fi" style="padding:4px 7px;font-size:12px" value="${t.info||''}" id="tinfo-${t.id}"
              placeholder="${g.k==='스쿨'?'선생님':g.k==='합주'?'합주곡':'추가정보'}"/>
            <button class="btn btn-s btn-xs" onclick="saveTeamInfo(${t.id})">저장</button>
          </div>
          <div style="display:flex;justify-content:flex-end">
            <button class="btn btn-d btn-xs" onclick="doDeleteTeam(${t.id})">삭제</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
window.saveTeamName=async function(id){
  const val=document.getElementById('tname-'+id)?.value.trim();
  if(!val){toast('이름을 입력해주세요','err');return;}
  try{
    await updateTeam(id,{name:val}); const t=teams.find(t=>t.id===id); if(t) t.name=val;
    teams=korSort(teams,'name'); toast('이름이 수정됐습니다','ok'); renderTeams();
  }catch(e){toast(errMsg(e),'err');}
};
window.saveTeamInfo=async function(id){
  const val=document.getElementById('tinfo-'+id)?.value.trim()??'';
  try{
    await updateTeam(id,{info:val}); const t=teams.find(t=>t.id===id); if(t) t.info=val;
    toast('저장됐습니다','ok'); renderSchedule();
  }catch(e){toast(errMsg(e),'err');}
};
window.doDeleteTeam=async function(id){
  if(!confirm('팀을 삭제하면 해당 팀의 모든 슬롯도 삭제됩니다. 계속할까요?')) return;
  try{
    await deleteTeam(id); teams=teams.filter(t=>t.id!==id);
    baseSlots=baseSlots.filter(s=>s.team_id!==id); merged=mergeSchedule(baseSlots,exceptions);
    toast('팀이 삭제됐습니다'); render();
  }catch(e){toast(errMsg(e),'err');}
};
window.toggleTeamSelect=function(id,checked){
  checked?selectedTeams.add(id):selectedTeams.delete(id);
  const c=document.getElementById('teamSelCount');
  if(c) c.textContent=selectedTeams.size?selectedTeams.size+'개 선택됨':'';
  document.querySelectorAll('.tcard').forEach(el=>{
    const chk=el.querySelector('.team-chk');
    if(chk&&chk.getAttribute('onchange')&&chk.getAttribute('onchange').includes(id+',')){
      el.classList.toggle('tcard-sel',checked);
    }
  });
};
window.selectAllTeams=function(){
  const allIds=teams.map(t=>t.id);
  const allSelected=allIds.every(id=>selectedTeams.has(id));
  if(allSelected){ selectedTeams.clear(); }
  else { allIds.forEach(id=>selectedTeams.add(id)); }
  renderTeams();
  const c=document.getElementById('teamSelCount');
  if(c) c.textContent=selectedTeams.size?selectedTeams.size+'개 선택됨':'';
  document.querySelector('.teams-toolbar .btn-s').textContent=selectedTeams.size===allIds.length?'전체 해제':'전체 선택';
};
window.deleteSelectedTeams=async function(){
  if(!selectedTeams.size){toast('삭제할 팀을 선택해주세요','err');return;}
  if(!confirm(`선택한 ${selectedTeams.size}개 팀을 삭제합니다. 해당 팀의 모든 슬롯도 삭제됩니다. 계속할까요?`)) return;
  try{
    for(const id of selectedTeams){ await deleteTeam(id); }
    const deleted=[...selectedTeams];
    selectedTeams.clear();
    teams=teams.filter(t=>!deleted.includes(t.id));
    baseSlots=baseSlots.filter(s=>!deleted.includes(s.team_id));
    merged=mergeSchedule(baseSlots,exceptions);
    toast(`${deleted.length}개 팀이 삭제됐습니다`,'ok'); render();
  }catch(e){toast(errMsg(e),'err');}
};
window.openAddTeamModal=function(){
  const swatches=COLORS.map(c=>`<div class="swatch" id="sw-${c.replace('#','')}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  showModal('팀 추가',
    `<div><div class="fl">팀 이름</div><input class="fi" id="nName" placeholder="팀 이름"/></div>
     <div><div class="fl">분류</div>
       <select class="fs" id="nType" onchange="onTypeChange()">
         <option>합주</option><option>스쿨</option><option>이외</option>
       </select></div>
     <div id="colorArea" style="display:none">
       <div class="fl">컬러</div>
       <div class="swatch-row">${swatches}</div>
       <input type="hidden" id="nColor" value="${COLORS[0]}"/>
     </div>
     <div id="grayNote" style="font-size:11px;color:var(--text3)">합주 팀은 자동으로 회색 표시됩니다</div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-p" id="nBtn" onclick="addTeam()">추가</button>`
  );
  pickColor(COLORS[0]);
};
window.onTypeChange=function(){
  const t=document.getElementById('nType').value,c=t!=='합주';
  document.getElementById('colorArea').style.display=c?'block':'none';
  document.getElementById('grayNote').style.display=c?'none':'block';
};
window.pickColor=function(c){
  const inp=document.getElementById('nColor'); if(inp) inp.value=c;
  COLORS.forEach(x=>{const el=document.getElementById('sw-'+x.replace('#',''));if(el)el.style.borderColor=x===c?'#fff':'transparent';});
};
window.addTeam=async function(){
  const name=document.getElementById('nName').value.trim();
  const type=document.getElementById('nType').value;
  const color=type==='합주'?GRAY:(document.getElementById('nColor')?.value||COLORS[0]);
  if(!name){toast('팀 이름을 입력해주세요','err');return;}
  const btn=document.getElementById('nBtn'); btn.disabled=true;
  try{
    const t=await createTeam({name,type,color}); teams.push(t); teams=korSort(teams,'name');
    toast(`${name} 팀이 추가됐습니다`,'ok'); closeModal(); renderTeams();
  }catch(e){toast(errMsg(e),'err');btn.disabled=false;}
};

// ── APPLY ─────────────────────────────────────────────────────────────
function renderApply(){
  const isScheduled=round&&round.status==='open'&&round.open_at&&new Date(round.open_at)>new Date();
  const isOpen=round&&round.status==='open'&&(!round.open_at||new Date(round.open_at)<=new Date());
  const isFin=round&&(round.status==='finished'||round.draft_approved);
  const isClosed=round&&round.status==='closed'&&!round.draft_approved;

  let statusCls=isOpen?'open':isFin?'finished':'closed';
  let statusIcon=isOpen?'🟢':isFin?'🔵':isScheduled?'⏳':isClosed?'🟡':'⭕';
  let statusTitle=isOpen?'신청 진행 중':isFin?'배정 완료':isScheduled?'신청 예약됨':isClosed?'신청 마감됨 — 배정 대기':'신청 기간 아님';
  let statusSub=isScheduled?`${fmtScheduled(round.open_at)}에 신청 시작`:isOpen&&round.close_at?'마감: '+new Date(round.close_at).toLocaleString('ko-KR'):'';

  let html=`<div class="apply-status ${statusCls}">
    <div class="apply-status-left">
      <div class="apply-status-icon">${statusIcon}</div>
      <div>
        <div class="apply-status-title">${statusTitle}</div>
        <div class="apply-status-sub">${statusSub}</div>
      </div>
    </div>
    <div class="apply-status-actions">`;

  if(!round||round.draft_approved){
    html+=`<button class="btn btn-p btn-xs" onclick="openRoundNow()">즉시 시작</button>
           <button class="btn btn-s btn-xs" onclick="openScheduleRoundModal()">예약 시작</button>`;
  } else if(isScheduled){
    html+=`<button class="btn btn-s btn-xs" onclick="openChangeScheduleModal()">예약 변경</button>
           <button class="btn btn-p btn-xs" onclick="openApplyNow()">지금 열기</button>`;
  } else if(isOpen){
    html+=`<button class="btn btn-d btn-xs" onclick="closeRoundNow()">신청 마감</button>`;
  } else if(isClosed){
    html+=`<button class="btn btn-s btn-xs" onclick="reopenRound()">신청 재오픈</button>
           <button class="btn btn-p btn-xs" onclick="runAndConfirm()">배정 및 확정</button>`;
  }
  if(round&&!round.draft_approved){
    html+=`<button class="btn btn-s btn-xs" onclick="if(confirm('현재 회차를 종료하고 새 신청을 시작할까요?'))startNewRound()">새 신청 시작</button>`;
  }

  html+=`</div></div>`;

  if(round&&applications.length){
    const pc=p=>p===1?'p1':p===2?'p2':p===3?'p3':'none';
    const pl=p=>p?p+'지망':'미배정';
    // 팀별 최신 신청 ID 파악 (이미 submitted_at 오름차순 정렬됨)
    const latestIdByTeam=new Map();
    for(const a of applications) latestIdByTeam.set(a.team_id,a.id);
    const isVoid=a=>latestIdByTeam.get(a.team_id)!==a.id;
    const validCount=applications.filter(a=>!isVoid(a)).length;
    html+=`<div class="card">
      <div style="font-size:11px;color:var(--text2);padding:8px 10px 0;font-weight:700">${validCount}팀 신청 중${applications.length>validCount?` (무효 ${applications.length-validCount}건 포함)`:''}</div>
      <table class="apply-tbl">
        <thead><tr><th>#</th><th>팀</th><th>1지망</th><th>2지망</th><th>3지망</th>${isFin?'<th>결과</th>':''}<th>제출시각</th><th></th></tr></thead>
        <tbody>${applications.map((a,i)=>{
          const void_=isVoid(a);
          return `<tr style="${void_?'opacity:.3;':''}">
            <td style="color:var(--text3);font-family:'Space Mono',monospace">${String(i+1).padStart(2,'0')}</td>
            <td style="font-weight:600${void_?';text-decoration:line-through':''}">${a.teams.name}${void_?` <span class="pbadge none" style="font-size:9px">무효</span>`:''}</td>
            <td>${DAYS[a.pref1_day]} ${a.pref1_hour}:00</td>
            <td>${a.pref2_day!=null?DAYS[a.pref2_day]+' '+a.pref2_hour+':00':'—'}</td>
            <td>${a.pref3_day!=null?DAYS[a.pref3_day]+' '+a.pref3_hour+':00':'—'}</td>
            ${isFin?`<td>${!void_&&a.assigned_day!=null?`<span class="pbadge ${pc(a.assigned_pref)}">${pl(a.assigned_pref)}</span> ${DAYS[a.assigned_day]} ${a.assigned_hour}:00`:`<span class="pbadge none">${void_?'무효':'미배정'}</span>`}</td>`:''}
            <td style="font-size:11px;color:var(--text3)">${fmtTime(a.submitted_at)}</td>
            <td><button class="btn btn-s btn-xs" onclick="delApp(${a.id})">취소</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }
  document.getElementById('applyContent').innerHTML=html;
}

const SESSIONS=['보컬1','보컬2','기타1','기타2','베이스','키보드1','키보드2','드럼','이외 악기'];
let eType='regular';
let eRounds={regular:null,busking:null};
let eSongs={regular:[],busking:[]};
let eSessionMap={};

function renderEnsemble(){
  ['regular','busking'].forEach(type=>{
    const r=eRounds[type];
    const songList=eSongs[type]||[];
    const typeName=type==='regular'?'일반 합주':'버스킹 합주';
    const phaseMap={draft:{label:'준비 중',cls:'closed'},closed:{label:'닫힘',cls:'closed'},song:{label:'곡 신청 중',cls:'song'},session:{label:'세션 신청 중',cls:'session'}};
    const phase=r?.phase||'closed';
    const pm=phaseMap[phase];

    // phase badge
    const badge=document.getElementById(`ephase${type==='regular'?'Regular':'Busking'}`);
    if(badge){ badge.textContent=pm.label; badge.className=`ensemble-phase ${pm.cls}`; }

    // controls + body
    const bodyEl=document.getElementById(`ensemble${type==='regular'?'Regular':'Busking'}Body`);
    if(!bodyEl) return;

    let ctrl='';
    if(!r||phase==='closed'){
      ctrl=`<button class="btn btn-p btn-xs" onclick="openCreateRoundModal('${type}')">회차 생성</button>`;
    } else if(phase==='draft'){
      ctrl=`<button class="btn btn-s btn-xs" onclick="openEditRoundModal(${r.id})">설정</button>
            ${r.song_scheduled_at?`<button class="btn btn-s btn-xs" onclick="openChangeSongScheduleModal(${r.id})">예약 변경</button>`:''}
            <button class="btn btn-p btn-xs" onclick="openSongPhaseModal(${r.id})">곡 신청 열기</button>
            <button class="btn btn-d btn-xs" onclick="deleteRound(${r.id})">삭제</button>`;
    } else if(phase==='song'){
      ctrl=`<button class="btn btn-s btn-xs" onclick="openEditRoundModal(${r.id})">설정</button>
            ${r.session_scheduled_at?`<button class="btn btn-s btn-xs" onclick="openChangeSessionScheduleModal(${r.id})">예약 변경</button>`:''}
            <button class="btn btn-p btn-xs" onclick="openSessionPhaseModal(${r.id})">→ 세션신청</button>
            <button class="btn btn-d btn-xs" onclick="closeRound(${r.id})">닫기</button>`;
    } else if(phase==='session'){
      ctrl=`<button class="btn btn-d btn-xs" onclick="closeRound(${r.id})">닫기</button>`;
    }

    const schedInfo=(phase==='draft'&&r?.song_scheduled_at?`<div class="ensemble-col-meta" style="color:var(--accent2)">🕐 곡 신청 예약: ${fmtScheduled(r.song_scheduled_at)}</div>`:'')
                   +(phase==='song'&&r?.session_scheduled_at?`<div class="ensemble-col-meta" style="color:var(--accent2)">🕐 세션 신청 예약: ${fmtScheduled(r.session_scheduled_at)}</div>`:'');
    const meta=r?`<div class="ensemble-col-meta">총 ${r.max_songs}곡 · 인당 곡${r.max_songs_per_person} · 세션${r.max_sessions_per_person}</div>${schedInfo}`:'';
    const ctrlHtml=`<div class="ensemble-col-ctrl">${ctrl}</div>`;

    let songsHtml='';
    const active=songList.filter(s=>s.status!=='rejected');
    if(!active.length){
      songsHtml=`<div style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">신청된 곡이 없습니다</div>`;
    } else {
      songsHtml=active.map((s,i)=>{
        const sessApps=eSessionMap[s.id]||[];
        const sessHtml=sessApps.length?`<div class="e-sess-list">
          ${sessApps.map(a=>`<div class="e-sess-row">
            <span class="e-sess-name">${a.applicant_name} <span style="color:var(--text3);font-weight:400">${a.student_id}</span></span>
            <div class="e-sess-tags">${a.sessions.map(x=>`<span class="e-sess-tag ${a.status==='confirmed'?'confirmed':''}">${x}</span>`).join('')}</div>
            <span style="font-size:9px;color:var(--text3);flex-shrink:0">${fmtTime(a.created_at)}</span>
            <div class="e-sess-actions">
              ${a.status==='pending'
                ?`<button class="btn btn-s btn-xs" onclick="confirmSession(${a.id})">확</button><button class="btn btn-d btn-xs" onclick="rejectSession(${a.id})">✕</button>`
                :`<span style="font-size:9px;font-weight:700;color:${a.status==='confirmed'?'var(--accent)':'var(--danger)'}">${a.status==='confirmed'?'확정':'거절'}</span>`}
            </div>
          </div>`).join('')}
        </div>`:'';
        const actions=r&&phase!=='closed'?`<div class="e-song-actions">
          ${s.status!=='confirmed'?`<button class="btn btn-p btn-xs" onclick="confirmSong(${s.id})">확정</button>`:''}
          ${s.status!=='rejected'?`<button class="btn btn-d btn-xs" onclick="rejectSong(${s.id})">거절</button>`:''}
        </div>`:'';
        return `<div class="e-song-item">
          <div class="e-song-hdr">
            <span class="e-song-num">${String(i+1).padStart(2,'0')}</span>
            <div style="flex:1;min-width:0">
              <div class="e-song-title">${s.title}</div>
              <div class="e-song-artist">${s.artist}</div>
            </div>
            <span class="e-song-status ${s.status}">${s.status==='confirmed'?'확정':s.status==='pending'?'대기':'거절'}</span>
          </div>
          <div class="e-song-meta">
            <span>${s.applicant_name} <span style="color:var(--text3)">${s.student_id}</span></span>
            <span style="color:var(--text3)">${fmtTime(s.created_at)}</span>
            <span style="color:var(--text3)">${s.sessions.join(' · ')}</span>
          </div>
          ${sessHtml}
          ${actions}
        </div>`;
      }).join('');
    }

    bodyEl.innerHTML=ctrlHtml+meta+songsHtml;
  });
}

async function loadEnsemble(){
  const {data:rds}=await supabase.from('ensemble_rounds').select('*').order('created_at',{ascending:false});
  if(rds){ eRounds.regular=rds.find(r=>r.type==='regular')||null; eRounds.busking=rds.find(r=>r.type==='busking')||null; }
  for(const type of ['regular','busking']){
    const r=eRounds[type];
    if(!r){ eSongs[type]=[]; continue; }
    const {data:s}=await supabase.from('song_applications').select('*').eq('round_id',r.id).order('created_at');
    eSongs[type]=s||[];
  }
  const allIds=[...eSongs.regular,...eSongs.busking].map(s=>s.id);
  if(allIds.length){
    const {data:sess}=await supabase.from('session_applications').select('*').in('song_id',allIds).order('created_at');
    eSessionMap={};
    (sess||[]).forEach(s=>{ if(!eSessionMap[s.song_id]) eSessionMap[s.song_id]=[]; eSessionMap[s.song_id].push(s); });
  }
}

// ── MODAL ─────────────────────────────────────────────────────────────
const isMobile=()=>window.innerWidth<=700;

function showModal(title,body,foot){
  document.getElementById('modalTtl').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFoot').innerHTML=foot;
  document.getElementById('modalBd').style.display='flex';
  document.body.style.overflow='hidden';
  if(isMobile()){
    const modal=document.querySelector('#modalBd .modal');
    if(!modal) return;
    let startY=0,isDragging=false;
    modal.style.transform='';
    modal.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;isDragging=true;modal.style.transition='none';},{passive:true,once:false});
    modal.addEventListener('touchmove',e=>{if(!isDragging)return;const dy=e.touches[0].clientY-startY;if(dy>0)modal.style.transform=`translateY(${dy}px)`;},{passive:true,once:false});
    modal.addEventListener('touchend',e=>{if(!isDragging)return;isDragging=false;const dy=e.changedTouches[0].clientY-startY;modal.style.transition='transform .2s';if(dy>100){modal.style.transform=`translateY(100%)`;setTimeout(closeModal,200);}else{modal.style.transform='';}},{once:false});
  }
}
window.closeModal=()=>{document.getElementById('modalBd').style.display='none';document.body.style.overflow='';};
window.onMBd=e=>{if(e.target===document.getElementById('modalBd'))closeModal();};

// ── TOAST ─────────────────────────────────────────────────────────────
let toastT;
function toast(msg,type=''){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.className='toast'+(type?' '+type:''); el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display='none',2800);
}
