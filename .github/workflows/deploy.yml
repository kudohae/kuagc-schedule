name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir /tmp/site
          cp -r *.html css js .nojekyll CNAME /tmp/site/
          [ -d guides ] && cp -r guides /tmp/site/

          rm -rf /tmp/current-gh-pages
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" /tmp/current-gh-pages || true
          [ -d /tmp/current-gh-pages/data ] && cp -r /tmp/current-gh-pages/data /tmp/site/

          cd /tmp/site
          git init -b gh-pages
          git add .
          git commit -m "deploy ${GITHUB_SHA::7}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" gh-pages --force
