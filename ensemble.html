<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>합주 신청 | 그루터기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--border:#dddde0;
  --accent:#5c9e00;--accent2:#0077cc;--danger:#d93025;--warn:#c8760a;
  --text:#111111;--text2:#555555;--text3:#999999;--radius:6px;--hh:48px;
  --header-bg:rgba(244,244,245,.97);
}
body.dark{
  --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2e;--border:#333338;
  --accent:#e8ff47;--accent2:#47c5ff;--danger:#ff4747;--warn:#ffaa47;
  --text:#f0f0f0;--text2:#888888;--text3:#505055;
  --header-bg:rgba(18,18,18,.97);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

header{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(8px);z-index:100;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--accent);text-decoration:none;}
.back-btn{font-size:12px;color:var(--text2);text-decoration:none;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 10px;transition:color .12s;}
.back-btn:hover{color:var(--text);}
.type-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.type-btn{padding:5px 15px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all .12s;}
.type-btn.active{background:var(--surface);color:var(--text);font-weight:700;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:14px;cursor:pointer;line-height:1;}
.theme-btn:hover{border-color:var(--text2);}

.container{max-width:860px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:12px;}

/* SEARCH */
.search-bar{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.search-icon{font-size:15px;flex-shrink:0;color:var(--text3);}
.search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;}
.search-input::placeholder{color:var(--text3);}
.search-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;}
.search-clear:hover{color:var(--text2);}

/* STATUS */
.status-card{border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:12px;}
.status-card.closed{background:var(--surface);border:1px solid var(--border);}
.status-card.song{background:rgba(92,158,0,.06);border:1px solid rgba(92,158,0,.2);}
body.dark .status-card.song{background:rgba(232,255,71,.06);border-color:rgba(232,255,71,.2);}
.status-card.session{background:rgba(0,119,204,.06);border:1px solid rgba(0,119,204,.2);}
body.dark .status-card.session{background:rgba(71,197,255,.06);border-color:rgba(71,197,255,.2);}
.status-icon{font-size:22px;flex-shrink:0;}
.status-texts{display:flex;flex-direction:column;gap:3px;}
.status-title{font-size:15px;font-weight:700;}
.status-sub{font-size:12px;color:var(--text2);}

/* FORM */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.form-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.form-row.single{grid-template-columns:1fr;}
.fl{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .12s;}
.fi:focus,.fs:focus{border-color:var(--accent);}
.fs option{background:var(--surface);}
.session-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.session-chk{display:none;}
.session-label{display:inline-flex;align-items:center;padding:5px 11px;border-radius:4px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .12s;user-select:none;background:var(--surface2);}
.session-chk:checked+.session-label{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.session-label:hover{border-color:var(--text2);}
.form-footer{display:flex;justify-content:flex-end;margin-top:14px;}
.session-area{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.no-song-selected{font-size:13px;color:var(--text3);padding:8px 0;}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:var(--accent);color:#000;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-xs{padding:4px 9px;font-size:12px;}

/* SONG LIST */
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.list-card-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.list-card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;}
.list-card-count{font-size:12px;color:var(--text3);}
.song-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.song-item:last-child{border-bottom:none;}
.song-item-hdr{display:flex;align-items:flex-start;gap:8px;}
.song-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);flex-shrink:0;min-width:24px;padding-top:2px;}
.song-info{flex:1;min-width:0;}
.song-title{font-size:14px;font-weight:700;}
.song-artist{font-size:13px;color:var(--text2);}
.song-status{font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;}
.song-status.confirmed{background:rgba(92,158,0,.12);color:var(--accent);}
body.dark .song-status.confirmed{background:rgba(232,255,71,.15);}
.song-status.pending{background:rgba(200,118,10,.1);color:var(--warn);}
body.dark .song-status.pending{background:rgba(255,170,71,.1);}
.song-status.rejected{background:rgba(217,48,37,.1);color:var(--danger);}
body.dark .song-status.rejected{background:rgba(255,71,71,.1);}
.song-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.song-applicant{font-size:12px;color:var(--text3);}
.song-ts{font-size:11px;color:var(--text3);}
.sessions-needed{display:flex;flex-wrap:wrap;gap:4px;}
.sneed{font-size:11px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);color:var(--text2);background:var(--surface2);}
.sneed.filled{border-color:var(--accent);color:var(--accent);background:rgba(92,158,0,.08);}
body.dark .sneed.filled{background:rgba(232,255,71,.08);}
.session-list{background:var(--surface2);border-radius:4px;padding:8px 11px;display:flex;flex-direction:column;gap:5px;}
.session-row{display:flex;align-items:center;gap:8px;font-size:13px;}
.session-row-name{font-weight:600;flex:1;}
.session-row-right{display:flex;align-items:center;gap:6px;}
.session-row-sessions{display:flex;gap:3px;flex-wrap:wrap;}
.sess-tag{font-size:11px;padding:2px 6px;border-radius:3px;background:rgba(0,119,204,.1);border:1px solid rgba(0,119,204,.2);color:var(--accent2);}
body.dark .sess-tag{background:rgba(71,197,255,.1);border-color:rgba(71,197,255,.2);}
.sess-tag.confirmed{background:rgba(92,158,0,.1);border-color:rgba(92,158,0,.2);color:var(--accent);}
body.dark .sess-tag.confirmed{background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.25);}
.sess-ts{font-size:10px;color:var(--text3);}

/* MODAL */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);animation:fi .15s;}
body.dark .modal-bd{background:rgba(0,0,0,.7);}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:420px;max-width:94vw;max-height:88vh;display:flex;flex-direction:column;animation:su .15s;box-shadow:0 8px 32px rgba(0,0,0,.1);}
body.dark .modal{box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;}
.modal-x:hover{color:var(--text);}
.modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.irow:last-child{border-bottom:none;}
.ik{color:var(--text2);}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;animation:fi .2s;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.err{border-color:var(--danger);color:var(--danger);}
.ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

.empty-search{font-size:14px;color:var(--text3);text-align:center;padding:24px 0;}

@media(max-width:700px){
  body{font-size:15px;}
  .form-row{grid-template-columns:1fr;}
  .container{padding:10px;gap:10px;}

  /* 헤더 */
  header{padding:0 12px;gap:8px;}
  .type-btn{padding:6px 12px;font-size:13px;min-height:40px;}
  .back-btn{font-size:12px;padding:5px 10px;min-height:36px;}
  .theme-btn{min-height:36px;}

  /* 폼 */
  .form-card{padding:14px;}
  .fi,.fs{font-size:16px;min-height:44px;padding:10px 12px;}
  .fl{font-size:13px;}
  .btn{min-height:44px;padding:10px 16px;font-size:14px;}
  .btn-xs{min-height:40px;padding:8px 12px;font-size:13px;}

  /* session-label 간격 확대 */
  .session-grid{gap:10px;}
  .session-label{min-height:44px;padding:10px 14px;font-size:14px;}

  /* 모달 바텀시트 */
  .modal-bd{align-items:flex-end;}
  .modal{border-radius:16px 16px 0 0;width:100%;max-width:100%;max-height:88vh;}
  .modal::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}

  /* 곡 목록 여백 확대 */
  .song-item{padding:16px 14px;gap:10px;}
  .song-title{font-size:16px;}
  .song-artist{font-size:14px;}
  .song-applicant,.song-ts{font-size:12px;}
  .sneed{font-size:12px;padding:3px 9px;min-height:28px;}
  .sessions-needed{gap:6px;}
  .session-list{padding:10px 12px;gap:7px;}
  .session-row{font-size:13px;}
  .sess-tag{font-size:12px;padding:3px 8px;}
  .sess-ts{font-size:11px;}
  .song-num{font-size:13px;}
  .song-status{font-size:12px;padding:3px 8px;}
  .list-card-hdr{padding:12px 14px;}
  .list-card-title{font-size:12px;}
  .list-card-count{font-size:12px;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="spin"></div></div>

<header>
  <a class="logo" href="https://kuagc.com" target="_blank">KUAGC</a>
  <div class="type-toggle">
    <button class="type-btn active" id="tb-regular" onclick="switchType('regular')">일반 합주</button>
    <button class="type-btn" id="tb-busking" onclick="switchType('busking')">버스킹 합주</button>
  </div>
  <div class="hdr-right">
    <a class="back-btn" href="index.html">← 시간표</a>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="다크/라이트 모드 전환">🌙</button>
  </div>
</header>

<div class="container" id="mainContainer"></div>

<div class="modal-bd" id="modalBd" style="display:none" onclick="onMBd(event)">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-ttl" id="modalTtl"></div><button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase.js';

const SESSIONS = ['보컬1','보컬2','기타1','기타2','베이스','키보드1','키보드2','드럼','이외 악기'];

// ── THEME ─────────────────────────────────────────────────────────────
(function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark') document.body.classList.add('dark');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
})();
window.toggleTheme=function(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
};

let currentType = 'regular';
let rounds = {regular:null, busking:null};
let songs = {regular:[], busking:[]};
let sessionMap = {};
let searchQ = '';
let countdownTimers = {}; // type → intervalId

function fmtTime(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
const errMsg=e=>{const m=e?.message||'';if(m.includes('unique')||m.includes('duplicate'))return'이미 동일한 신청이 존재합니다';if(m.includes('network')||m.includes('fetch'))return'네트워크 오류가 발생했습니다. 다시 시도해주세요';if(m.includes('JWT')||m.includes('auth'))return'인증 오류입니다. 새로고침 후 시도해주세요';return m||'오류가 발생했습니다';};

async function init(){
  try{
    await loadAll();
    document.getElementById('ld').style.display='none';
    supabase.channel('ens-rt')
      // 곡/세션 변경 → 목록만 갱신 (폼 입력값 보존)
      .on('postgres_changes',{event:'*',schema:'public',table:'song_applications'},refreshList)
      .on('postgres_changes',{event:'*',schema:'public',table:'session_applications'},refreshList)
      // 회차 상태 변경 → 전체 재렌더 (phase 전환 등)
      .on('postgres_changes',{event:'*',schema:'public',table:'ensemble_rounds'},loadAll)
      .subscribe();
    // 폴링 폴백: 목록만 갱신해 폼 입력값 보존
    let _poll=setInterval(refreshList,8000);
    document.addEventListener('visibilitychange',()=>{
      if(document.hidden){clearInterval(_poll);}
      else{refreshList();_poll=setInterval(refreshList,8000);}
    });
  }catch(e){
    document.getElementById('ld').innerHTML=`
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">
        <div style="color:var(--danger);font-size:15px">불러오기 실패</div>
        <div style="color:var(--text2);font-size:13px">${e.message}</div>
        <button class="btn btn-p" onclick="location.reload()">다시 시도</button>
      </div>`;
  }
}

// 곡·세션 목록만 새로고침 — 폼(입력값) 건드리지 않음
async function refreshList(){
  for(const type of ['regular','busking']){
    const r=rounds[type];
    if(!r){songs[type]=[];continue;}
    const {data:s}=await supabase.from('song_applications').select('*').eq('round_id',r.id).order('created_at');
    songs[type]=s||[];
  }
  const allIds=[...songs.regular,...songs.busking].map(s=>s.id);
  sessionMap={};
  if(allIds.length){
    const {data:sess}=await supabase.from('session_applications').select('*').in('song_id',allIds).order('created_at');
    (sess||[]).forEach(s=>{ if(!sessionMap[s.song_id]) sessionMap[s.song_id]=[]; sessionMap[s.song_id].push(s); });
  }
  renderList();
}

async function loadAll(){
  const {data:rds}=await supabase.from('ensemble_rounds').select('*').order('created_at',{ascending:false});
  if(rds){
    rounds.regular=rds.find(r=>r.type==='regular')||null;
    rounds.busking=rds.find(r=>r.type==='busking')||null;
  }
  await refreshList();
  render();
}

window.switchType=function(t){
  currentType=t; searchQ='';
  document.getElementById('tb-regular').classList.toggle('active',t==='regular');
  document.getElementById('tb-busking').classList.toggle('active',t==='busking');
  render();
};

window.onSearchInput=function(v){
  searchQ=v.trim().toLowerCase();
  renderList();
};
window.clearSearch=function(){
  searchQ='';
  const el=document.getElementById('searchInput');
  if(el) el.value='';
  renderList();
};

function fmtScheduled(ts){
  const d=new Date(ts);
  const yy=String(d.getFullYear()).slice(2);
  const mo=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${yy}-${mo}-${dd} ${hh}:${mm}:${ss}`;
}

function diffToHMS(ms){
  if(ms<=0) return '00:00:00';
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return [h,m,sc].map(v=>String(v).padStart(2,'0')).join(':');
}

function startCountdown(type,targetDate,onExpired){
  if(countdownTimers[type]) clearInterval(countdownTimers[type]);
  countdownTimers[type]=setInterval(()=>{
    const diff=new Date(targetDate)-Date.now();
    const el=document.getElementById(`cd-${type}`);
    if(el) el.textContent=diffToHMS(diff);
    if(diff<=0){
      clearInterval(countdownTimers[type]);
      delete countdownTimers[type];
      onExpired();
    }
  },1000);
}

function render(){
  const r=rounds[currentType];
  const phase=r?.phase||'closed';
  const typeName=currentType==='regular'?'일반 합주':'버스킹 합주';
  const type=currentType;

  // 카운트다운 타이머 정리
  if(countdownTimers[type]){ clearInterval(countdownTimers[type]); delete countdownTimers[type]; }

  let html='';

  html+=`<div class="search-bar">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="곡 제목 또는 세션으로 검색..." value="${searchQ}" oninput="onSearchInput(this.value)"/>
    <button class="search-clear" onclick="clearSearch()" style="${searchQ?'':'display:none'}">×</button>
  </div>`;

  // ─ 곡 신청 예약 카운트다운 (draft + song_scheduled_at) ─
  if(phase==='draft'&&r?.song_scheduled_at){
    const targetDate=r.song_scheduled_at;
    const diff=new Date(targetDate)-Date.now();
    if(diff>0){
      html+=`<div class="status-card closed">
        <div class="status-icon">⏳</div>
        <div class="status-texts">
          <div class="status-title">${r.name||typeName} — 지금은 신청 기간이 아닙니다</div>
          <div class="status-sub">${fmtScheduled(targetDate)}에 곡 신청이 열립니다</div>
          <div style="font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent2);margin-top:6px" id="cd-${type}">${diffToHMS(diff)}</div>
        </div>
      </div>`;
      document.getElementById('mainContainer').innerHTML=html;
      startCountdown(type,targetDate,async()=>{
        try{ await supabase.from('ensemble_rounds').update({phase:'song',song_scheduled_at:null}).eq('id',r.id); }catch(e){}
        if(rounds[type]&&rounds[type].id===r.id){ rounds[type].phase='song'; rounds[type].song_scheduled_at=null; }
        render();
      });
      return;
    } else {
      // 예약 시각 도달 — 바로 열기
      if(rounds[type]&&rounds[type].id===r.id){ rounds[type].phase='song'; rounds[type].song_scheduled_at=null; }
      supabase.from('ensemble_rounds').update({phase:'song',song_scheduled_at:null}).eq('id',r.id).then(()=>{});
      render(); return;
    }
  }

  const si={
    draft:{icon:'🕐',title:'신청 준비 중',sub:'관리자가 곡 신청을 열면 여기서 신청할 수 있습니다.',cls:'closed'},
    closed:{icon:'❌️',title:'신청 기간이 아닙니다',sub:'관리자가 신청을 열면 여기서 신청할 수 있습니다.',cls:'closed'},
    song:{icon:'🎵',title:'곡 신청 진행 중',sub:r?`최대 ${r.max_songs}곡 · 인당 ${r.max_songs_per_person}곡`:'',cls:'song'},
    session:{icon:'👥️',title:'세션 신청 진행 중',sub:r?`인당 최대 ${r.max_sessions_per_person}곡 참여 가능`:'',cls:'session'},
  }[phase]||{icon:'❌️',title:'신청 기간이 아닙니다',sub:'',cls:'closed'};
  html+=`<div class="status-card ${si.cls}">
    <div class="status-icon">${si.icon}</div>
    <div class="status-texts">
      <div class="status-title">${r?.name||typeName} — ${si.title}</div>
      <div class="status-sub">${si.sub}</div>
    </div>
  </div>`;

  // ─ 세션 신청 예약 카운트다운 (song + session_scheduled_at) ─
  if(phase==='song'&&r?.session_scheduled_at){
    const targetDate=r.session_scheduled_at;
    const diff=new Date(targetDate)-Date.now();
    if(diff>0){
      html+=`<div class="status-card closed" style="margin-top:0">
        <div class="status-icon">⏳</div>
        <div class="status-texts">
          <div class="status-title">${r.name||typeName} — 지금은 세션 신청 기간이 아닙니다</div>
          <div class="status-sub">${fmtScheduled(targetDate)}에 세션 신청이 열립니다</div>
          <div style="font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent2);margin-top:6px" id="cd-sess-${type}">${diffToHMS(diff)}</div>
        </div>
      </div>`;
      // 세션 카운트다운 타이머 (별도 key)
      const sessKey=type+'-sess';
      if(countdownTimers[sessKey]) clearInterval(countdownTimers[sessKey]);
      countdownTimers[sessKey]=setInterval(()=>{
        const d2=new Date(targetDate)-Date.now();
        const el=document.getElementById(`cd-sess-${type}`);
        if(el) el.textContent=diffToHMS(d2);
        if(d2<=0){
          clearInterval(countdownTimers[sessKey]); delete countdownTimers[sessKey];
          try{ supabase.from('ensemble_rounds').update({phase:'session',session_scheduled_at:null}).eq('id',r.id).then(()=>{}); }catch(e){}
          if(rounds[type]&&rounds[type].id===r.id){ rounds[type].phase='session'; rounds[type].session_scheduled_at=null; }
          render();
        }
      },1000);
    } else {
      if(rounds[type]&&rounds[type].id===r.id){ rounds[type].phase='session'; rounds[type].session_scheduled_at=null; }
      supabase.from('ensemble_rounds').update({phase:'session',session_scheduled_at:null}).eq('id',r.id).then(()=>{});
      render(); return;
    }
  }

  if(phase==='song'){
    const active=songs[currentType].filter(s=>s.status!=='rejected');
    const remaining=r.max_songs-active.length;
    const sessCountdown=r?.session_scheduled_at&&new Date(r.session_scheduled_at)>new Date();
    if(!sessCountdown){
      html+=`<div class="form-card">
        <div class="form-title">곡 신청 (잔여 ${remaining}/${r.max_songs}곡)</div>
        <div class="form-row">
          <div><div class="fl">신청자 성명 *</div><input class="fi" id="sName" placeholder="홍길동" maxlength="20"/></div>
          <div><div class="fl">학번 *</div><input class="fi" id="sStudentId" placeholder="20250001" maxlength="20"/></div>
        </div>
        <div class="form-row">
          <div><div class="fl">곡 제목 *</div><input class="fi" id="sTitle" placeholder="곡 제목" maxlength="100"/></div>
          <div><div class="fl">아티스트 *</div><input class="fi" id="sArtist" placeholder="아티스트명" maxlength="100"/></div>
        </div>
        <div>
          <div class="fl">필요 세션 * (복수 선택)</div>
          <div class="session-grid">
            ${SESSIONS.map(s=>`<input type="checkbox" class="session-chk" id="ns_${s.replace(/\s/g,'_')}" value="${s}"/><label class="session-label" for="ns_${s.replace(/\s/g,'_')}">${s}</label>`).join('')}
          </div>
        </div>
        <div class="form-footer"><button class="btn btn-p" onclick="submitSong()">곡 신청</button></div>
      </div>`;
    }
  }

  if(phase==='session'){
    const confirmedSongs=songs[currentType].filter(s=>s.status==='confirmed');
    html+=`<div class="form-card">
      <div class="form-title">세션 신청</div>
      <div class="form-row">
        <div><div class="fl">성명 *</div><input class="fi" id="ssName" placeholder="홍길동" maxlength="20"/></div>
        <div><div class="fl">학번 *</div><input class="fi" id="ssStudentId" placeholder="20250001" maxlength="20"/></div>
      </div>
      <div class="form-row single">
        <div>
          <div class="fl">참여할 곡 *</div>
          <select class="fs" id="ssSong" onchange="onSongSelect()">
            <option value="">— 곡 선택 —</option>
            ${confirmedSongs.map(s=>`<option value="${s.id}" data-sessions='${JSON.stringify(s.sessions)}'>${s.title} — ${s.artist}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="sessionSelectArea">
        <div class="no-song-selected">곡을 선택하면 신청 가능한 세션이 표시됩니다.</div>
      </div>
      <div class="form-footer"><button class="btn btn-p" onclick="submitSession()">세션 신청</button></div>
    </div>`;
  }

  html+=`<div id="songListEl"></div>`;
  document.getElementById('mainContainer').innerHTML=html;
  renderList();
}

function renderList(){
  const r=rounds[currentType];
  const phase=r?.phase||'closed';
  const songList=songs[currentType]||[];
  const active=songList.filter(s=>s.status!=='rejected');
  let filtered=active;
  if(searchQ){
    filtered=active.filter(s=>
      s.title.toLowerCase().includes(searchQ)||
      s.artist.toLowerCase().includes(searchQ)||
      s.sessions.some(sess=>sess.toLowerCase().includes(searchQ))
    );
  }
  const el=document.getElementById('songListEl');
  if(!el) return;
  if(!active.length){el.innerHTML='';return;}
  let html=`<div class="list-card">
    <div class="list-card-hdr">
      <div class="list-card-title">${phase==='song'?'신청 현황':'곡 목록'}</div>
      <div class="list-card-count">${searchQ?`${filtered.length}/${active.length}곡`:active.length+'곡'}</div>
    </div>`;
  if(!filtered.length){
    html+=`<div class="empty-search">검색 결과가 없습니다</div>`;
  } else {
    filtered.forEach((s,i)=>{ html+=renderSongItem(s,i+1,phase); });
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function renderSongItem(s,num,phase){
  const sessApps=(sessionMap[s.id]||[]);
  const filledSessions=new Set(sessApps.flatMap(a=>a.sessions));
  const needBadges=s.sessions.map(sess=>
    `<span class="sneed ${filledSessions.has(sess)?'filled':''}">${sess}</span>`).join('');
  const sessionRows=sessApps.length?`
    <div class="session-list">
      ${sessApps.map(a=>`
        <div class="session-row">
          <span class="session-row-name">${a.applicant_name}</span>
          <div class="session-row-right">
            <div class="session-row-sessions">
              ${a.sessions.map(sess=>`<span class="sess-tag ${a.status==='confirmed'?'confirmed':''}">${sess}</span>`).join('')}
            </div>
            <span class="sess-ts">${fmtTime(a.created_at)}</span>
          </div>
        </div>`).join('')}
    </div>`:'';
  return `<div class="song-item">
    <div class="song-item-hdr">
      <span class="song-num">${String(num).padStart(2,'0')}</span>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
      </div>
      <span class="song-status ${s.status}">${s.status==='confirmed'?'확정':s.status==='pending'?'대기':'거절'}</span>
    </div>
    <div class="song-meta">
      <span class="song-applicant">신청: ${s.applicant_name}</span>
      <span class="song-ts">${fmtTime(s.created_at)}</span>
      <div class="sessions-needed">${needBadges}</div>
    </div>
    ${sessApps.length||phase==='session'?sessionRows:''}
    ${phase==='session'&&s.status==='confirmed'?
      `<div style="display:flex;justify-content:flex-end;margin-top:4px">
         <button class="btn btn-s btn-xs" onclick="openSessionModal(${s.id})">이 곡에 세션 신청</button>
       </div>`:''}
  </div>`;
}

window.onSongSelect=function(){
  const sel=document.getElementById('ssSong');
  const area=document.getElementById('sessionSelectArea');
  if(!sel||!area) return;
  const opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.value){
    area.innerHTML='<div class="no-song-selected">곡을 선택하면 신청 가능한 세션이 표시됩니다.</div>';
    return;
  }
  const neededSessions=JSON.parse(opt.dataset.sessions||'[]');
  if(!neededSessions.length){
    area.innerHTML='<div class="no-song-selected">이 곡의 필요 세션 정보가 없습니다.</div>';
    return;
  }
  area.innerHTML=`
    <div class="session-area">
      <div class="fl">참여할 세션 * (이 곡에 필요한 세션만 표시)</div>
      <div class="session-grid">
        ${neededSessions.map(s=>`
          <input type="checkbox" class="session-chk" id="sss_${s.replace(/\s/g,'_')}" value="${s}"/>
          <label class="session-label" for="sss_${s.replace(/\s/g,'_')}">${s}</label>`).join('')}
      </div>
    </div>`;
};

window.submitSong=async function(){
  const r=rounds[currentType];
  if(!r||r.phase!=='song'){toast('현재 곡 신청 기간이 아닙니다','err');return;}
  if(r.session_scheduled_at&&new Date(r.session_scheduled_at)>new Date()){toast('세션 신청 예약 중 — 곡 신청이 마감됐습니다','err');return;}
  const name=document.getElementById('sName').value.trim();
  const sid=document.getElementById('sStudentId').value.trim();
  const title=document.getElementById('sTitle').value.trim();
  const artist=document.getElementById('sArtist').value.trim();
  const sessions=[...document.querySelectorAll('[id^="ns_"]:checked')].map(c=>c.value);
  if(!name||!sid||!title||!artist){toast('모든 필드를 입력해주세요','err');return;}
  if(!sessions.length){toast('필요 세션을 하나 이상 선택해주세요','err');return;}
  const titleNorm=title.trim().toLowerCase();
  const artistNorm=artist.trim().toLowerCase();
  const dup=songs[currentType].find(s=>
    s.status!=='rejected'&&
    s.title.trim().toLowerCase()===titleNorm&&
    s.artist.trim().toLowerCase()===artistNorm
  );
  if(dup){toast('이미 동일한 곡이 신청되어 있습니다','err');return;}
  const myCount=songs[currentType].filter(s=>s.student_id===sid&&s.status!=='rejected').length;
  if(myCount>=r.max_songs_per_person){toast(`인당 최대 ${r.max_songs_per_person}곡까지 신청 가능합니다`,'err');return;}
  const totalCount=songs[currentType].filter(s=>s.status!=='rejected').length;
  if(totalCount>=r.max_songs){toast('신청 가능한 곡 수가 초과됐습니다','err');return;}
  try{
    await supabase.from('song_applications').insert({
      round_id:r.id,applicant_name:name,student_id:sid,title,artist,sessions,status:'pending'
    });
    toast('곡 신청이 완료됐습니다','ok');
    await loadAll();
  }catch(e){toast(errMsg(e),'err');}
};

window.submitSession=async function(){
  const r=rounds[currentType];
  if(!r||r.phase!=='session'){toast('현재 세션 신청 기간이 아닙니다','err');return;}
  const name=document.getElementById('ssName').value.trim();
  const sid=document.getElementById('ssStudentId').value.trim();
  const songId=document.getElementById('ssSong').value;
  if(!name||!sid||!songId){toast('모든 필드를 입력해주세요','err');return;}
  const sessions=[...document.querySelectorAll('[id^="sss_"]:checked')].map(c=>c.value);
  if(!sessions.length){toast('참여할 세션을 하나 이상 선택해주세요','err');return;}
  await doSubmitSession(parseInt(songId),r,name,sid,sessions);
};

window.openSessionModal=function(songId){
  const song=songs[currentType].find(s=>s.id===songId);
  const neededSessions=song.sessions||[];
  showModal(`세션 신청 — ${song.title}`,
    `<div class="irow"><span class="ik">곡</span><span style="font-weight:700">${song.title}</span></div>
     <div class="irow"><span class="ik">아티스트</span><span>${song.artist}</span></div>
     <div><div class="fl" style="margin-top:8px">성명 *</div><input class="fi" id="mssName" placeholder="홍길동" maxlength="20"/></div>
     <div><div class="fl">학번 *</div><input class="fi" id="mssId" placeholder="20250001" maxlength="20"/></div>
     <div>
       <div class="fl">참여할 세션 * (이 곡에 필요한 세션만 표시)</div>
       <div class="session-grid">
         ${neededSessions.map(s=>`
           <input type="checkbox" class="session-chk" id="mss_${s.replace(/\s/g,'_')}" value="${s}"/>
           <label class="session-label" for="mss_${s.replace(/\s/g,'_')}">${s}</label>`).join('')}
       </div>
     </div>`,
    `<button class="btn btn-s" onclick="closeModal()">취소</button>
     <button class="btn btn-p" id="mssBtn" onclick="submitSessionModal(${songId})">신청</button>`
  );
};

window.submitSessionModal=async function(songId){
  const r=rounds[currentType];
  const name=document.getElementById('mssName').value.trim();
  const sid=document.getElementById('mssId').value.trim();
  const sessions=[...document.querySelectorAll('[id^="mss_"]:checked')].map(c=>c.value);
  if(!name||!sid){toast('성명과 학번을 입력해주세요','err');return;}
  if(!sessions.length){toast('세션을 하나 이상 선택해주세요','err');return;}
  const btn=document.getElementById('mssBtn'); btn.disabled=true;
  const ok=await doSubmitSession(songId,r,name,sid,sessions);
  if(!ok) btn.disabled=false;
};

async function doSubmitSession(songId,r,name,sid,sessions){
  const allSess=Object.values(sessionMap).flat();
  const mySongs=new Set(allSess.filter(a=>a.student_id===sid&&a.round_id===r.id&&a.status!=='rejected').map(a=>a.song_id));
  if(!mySongs.has(songId)&&mySongs.size>=r.max_sessions_per_person){
    toast(`인당 최대 ${r.max_sessions_per_person}곡까지 참여 가능합니다`,'err');return false;
  }
  const existing=(sessionMap[songId]||[]).find(a=>a.student_id===sid&&a.status!=='rejected');
  if(existing){toast('이미 이 곡에 세션을 신청했습니다','err');return false;}
  try{
    await supabase.from('session_applications').insert({
      song_id:songId,round_id:r.id,applicant_name:name,student_id:sid,sessions,status:'pending'
    });
    toast('세션 신청이 완료됐습니다','ok');
    closeModal(); await loadAll(); return true;
  }catch(e){toast(errMsg(e),'err');return false;}
}

const isMobile=()=>window.innerWidth<=700;

function showModal(title,body,foot){
  document.getElementById('modalTtl').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFoot').innerHTML=foot;
  document.getElementById('modalBd').style.display='flex';
  document.body.style.overflow='hidden';
  if(isMobile()){
    const modal=document.querySelector('#modalBd .modal');
    if(!modal) return;
    let startY=0,isDragging=false;
    modal.style.transform='';
    const onStart=e=>{startY=e.touches[0].clientY;isDragging=true;modal.style.transition='none';};
    const onMove=e=>{if(!isDragging)return;const dy=e.touches[0].clientY-startY;if(dy>0)modal.style.transform=`translateY(${dy}px)`;};
    const onEnd=e=>{if(!isDragging)return;isDragging=false;const dy=e.changedTouches[0].clientY-startY;modal.style.transition='transform .2s';if(dy>100){modal.style.transform=`translateY(100%)`;setTimeout(closeModal,200);}else{modal.style.transform='';}};
    modal.addEventListener('touchstart',onStart,{passive:true});
    modal.addEventListener('touchmove',onMove,{passive:true});
    modal.addEventListener('touchend',onEnd);
  }
}
window.closeModal=()=>{document.getElementById('modalBd').style.display='none';document.body.style.overflow='';};
window.onMBd=e=>{if(e.target===document.getElementById('modalBd'))closeModal();};

let toastT;
function toast(msg,type=''){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.className='toast'+(type?' '+type:'');el.textContent=msg;el.style.display='block';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',3000);
}

init();
</script>
</body>
</html>
