<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백업 기록 | KUAGC</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/backups.css">
</head>
<body>
<header>
  <a class="logo" href="myskill.html" aria-label="홈"><span class="logo-img"></span></a>
  <div class="nav">
    <a class="nav-btn" href="index.html">시간표</a>
    <a class="nav-btn active" href="backups.html">백업</a>
  </div>
  <div class="hdr-sep"></div>
  <a class="hdr-apply-btn" href="timeassign.html">시간배정</a>
  <a class="hdr-school-btn" href="school.html">스쿨 신청</a>
  <a class="hdr-ensemble-btn" href="ensemble.html">합주 신청</a>
  <div class="hdr-spacer"></div>
  <button class="theme-btn" id="themeBtn" type="button" aria-label="테마 전환">달</button>
</header>

<main class="backup-page">
  <section class="backup-head">
    <div>
      <p class="eyebrow">정적 백업 열람</p>
      <h1>신청 기록 백업</h1>
      <p class="head-copy">GitHub Actions가 저장해 둔 가장 최근 백업 파일을 기준으로 시간배정, 스쿨, 합주 신청 기록을 보여줍니다.</p>
    </div>
    <div class="head-status" id="backupStatus">
      <span class="status-dot pending"></span>
      <span>백업 파일 확인 중</span>
    </div>
  </section>

  <section class="summary-grid" id="summaryGrid" aria-label="백업 요약"></section>

  <section class="toolbar" aria-label="백업 검색 도구">
    <div class="search-wrap">
      <label for="backupSearch">검색</label>
      <input id="backupSearch" type="search" placeholder="이름, 학번, 곡명, 팀명, 스쿨명 검색">
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-s" id="reloadBtn" type="button">다시 불러오기</button>
      <a class="btn btn-s" id="jsonLink" href="https://raw.githubusercontent.com/kudohae/kuagc-schedule/gh-pages/data/backups/latest.json" target="_blank" rel="noopener">원본 JSON</a>
    </div>
  </section>

  <nav class="backup-tabs" aria-label="백업 구분">
    <button class="tab active" type="button" data-tab="overview">요약</button>
    <button class="tab" type="button" data-tab="time">시간배정</button>
    <button class="tab" type="button" data-tab="school">스쿨</button>
    <button class="tab" type="button" data-tab="ensemble">합주</button>
  </nav>

  <section class="content" id="backupContent" aria-live="polite">
    <div class="empty-state">백업 파일을 불러오고 있습니다.</div>
  </section>
</main>

<script type="module" src="js/backups/main.js"></script>
</body>
</html>
