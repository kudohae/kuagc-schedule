<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스쿨 신청 | 그루터기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--border:#dddde0;
  --accent:#5c9e00;--accent2:#0077cc;--danger:#d93025;--warn:#c8760a;
  --text:#111111;--text2:#555555;--text3:#999999;--radius:6px;--hh:48px;
  --header-bg:rgba(244,244,245,.97);
}
body.dark{
  --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2e;--border:#333338;
  --accent:#e8ff47;--accent2:#47c5ff;--danger:#ff4747;--warn:#ffaa47;
  --text:#f0f0f0;--text2:#888888;--text3:#505055;
  --header-bg:rgba(18,18,18,.97);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

header{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(8px);z-index:100;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--accent);text-decoration:none;}
.nav{display:flex;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.nav-btn{padding:5px 13px;border:none;background:transparent;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all .12s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;}
.nav-btn:hover:not(.active){color:var(--text);}
.hdr-apply-btn{background:rgba(0,119,204,.08);border:1px solid rgba(0,119,204,.3);border-radius:4px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--accent2);white-space:nowrap;transition:all .12s;text-decoration:none;}
body.dark .hdr-apply-btn{background:rgba(71,197,255,.08);border-color:rgba(71,197,255,.25);}
.hdr-apply-btn:hover{opacity:.8;}
.hdr-apply-btn.active{background:rgba(0,119,204,.16);border-color:rgba(0,119,204,.55);}
body.dark .hdr-apply-btn.active{background:rgba(71,197,255,.15);border-color:rgba(71,197,255,.45);}
.hdr-school-btn{background:rgba(200,118,10,.08);border:1px solid rgba(200,118,10,.3);border-radius:4px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--warn);text-decoration:none;white-space:nowrap;transition:all .12s;}
body.dark .hdr-school-btn{background:rgba(255,170,71,.08);border-color:rgba(255,170,71,.25);}
.hdr-school-btn:hover{opacity:.8;}
.hdr-school-btn.active{background:rgba(200,118,10,.16);border-color:rgba(200,118,10,.55);}
.hdr-ensemble-btn{background:rgba(92,158,0,.1);border:1px solid rgba(92,158,0,.35);border-radius:4px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;white-space:nowrap;transition:all .12s;}
body.dark .hdr-ensemble-btn{background:rgba(232,255,71,.08);border-color:rgba(232,255,71,.25);}
.hdr-ensemble-btn:hover{opacity:.8;}
.hdr-ensemble-btn.active{background:rgba(92,158,0,.18);border-color:rgba(92,158,0,.6);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:14px;cursor:pointer;line-height:1;transition:all .12s;}
.theme-btn:hover{border-color:var(--text2);}

.container{max-width:680px;margin:0 auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;}

.round-status{border-radius:var(--radius);padding:12px 16px;display:flex;align-items:flex-start;gap:12px;}
.round-status.open{background:rgba(92,158,0,.06);border:1px solid rgba(92,158,0,.22);}
body.dark .round-status.open{background:rgba(232,255,71,.06);border-color:rgba(232,255,71,.18);}
.round-status.closed{background:var(--surface);border:1px solid var(--border);}
.round-status.draft{background:var(--surface);border:1px solid var(--border);}
.rs-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.rs-texts{display:flex;flex-direction:column;gap:4px;}
.rs-title{font-size:15px;font-weight:700;}
.rs-sub{font-size:12px;color:var(--text2);}
.rs-notice{font-size:12px;color:var(--accent2);background:rgba(0,119,204,.06);border:1px solid rgba(0,119,204,.15);border-radius:4px;padding:5px 9px;margin-top:2px;}
body.dark .rs-notice{background:rgba(71,197,255,.06);border-color:rgba(71,197,255,.2);}

.apply-form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.apply-form-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fl{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .12s;}
.fi:focus{border-color:var(--accent);}
select.fi{cursor:pointer;}
.form-foot{display:flex;justify-content:flex-end;margin-top:4px;}

.school-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.school-card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.school-name{font-size:15px;font-weight:700;}
.school-teacher{font-size:12px;color:var(--text2);margin-top:2px;}
.school-schedule{font-size:12px;color:var(--text3);margin-top:1px;}
.school-desc-bar{border-top:1px solid var(--border);padding:8px 16px;display:flex;flex-direction:column;gap:6px;}
.school-desc-toggle{background:none;border:none;padding:0;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--accent2);cursor:pointer;text-align:left;text-decoration:underline;text-underline-offset:2px;}
.school-desc-toggle:hover{opacity:.75;}
.school-desc-body{display:none;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.school-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:3px;flex-shrink:0;white-space:nowrap;}
.school-badge.open{background:rgba(92,158,0,.12);color:var(--accent);}
body.dark .school-badge.open{background:rgba(232,255,71,.15);}
.school-badge.full{background:rgba(200,118,10,.1);color:var(--warn);}
.school-badge.closed{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.school-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.cap-row{display:flex;align-items:center;gap:8px;}
.cap-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.cap-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.cap-fill.full{background:var(--warn);}
.cap-text{font-size:12px;color:var(--text2);white-space:nowrap;}

.applicant-section{display:flex;flex-direction:column;gap:4px;}
.applicant-section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;}
.applicant-list{display:flex;flex-direction:column;gap:2px;}
.applicant-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:4px;background:var(--surface2);}
.applicant-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);min-width:18px;}
.applicant-name{font-size:13px;flex:1;}
.applicant-sid{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);}
.ret-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;background:rgba(0,119,204,.1);color:var(--accent2);flex-shrink:0;}
body.dark .ret-badge{background:rgba(71,197,255,.1);}

.unassigned-card{background:var(--surface);border:1px solid rgba(217,48,37,.25);border-radius:var(--radius);overflow:hidden;}
body.dark .unassigned-card{border-color:rgba(255,71,71,.2);}
.unassigned-hdr{padding:10px 16px;border-bottom:1px solid rgba(217,48,37,.15);background:rgba(217,48,37,.04);}
body.dark .unassigned-hdr{border-color:rgba(255,71,71,.12);}
.unassigned-title{font-size:13px;font-weight:700;color:var(--danger);}
.pending-card{background:var(--surface);border:1px solid rgba(0,119,204,.2);border-radius:var(--radius);overflow:hidden;}
body.dark .pending-card{border-color:rgba(71,197,255,.15);}
.pending-hdr{padding:10px 16px;border-bottom:1px solid rgba(0,119,204,.1);background:rgba(0,119,204,.04);}
body.dark .pending-hdr{border-color:rgba(71,197,255,.1);}
.pending-title{font-size:13px;font-weight:700;color:var(--accent2);}

.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center;color:var(--text3);font-size:14px;}

.btn{padding:7px 15px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:var(--accent);color:#000;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:5px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{background:var(--accent);color:#000;}
.toast.err{background:var(--danger);color:#fff;}
@media(max-width:700px){
  .hdr-apply-btn,.hdr-school-btn,.hdr-ensemble-btn,.nav{display:none;}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="https://kuagc.com" target="_blank" style="text-decoration:none">KUAGC</a>
  <div class="nav">
    <a class="nav-btn" href="index.html">시간표</a>
  </div>
  <div style="width:1px;height:18px;background:var(--border);flex-shrink:0;"></div>
  <a class="hdr-apply-btn" href="timeassign.html">📅 시간 배정</a>
  <a class="hdr-school-btn active" href="school.html">🏫 스쿨 신청</a>
  <a class="hdr-ensemble-btn" href="ensemble.html">🎸 합주 신청</a>
  <div class="hdr-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="container" id="container">
  <div class="empty-state">불러오는 중...</div>
</div>

<div class="toast" id="toastEl"></div>

<script type="module">
import { supabase } from './js/supabase.js';

(function(){
  const s=localStorage.getItem('theme');
  if(s==='dark') document.body.classList.add('dark');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
})();
window.toggleTheme=function(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';
};

let toastTimer;
function toast(msg,type=''){
  const el=document.getElementById('toastEl');
  el.textContent=msg; el.className='toast'+(type?' '+type:'');
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),4000);
}

function diffToHMS(ms){
  if(ms<=0) return '00:00:00';
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return [h,m,sc].map(v=>String(v).padStart(2,'0')).join(':');
}
function fmtDate(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let round=null, prevRound=null, classes=[], apps=[], prevApps=[];
let cdTimer=null;

function stopCd(){if(cdTimer){clearInterval(cdTimer);cdTimer=null;}}

function startCd(targetTs,onExpired){
  stopCd();
  const update=()=>{
    const diff=new Date(targetTs)-Date.now();
    const el=document.getElementById('cdEl');
    if(el) el.textContent=diffToHMS(diff);
    if(diff<=0){stopCd();onExpired();}
  };
  update();
  cdTimer=setInterval(update,1000);
}

async function load(){
  const {data:rds}=await supabase.from('school_rounds').select('*').order('created_at',{ascending:false}).limit(2);
  round=(rds||[])[0]||null;

  if(round){
    // Previous closed round (not the current one) for returning-student check
    const {data:prev}=await supabase.from('school_rounds').select('*').eq('status','closed').neq('id',round.id).order('created_at',{ascending:false}).limit(1);
    prevRound=prev?.[0]||null;

    const [{data:sc},{data:ap}]=await Promise.all([
      supabase.from('schools').select('*').eq('round_id',round.id).order('created_at'),
      supabase.from('school_applications').select('*').eq('round_id',round.id).order('created_at')
    ]);
    classes=sc||[];
    apps=ap||[];

    if(prevRound&&round.prioritize_returning){
      const {data:pa}=await supabase.from('school_applications').select('student_id')
        .eq('round_id',prevRound.id).eq('status','assigned');
      prevApps=pa||[];
    } else {
      prevApps=[];
    }
  }
  render();
}

function getRoundName(){
  if(round?.semester&&round?.round_num) return `${round.semester}학기 ${round.round_num}차 스쿨 신청`;
  return round?.name||'스쿨 신청';
}

function isReturning(sid){
  if(!round?.prioritize_returning) return false;
  return prevApps.some(a=>a.student_id===sid);
}

function countAssigned(classId){
  return apps.filter(a=>a.assigned_school_id===classId&&a.status==='assigned').length;
}

function pickClass(pref1,pref2){
  const c1=classes.find(c=>c.id===pref1);
  if(c1&&countAssigned(pref1)<(c1.capacity||0)) return pref1;
  if(pref2){
    const c2=classes.find(c=>c.id===pref2);
    if(c2&&countAssigned(pref2)<(c2.capacity||0)) return pref2;
  }
  return null;
}

function render(){
  stopCd();
  if(!round){
    document.getElementById('container').innerHTML='<div class="empty-state">스쿨 신청 기간이 아닙니다.</div>';
    return;
  }
  const {status}=round;
  if(status==='draft') renderDraft();
  else if(status==='open') renderOpen();
  else renderClosed();
}

function renderDraft(){
  const name=getRoundName();
  const openAt=round.open_at;
  const now=Date.now();
  let html=`<div class="round-status draft">
    <div class="rs-icon">⏳</div>
    <div class="rs-texts">
      <div class="rs-title">${name}</div>
      <div class="rs-sub">스쿨 신청 준비 중입니다.</div>
      ${openAt?`<div class="rs-sub" style="margin-top:2px">오픈 예정: ${fmtDate(openAt)} &nbsp;—&nbsp; <span id="cdEl" style="font-family:'Space Mono',monospace;font-weight:700;color:var(--accent2)">...</span></div>`:''}
    </div>
  </div>`;
  document.getElementById('container').innerHTML=html;
  if(openAt){
    if(new Date(openAt)<=Date.now()){autoOpen();}
    else startCd(openAt,autoOpen);
  }
}

async function autoOpen(){
  const {error}=await supabase.from('school_rounds').update({status:'open'}).eq('id',round.id);
  if(!error){round.status='open';render();}
}

function renderOpen(){
  const name=getRoundName();
  const closeAt=round.close_at;
  if(closeAt&&new Date(closeAt)<=Date.now()){autoClose();return;}

  let html=`<div class="round-status open">
    <div class="rs-icon">📋</div>
    <div class="rs-texts">
      <div class="rs-title">${name} — 신청 진행 중</div>
      ${closeAt?`<div class="rs-sub" style="color:var(--warn)">⏰ 마감: ${fmtDate(closeAt)} &nbsp;—&nbsp; <span id="cdEl" style="font-family:'Space Mono',monospace;font-weight:700">...</span></div>`:'<div class="rs-sub">성명·학번·1지망을 입력하고 신청하세요.</div>'}
      ${round.prioritize_returning?'<div class="rs-notice">ℹ️ 이전 회차 수강자는 이번 회차 최초 수강자 배정 완료 후에 배정됩니다.</div>':''}
    </div>
  </div>`;

  html+=`<div class="apply-form-card">
    <div class="apply-form-title">스쿨 신청</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="form-grid">
        <div><div class="fl">성명 *</div><input class="fi" id="applyName" placeholder="홍길동" autocomplete="off"/></div>
        <div><div class="fl">학번 *</div><input class="fi" id="applySid" placeholder="20250001" inputmode="numeric" autocomplete="off"/></div>
      </div>
      <div><div class="fl">1지망 *</div><select class="fi" id="applyPref1">
        <option value="">— 선택하세요 —</option>
        ${classes.map(c=>`<option value="${c.id}">${c.name}${c.teacher_name?` (담임: ${c.teacher_name})`:''  }${countAssigned(c.id)>=(c.capacity||0)?' — 만석':''}</option>`).join('')}
      </select></div>
      <div><div class="fl">2지망 (선택)</div><select class="fi" id="applyPref2">
        <option value="">— 없음 —</option>
        ${classes.map(c=>`<option value="${c.id}">${c.name}${countAssigned(c.id)>=(c.capacity||0)?' — 만석':''}</option>`).join('')}
      </select></div>
      <div class="form-foot"><button class="btn btn-p" id="applySubmitBtn" onclick="submitApply()">신청하기</button></div>
    </div>
  </div>`;

  html+=renderClassCards(true);
  document.getElementById('container').innerHTML=html;
  if(closeAt) startCd(closeAt,autoClose);
}

async function autoClose(){
  const {error}=await supabase.from('school_rounds').update({status:'closed'}).eq('id',round.id);
  if(!error){
    round.status='closed';
    if(round.prioritize_returning) await processReturning();
    await load();
  }
}

async function processReturning(){
  const pending=apps.filter(a=>a.status==='pending').sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const counts={};
  apps.filter(a=>a.status==='assigned'&&a.assigned_school_id).forEach(a=>{
    counts[a.assigned_school_id]=(counts[a.assigned_school_id]||0)+1;
  });
  for(const app of pending){
    const p1=app.pref1_school_id, p2=app.pref2_school_id;
    const c1=classes.find(c=>c.id===p1), c2=classes.find(c=>c.id===p2);
    let assignedId=null;
    if(c1&&(counts[p1]||0)<(c1.capacity||0)){assignedId=p1;counts[p1]=(counts[p1]||0)+1;}
    else if(p2&&c2&&(counts[p2]||0)<(c2.capacity||0)){assignedId=p2;counts[p2]=(counts[p2]||0)+1;}
    const {error}=await supabase.from('school_applications').update({
      assigned_school_id:assignedId,status:assignedId?'assigned':'unassigned'
    }).eq('id',app.id);
    if(!error){
      const a=apps.find(x=>x.id===app.id);
      if(a){a.assigned_school_id=assignedId;a.status=assignedId?'assigned':'unassigned';}
    }
  }
}

function renderClosed(){
  const name=getRoundName();
  let html=`<div class="round-status closed">
    <div class="rs-icon">🔒</div>
    <div class="rs-texts">
      <div class="rs-title">${name} — 마감</div>
      <div class="rs-sub">스쿨 신청이 마감됐습니다. 배정 결과를 확인하세요.</div>
    </div>
  </div>`;
  html+=renderClassCards(false);
  document.getElementById('container').innerHTML=html;
}

function renderClassCards(isOpen){
  let html='';
  classes.forEach(c=>{
    const assigned=apps.filter(a=>a.assigned_school_id===c.id&&a.status==='assigned').sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const cap=c.capacity||0;
    const isFull=assigned.length>=cap;
    const fillPct=Math.min(100,Math.round((assigned.length/Math.max(1,cap))*100));
    let badgeCls='closed',badgeTxt='마감';
    if(isOpen&&isFull){badgeCls='full';badgeTxt='만석';}
    else if(isOpen){badgeCls='open';badgeTxt='모집중';}
    html+=`<div class="school-card">
      <div class="school-card-hdr">
        <div>
          <div class="school-name">${c.name}</div>
          ${c.teacher_name?`<div class="school-teacher">담당: ${c.teacher_name}</div>`:''}
          ${c.schedule_day?`<div class="school-schedule">${c.schedule_day}요일 ${c.schedule_hour}시</div>`:''}
        </div>
        <span class="school-badge ${badgeCls}">${badgeTxt}</span>
      </div>
      ${c.description?`<div class="school-desc-bar">
        <button class="school-desc-toggle" onclick="toggleSchoolDesc(${c.id})">스쿨 설명 보기</button>
        <div class="school-desc-body" id="desc-${c.id}">${c.description.replace(/\n/g,'<br>')}</div>
      </div>`:''}
      <div class="school-body">
        <div class="cap-row">
          <div class="cap-bar"><div class="cap-fill${isFull?' full':''}" style="width:${fillPct}%"></div></div>
          <div class="cap-text">${assigned.length} / ${cap}명</div>
        </div>
        ${assigned.length?`<div class="applicant-section">
          <div class="applicant-section-title">배정 확정 (${assigned.length}명)</div>
          <div class="applicant-list">
            ${assigned.map((a,i)=>`<div class="applicant-row">
              <span class="applicant-num">${i+1}</span>
              <span class="applicant-name">${a.applicant_name}</span>
              <span class="applicant-sid">···${a.student_id.slice(-3)}</span>
              ${a.is_returning?'<span class="ret-badge">재수강</span>':''}
            </div>`).join('')}
          </div>
        </div>`:'<div style="font-size:12px;color:var(--text3)">배정된 학생이 없습니다.</div>'}
      </div>
    </div>`;
  });

  // 마감 후 배정 대기 (open 중에만)
  const pending=apps.filter(a=>a.status==='pending');
  if(isOpen&&pending.length){
    html+=`<div class="pending-card">
      <div class="pending-hdr">
        <div class="pending-title">마감 후 배정 예정 — ${pending.length}명</div>
        <div style="font-size:11px;color:var(--accent2);margin-top:2px">이전 회차 수강자입니다. 마감 후 남은 자리에 배정됩니다.</div>
      </div>
      <div style="padding:10px 16px"><div class="applicant-list">
        ${pending.map(a=>{const p1=classes.find(c=>c.id===a.pref1_school_id);const p2=classes.find(c=>c.id===a.pref2_school_id);return`<div class="applicant-row">
          <span class="applicant-name">${a.applicant_name}</span>
          <span class="applicant-sid">···${a.student_id.slice(-3)}</span>
          <span style="font-size:10px;color:var(--text3)">${p1?'1지: '+p1.name:''}${p2?' · 2지: '+p2.name:''}</span>
        </div>`}).join('')}
      </div></div>
    </div>`;
  }

  // 미배정
  const unassigned=apps.filter(a=>a.status==='unassigned');
  if(unassigned.length){
    html+=`<div class="unassigned-card">
      <div class="unassigned-hdr">
        <div class="unassigned-title">미배정 — ${unassigned.length}명</div>
      </div>
      <div style="padding:10px 16px"><div class="applicant-list">
        ${unassigned.map(a=>{const p1=classes.find(c=>c.id===a.pref1_school_id);const p2=classes.find(c=>c.id===a.pref2_school_id);return`<div class="applicant-row">
          <span class="applicant-name">${a.applicant_name}</span>
          <span class="applicant-sid">···${a.student_id.slice(-3)}</span>
          <span style="font-size:10px;color:var(--text3)">${p1?'1지: '+p1.name:''}${p2?' · 2지: '+p2.name:''}</span>
        </div>`}).join('')}
      </div></div>
    </div>`;
  }
  return html||'<div class="empty-state">등록된 반이 없습니다.</div>';
}

window.submitApply=async function(){
  if(!round||round.status!=='open'){toast('신청 기간이 아닙니다','err');return;}
  const name=(document.getElementById('applyName')?.value||'').trim();
  const sid=(document.getElementById('applySid')?.value||'').trim();
  const pref1Raw=document.getElementById('applyPref1')?.value;
  const pref2Raw=document.getElementById('applyPref2')?.value;
  if(!name){toast('성명을 입력해주세요','err');return;}
  if(sid.length<4){toast('학번을 올바르게 입력해주세요','err');return;}
  if(!pref1Raw){toast('1지망을 선택해주세요','err');return;}
  const pref1=parseInt(pref1Raw);
  const pref2=pref2Raw?parseInt(pref2Raw):null;
  if(pref2&&pref2===pref1){toast('1지망과 2지망이 같습니다','err');return;}

  const existing=apps.find(a=>a.student_id===sid);
  if(existing){
    if(!confirm('이미 신청한 내역이 있습니다.\n기존 신청이 철회되고 새로 신청됩니다. 계속하시겠습니까?')) return;
  }

  const btn=document.getElementById('applySubmitBtn');
  if(btn){btn.disabled=true;btn.textContent='처리 중...';}
  try{
    if(existing){
      const {error}=await supabase.from('school_applications').delete().eq('id',existing.id);
      if(error) throw error;
      apps=apps.filter(a=>a.id!==existing.id);
    }

    const returning=isReturning(sid);
    let assignedId=null, status;
    if(returning){
      status='pending';
    } else {
      assignedId=pickClass(pref1,pref2);
      status=assignedId?'assigned':'unassigned';
    }

    const {error}=await supabase.from('school_applications').insert({
      round_id:round.id,applicant_name:name,student_id:sid,
      pref1_school_id:pref1,pref2_school_id:pref2||null,
      assigned_school_id:assignedId,is_returning:returning,status
    });
    if(error) throw error;

    if(returning){
      toast('신청 등록 완료. 이전 회차 수강자로 마감 후 남은 자리에 배정될 예정입니다.','ok');
    } else if(assignedId){
      const c=classes.find(x=>x.id===assignedId);
      toast(`${c?.name||'반'}에 배정됐습니다!`,'ok');
    } else {
      toast('신청 등록 완료. 현재 모든 반이 만석입니다.','');
    }
  }catch(e){
    toast(e?.message||'오류가 발생했습니다','err');
    if(btn){btn.disabled=false;btn.textContent='신청하기';}
  }
};

// 실시간 구독
supabase.channel('school-public-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'school_rounds'},()=>load())
  .on('postgres_changes',{event:'*',schema:'public',table:'schools'},()=>load())
  .on('postgres_changes',{event:'*',schema:'public',table:'school_applications'},async()=>{
    if(!round) return;
    const {data}=await supabase.from('school_applications').select('*').eq('round_id',round.id).order('created_at');
    apps=data||[];
    render();
  })
  .subscribe();

load();

window.toggleSchoolDesc=function(id){
  const body=document.getElementById('desc-'+id);
  const btn=body?.previousElementSibling;
  if(!body) return;
  if(body.style.display==='none'||!body.style.display){
    body.style.display='block';
    if(btn) btn.textContent='스쿨 설명 닫기';
  } else {
    body.style.display='none';
    if(btn) btn.textContent='스쿨 설명 보기';
  }
};
